<script>
var QUESTIONS = [{"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 1, "question": "■問1.マーケティング思考について誤っているものを選択してください。\nA.マーケティングの活動範囲は営業活動や広告、市場調査などに限定されているわけではない。\n\nB.マーケティングとは「顧客に買ってもらえる仕組みをつくること」と定義される。\n\nC.マーケティングの目的は今日の売上を確保することにあるので、短期志向に陥りやすい。\n\nD.継続的な成長のためには、既存の顧客に繰り返し買ってもらうことが重要だ。", "answer": "Ｃ", "explanation": "「セリング」の説明のため誤り。\n\nセリングは「売り込む手段」を考える活動。セリングの目的は今日の売上げを確保することにあるので、短期志向に陥りやすい。マーケティングは顧客満足を軸に「買ってもらえる仕組み」を考える活動。マーケティングの目的は継続的な成長である。", "source": "グロービス マネジメントブック 改訂3版\n\n1.マーケティングの発想 P.48-49\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 2, "question": "■問2.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n・企業は経営理念という枠組みの中で、（①）と自社の経営資源から戦略を特定していくが、（①）の中で最も重要な要素の1つは市場環境である。\n\n・市場環境の変化を踏まえて企業の進むべき方向性を見出し、経営戦略や事業活動に落とし込んでいく役割を果たすのが（②）である。\n\n・企業は生産、営業、開発、財務、人事などのさまざまな機能の集合体だ。（③）がすべての企業活動の原点であるという考え方に立てば、（③）を中心に据えて、（③）の期待に応えるべく各機能がそれぞれの役割を最大限に果たさなくてはならない。\n\n・（②）は、（③）の期待を明確化し、（③）ニーズの充足を保証するために、企業内のさまざまな機能を統合する役割を担っている。\n\nA. ①内部環境 ②全社戦略 ③社会\n\nB. ①外部環境 ②マーケティング ③顧客\n\nC. ①外部環境 ②事業戦略 ③社員\n\nD. ①関連会社 ②マーケティング ③顧客", "answer": "B", "explanation": "・企業は経営理念という枠組みの中で、外部環境と自社の経営資源から戦略を特定していくが、外部環境の中で最も重要な要素の1つは市場環境である。\n\n・市場環境の変化を踏まえて企業の進むべき方向性を見出し、経営戦略や事業活動に落とし込んでいく役割を果たすのがマーケティングである。\n\n・企業は生産、営業、開発、財務、人事などのさまざまな機能の集合体だ。\n\n顧客がすべての企業活動の原点であるという考え方に立てば、顧客を中心に据えて、顧客の期待に応えるべく各機能がそれぞれの役割を最大限に果たさなくてはならない。\n\n・マーケティングは、顧客の期待を明確化し、顧客ニーズの充足を保証するために、企業内のさまざまな機能を統合する役割を担っている。", "source": "グロービス マネジメントブック 改訂3版\n\n2．マーケティングの役割 P.50-51"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 2, "question": "■問2.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n・企業は経営理念という枠組みの中で、（①）と自社の経営資源から戦略を特定していくが、（①）の中で最も重要な要素の1つは市場環境である。\n\n・市場環境の変化を踏まえて企業の進むべき方向性を見出し、経営戦略や事業活動に落とし込んでいく役割を果たすのが（②）である。\n\n・企業は生産、営業、開発、財務、人事などのさまざまな機能の集合体だ。（③）がすべての企業活動の原点であるという考え方に立てば、（③）を中心に据えて、（③）の期待に応えるべく各機能がそれぞれの役割を最大限に果たさなくてはならない。\n\n・（②）は、（③）の期待を明確化し、（③）ニーズの充足を保証するために、企業内のさまざまな機能を統合する役割を担っている。\n\nA. ①内部環境 ②全社戦略 ③社会\n\nB. ①外部環境 ②マーケティング ③顧客\n\nC. ①外部環境 ②事業戦略 ③社員\n\nD. ①関連会社 ②マーケティング ③顧客", "answer": "B", "explanation": "・企業は経営理念という枠組みの中で、外部環境と自社の経営資源から戦略を特定していくが、外部環境の中で最も重要な要素の1つは市場環境である。\n\n・市場環境の変化を踏まえて企業の進むべき方向性を見出し、経営戦略や事業活動に落とし込んでいく役割を果たすのがマーケティングである。\n\n・企業は生産、営業、開発、財務、人事などのさまざまな機能の集合体だ。\n\n顧客がすべての企業活動の原点であるという考え方に立てば、顧客を中心に据えて、顧客の期待に応えるべく各機能がそれぞれの役割を最大限に果たさなくてはならない。\n\n・マーケティングは、顧客の期待を明確化し、顧客ニーズの充足を保証するために、企業内のさまざまな機能を統合する役割を担っている。", "source": "グロービス マネジメントブック 改訂3版\n\n2．マーケティングの役割 P.50-51"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 3, "question": "■問3.マーケティングの観点からビジネスを構築していくためのプロセスは、6つのステップに大別されます。マーケティング戦略立案の流れに沿うように、並べて下さい。\nA.マーケティング・ミックス(4P)\n\nB.マーケティング施策の実行と評価\n\nC.セグメンテーション(市場細分化)\n\nD.マーケティング環境分析と市場機会の発見\n\nE.ポジショニング\n\nF.ターゲティング(標的市場の選定)", "answer": "D→C→F→E→A→B", "explanation": "マーケティング戦略立案の流れは、以下の通りです。\n\n①マーケティング環境分析と市場機会の発見\n\n②セグメンテーション(市場細分化)\n\n③ターゲティング(標的市場の選定)\n\n④ポジショニング\n\n⑤マーケティング・ミックス(4P)\n\n⑥マーケティング施策の実行と評価\n\nただし、このプロセスは必ずしも一方向的な流れではなく、行きつ戻りつすることもあります。\n\n実際には、制約条件などによりどれか動かせない要素があるため、さかのぼって整合性をとることも多いことを、覚えておきましょう。", "source": "グロービス マネジメントブック 改訂3版\n\n3.マーケティング・マネジメント P.52-53"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 4, "question": "■問4.機会と脅威の捉え方に関する説明として、正しいものを全て選びなさい。\nA. 市場の機会と脅威は通常、外部分析から導かれるが、他社の機会が必ずしも自社にとっても好機であるとは限らない。\n\nB. 規制緩和は、競争激化という脅威にも、新たな参入機会にもなりうる。\n\nC. 企業は、発見した事実をすぐ脅威と決めつけず、機会にできないかを考える姿勢が大切である。\n\nD. 機会と脅威を見つける際には、環境変化を本質まで掘り下げて分析することがポイントだ。単に売上高だけを見て判断するのは早計である。", "answer": "全て正解", "explanation": "", "source": "グロービス マネジメントブック 改訂3版\n\n4.市場の機会の発見 P.54-55"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 5, "question": "■問5.マーケティング・リサーチについて適切なものを選択してください。\nA.リサーチに使われるデータには、新聞などで一般に公表されているデータのように他の目的のために収集された「1次データ」と、特定の目的のために収集する「2次データ」がある。\n\nB. リサーチに使われるデータの収集方法には、ヒアリングやフォーカスグループへのインタビューなどで言葉や会話から内容をとらえる「定量リサーチ」、アンケートなどを用いて調査結果を統計的に数値でとらえる「定性リサーチ」がある。\n\nC.リサーチでは、現状から考えられる仮説と予測される結果を必ず事前に考え、調査結果との違いを評価する、データ駆動型のアプロ―チが望ましい。\n\nD.製品やサービスを統合的に評価する時には、コンジョイント分析を用いる。これは顧客が複数の商品の中から１つを選ぶ場合、価格や色、デザイン、品質などの各項目が、どの程度その選考に影響を与えているかを知るための分析手法の１つである。", "answer": "D", "explanation": "A:「1次データ」と「2次データ」が逆です。\n\nB:「定性リサーチ」と「定量リサーチ」が逆です。\n\nC:「データ駆動型」でなく「仮説検証型」のアプローチが正解です。\n\n最初は仮説検証が大切です。とりあえず手の入るデータを集めて導くのは、誤った結論を得る可能性が高いです。", "source": "グロービス マネジメントブック 改訂3版\n\n5.マーケティング・リサーチP.56-57"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 6, "question": "■問6.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n・不特定多数の顧客を、同じ性質やニーズを持つ小集団に切り分け、整理する事を(①)という。\n\n・(①)の切り分ける際の軸(変数)として、地理的変数・人口動態変数に加え、昨今では(②)も重要視されている。\n\n・切り分けた顧客層のうち、どの層にアプローチするかを決めることを(③)という。\n\nA. ①セグメンテーション ②ターゲティング ③心理的変数・行動変数\nB. ①セグメンテーション ②心理的変数・行動変数 ③ターゲティング\nC. ①ターゲティング ②セグメンテーション ③心理的変数・行動変数\nD. ①ターゲティング ②心理的変数・行動変数 ③セグメンテーション", "answer": "B", "explanation": "・市場を軸（変数）で切り分ける際には、以前は容易な地理的変数、人口動態変数がよく用いれらていたが、最近は消費者ニーズの多様化や個性化にあわせ、心理的変数、行動変数が重視されるようになった。", "source": "グロービス マネジメントブック 改訂3版\n6 .セグメンテーションとターゲティング p.58-59\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 7, "question": "■問7.ポジショニングの役割や特徴について、誤っているものをすべて選択してください。\nA.ポジショニングは、ターゲット顧客の頭の中に独自のポジションを築き、明確でユニークな差別化イメージを植え付けるための活動である\n\nB.まったく同じ内容の製品やサービスであれば、ポジショニングが変わってもマーケティングの施策は変わらない\n\nC.ポジショニングを検討するときには、顧客視点で考えることがポイントであり、ターゲット顧客が重視するKSFをもとに競合製品といかに差別化できるかを考える方法や、製品の属性を軸にして2次元のマップを描き、有効なポジションを視覚的に探す方法などがある\n\nD.製品のポジショニングが売り手企業自体やその既存製品のポジショニングと整合していないと、顧客に混乱した印象を与えるだけでなく、既存製品の売上や企業全体のイメージにもダメージを与える可能性がある", "answer": "BとCが誤り", "explanation": "B.まったく同じ内容の製品やサービスであっても、ポジショニングが変わればマーケティングの施策は異なったものになるので不正解。\n\nC.ターゲット顧客が重視するKSFをもとに競合製品といかに差別化できるかを考える方法とあるが、KSFではなくKBFが正解。", "source": "グロービス マネジメントブック 改訂3版\n\n7.ポジショニング P.60‐61\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 8, "question": "■問8.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n・製品はその構成要素を3つに分解できる。\n\n・（①）は顧客の本質的なニーズを満たすための、根本となる機能や価値のことである。\n\n・（②）は（①）に付随する製品特性やスタイル、品質、ブランド、パッケージなどのことである。\n\n・（③）はアフターサービスや保証など付加的な要素のうち、顧客が価値を認めるものを言う。\n\n・市場が発達して競合の類似製品が出回るようになると、（③）での差別化が重要になったりする。\n\nA. ①形態 ②コア ③付随機能\n\nB. ①コア ②付随機能 ③形態\n\nC. ①コア ②形態 ③付随機能\n\nD. ①付随機能 ②形態 ③コア", "answer": "C", "explanation": "・製品は「コア」「形態」「付随機能」の3要素で構成されます 。\n\n・自動車の場合、「コア」は人や物を載せて運ぶという運搬機能を指し、「形態」は自動車の色やスタイル、モデル名、燃費、安全性、最高速度がこれに当り、「付随機能」は保証や保険、カーローン、アフターサービスなどが該当する。", "source": "グロービス マネジメントブック 改訂3版\n8.製品特性 P.62-63"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 9, "question": "■問9.下記、文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・ブランドには主に３つの機能がある。\n\n第1は、購買に関する情報処理の時間やコストを節約する「（①）」機能だ。顧客は購買にあたって、リスク回避のためにさまざまな情報を収集する。だが、製品のすべてを完全に理解することは難しいので、ブランドを目印に製品を認識することも多い。\n\n第2は、購買リスクの軽減・回避に役立つ「（②）」機能だ。顧客は過去の評判などから、そのブランドが信頼できると確信すれば、それ以上の情報探索はしなくなる。\n\n第3は、ブランドによって満足感が高まったり、自己実現の手段となる「（③）」機能である。不況時でもグッチやエルメスの人気が衰えないのは、ブランドから連想されるイメージが好ましく、忠誠心の高い顧客が存在するからだ。\n\nA. ①識別 ②品質保証 ③意味づけ\n\nB. ①識別 ②意味づけ ③品質保証\n\nC. ①意味付け ②識別 ③品質保証\n\nD. ①品質保証 ②品質保証 ③識別", "answer": "A", "explanation": "・ブランドには主に３つの機能がある。\n\n第1は、購買に関する情報処理の時間やコストを節約する「①識別」機能だ。顧客は購買にあたって、リスク回避のためにさまざまな情報を収集する。だが、製品のすべてを完全に理解することは難しいので、ブランドを目印に製品を認識することも多い。\n\n第2は、購買リスクの軽減・回避に役立つ「②品質保証」機能だ。顧客は過去の評判などから、そのブランドが信頼できると確信すれば、それ以上の情報探索はしなくなる。\n\n第3は、ブランドによって満足感が高まったり、自己実現の手段となる「③意味づけ」機能である。不況時でもグッチやエルメスの人気が衰えないのは、ブランドから連想されるイメージが好ましく、忠誠心の高い顧客が存在するからだ。", "source": "グロービス マネジメントブック 改訂3版\n\n9.ブランド P64-65"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 10, "question": "■問10.下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・こんな新しい技術が開発されたが、何か利用できる方法はないだろうかと発想する開発を（①）型開発と言う。\n\n・顧客の（②）を発見し、何か解決できる方法はないだろうかと発想する開発を（②）型開発と言う。\n\n・想定するユーザーがそれを使っている場面をイメージできるまで具体化されたものを製品（③）と言う。\n\n・市場に提供するその製品固有の機能や特徴を製品（④）と言う。\n\nA. ①アイデア ②コンセプト ③シーズ ④ニーズ\n\nB. ①コンセプト ②アイデア ③ニーズ ④シーズ\n\nC. ①シーズ ②ニーズ ③コンセプト ④アイデア\n\nD. ①ニーズ ②シーズ ③アイデア ④コンセプト", "answer": "C", "explanation": "・こんな新しい技術が開発されたが、何か利用できる方法はないだろうかと発想する開発をシーズ型開発と言う。\n・顧客のニーズを発見し、何か解決できる方法はないだろうかと発想する開発をニーズ型開発と言う。\n\n・想定するユーザーがそれを使っている場面をイメージできるまで具体化されたものを製品コンセプトと言う。\n\n・市場に提供するその製品固有の機能や特徴を製品アイデアと言う。", "source": "グロービス マネジメントブック 改訂3版\n10.新製品開発 P.66-67\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 11, "question": "■問11. 市場の発達段階によって顧客のタイプが異なる。社会学者のE.M.ロジャースが新製品をどれだけ早く買ったかに注目して5つに分類している。時間軸で並べたときに、正しいものを選んでください。\nA. イノベーター→アーリー・アダプター→フォロワー→レイト・フォロワー→ラガード\n\nB.イノベーター→ラガード→フォロワー→レイト・フォロワー→アーリー・アダプター\n\nC.アーリー・アダプター→イノベーター→フォロワー→レイト・フォロワー→ラガード\n\nD.ラガード→アーリー・アダプター→フォロワー→レイト・フォロワー→イノベーター", "answer": "A", "explanation": "イノベーター→アーリー・アダプター→フォロワー→レイト・フォロワー→ラガード\n\nイノベーター 改革者\n\nアーリー・アダプター 初期採用者\n\nフォロワー 初期大衆\n\nレイト・フォロワー 後期大衆\n\nラガード 採用遅滞者\n\n市場の発達段階によって顧客のタイプが異なるのは、新商品の受容において、顧客の性格や価値観が反映されるからである。", "source": "グロービス マネジメントブック 改訂3版\n\n11．製品ライフサイクル P.68-69\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 12, "question": "■問12.マーケティングにおける価格と事業経済性について、誤っているものをすべて選択してください。\nA.価格は企業が得るキャッシュに直結し、企業収益を直接的に規定する要因だ。また、最もダイレクトに消費者に訴えることができるメッセージ手段でもある。\n\nB.企業は提供する製品の価値レベルを何らかの方法で表示し、消費者に伝える必要があるが、その際に最もわかりやすい共通の尺度が金銭的尺度、つまり価格だ。\n\nC.価格は競合企業に対するシグナルの役目も果たす。\n\nD.価格を決める場合、競合企業の価格は無視することができる。同様に自社の価格もまた相手の価格戦略に影響は特に与えない。", "answer": "Dのみ誤り", "explanation": "A.価格は企業が得るキャッシュに直結し、企業収益を直接的に規定する要因だ。\n\nまた、最もダイレクトに消費者に訴えることができるメッセージ手段でもある。\n\nB.企業は提供する製品の価値レベルを何らかの方法で表示し、消費者に伝える必要があるが、その際に最もわかりやすい共通の尺度が金銭的尺度、つまり価格だ。\n\nC.価格は競合企業に対するシグナルの役目も果たす。\n\nD.価格を決める場合、競合企業の価格を無視することはできない。\n\n同様に自社の価格もまた相手の価格戦略に影響を与える。", "source": "グロービス マネジメントブック 改訂3版\n\n12．価格と事業経済性 P.70-71"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 13, "question": "■問13.価格に影響を及ぼす要因にはさまざまなものがありますが、価格設定の際にとくに注意したいのが、①コスト、②カスタマー・バリュー、③競争環境 です。それぞれの記述について、誤っているものを1つ選択して下さい。\n①コスト：\n\n利益を確保するためにはコストを上回る価格が必要なので、\n\nコストが価格の最低限度(価格の下限)となる。\n\n②カスタマー・バリュー：\n\n「企業が適性と認める金額」のことであり、価格設定における上限となる。\n\n③競争環境：\n\n競争上、自社の都合だけで価格を設定できず、\n\n競合の価格やその動向に影響を受ける場合がある。", "answer": "②が誤り", "explanation": "正しくは、\n\n②カスタマー・バリュー：\n\n「顧客が適性と認める金額」のことであり、価格設定における上限となる。\n\nとなります。(×企業 〇顧客)\n\nカスタマー・バリューを決定することは難しく、リサーチ力などマーケターのスキルが問われる分野でもあります。", "source": "グロービス マネジメントブック 改訂3版\n\n13.戦略的価格設定 P.72-73"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 14, "question": "■問14.流通チャネルの機能と付加価値構造に関する説明として、誤っているものを全て選びなさい。\nA. 流通チャネルは、製品と顧客の間のギャップを埋めるために、「物流」「商流」「情報流」の3つのフローに関わっている。\n\nB. 商流には、運搬や在庫保管など、物理的な製品の移動に関する活動が含まれる。\n\nC. 流通チャネルは、ファイナンス機能やリスク分担といった役割も担っている。\n\nD. 物流コストは売上高に占める割合が低く、企業にとって大きな課題にはなっていない。", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 15, "question": "■問15.流通チャネルの構築プロセスについて①～⑤の内容が適切なものをAからDより選択してください。\n流通チャネルの構築は、流通チャネルの「①」、流通チャネルの「②」、展開「③」の決定、チャネル・「④」の選定、チャネルの「⑤」政策の決定という視点から行う。\n\nA：①メンバー、②動機づけ、③長さ、④幅、⑤エリア\n\nB：①幅、②エリア、③メンバー、④動機づけ、⑤長さ\n\nC：①長さ、②幅、③エリア、④メンバー、⑤動機づけ\n\nD：①動機づけ、②長さ、③幅、④エリア、⑤メンバー", "answer": "C", "explanation": "流通チャネルの構築は、流通チャネルの「長さ」、流通チャネルの「幅」、展開「エリア」の決定、チャネル「メンバー」の選定、チャネルの「動機づけ」政策の決定という視点から行う。です！", "source": "グロービス マネジメントブック 改訂3版\n\n15.流通チャネルの構築プロセスP.76-77"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 16, "question": "■問 16. 下記文章中のうち、誤っているものを選択肢AからDの中から選んでください。\nＡ．顧客が購買に至るまでには、一般に認知、理解、愛好、選好、確信、購買の6段階のプロセスを経ると言われている。\n\nＢ．企業は自社製品を顧客に購入してもらうために、注意を促し(Attention)、興味を持たせ(Interest）、欲求を喚起し(Desire)、購買行動を起こさせる(Action)ようなメッセージを伝えなければならない。これを消費者の態度変容プロセスという。\n\nC．企業は顧客とのコミュニケーションを通じ顧客に態度変容を促すが、これらのコミュニケーション手段は、広告、セールス・プロモーション(販売促進)、人的販売、パブリシティ、クチコミの５つに大別される。\n\nD．コミュニケーション戦略のうち、広告やパブリシティ を利用してメーカーが直接顧客に働きかける戦略をプッシュ戦略、メーカーから卸売→小売業者→顧客に働きかける戦略をプル戦略という。", "answer": "D が誤り", "explanation": "・メーカーから卸売業者、小売業者を経て製品が顧客に到着する過程において、流れの上から下へ働きかける戦略をプッシュ戦略と言う。\n\n・一方プル戦略では、広告やパブリシティなどを利用してメーカーが直接顧客に働きかけて購買意欲を喚起し、指名買いさせることを狙う。", "source": "グロービス マネジメントブック 改訂3版\n\n16 . 購買決定プロセスとコミュニケーション手段 p.78- 79"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 17, "question": "■問17.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・（①）戦略の役割は、「伝える場の確保」だ。ターゲットのプロフィールやサイズ、エリアに合わせて、さまざまな長所・短所を併せ持つ（①）を戦略的に組み合わせ（①・ミックス）、予算内で最大限の費用対効果を得なくてはならない。\n\n・（②）戦略の第一歩は、企業が伝えるべき製品の属性を選び出すことだ。\n\n・製品コンセプトを決める際、（③）が明確であれば、それをマーケットにコミュニケートするという観点から確認・検証する。\n\n・（③）が曖昧なときは、どの属性を訴えれば（④）の達成に最も効果的であるかを見極めなくてはいけない。\n\nA. ①クリエイティブ ②メディア ③マーケティング目標 ④ポジショニング\n\nB. ①メディア ②クリエイティブ ③ポジショニング ④マーケティング目標\n\nC. ①クリエイティブ ②広告 ③ポジショニング ④マーケティング目標\n\nD. ①メディア ②マーケティング目標 ③ポジショニング ④クリエイティブ", "answer": "B", "explanation": "・メディア戦略の役割は、「伝える場の確保」だ。ターゲットのプロフィールやサイズ、エリアに合わせて、さまざまな長所・短所を併せ持つメディアを戦略的に組み合わせ、（メディア・ミックス）、予算内で最大限の費用対効果を得なくてはならない。\n\n・クリエイティブ戦略の第一歩は、企業が伝えるべき製品の属性を選び出すことだ。製品コンセプトを決める際、ポジショニングが明確であれば、それをマーケットにコミュニケートするという観点から確認・検証する。また、ポジショニングが曖昧なときは、どの属性を訴えればマーケティング目標の達成に最も効果的であるかを見極めなくてはいけない。", "source": "グロービス マネジメントブック 改訂3版\n\n17.広告戦略 P.80-81\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 18, "question": "■問18. セールス・プロモーションの特徴について、誤っているものを1つ選択してください。\nA.広告が顧客の意識下に累積的にイメージを浸透させるプル効果を主目的とするのに対し、セールス・プロモーションは広告などで高まった顧客の関心を購買に直結させる意図を持つため、即物的な面が強い\n\nB.流通チャネル向けのセールス・プロモーションは、報奨金や報奨旅行、コンテスト、リベートなど、卸売業者や小売業者に対するインセンティブがあり、消費者の目には触れない形で行われるケースも多い\n\nC.消費者向けのセールス・プロモーションは、製品の試用や値引き、景品（おまけ）の提供等を通じて直接的な購入を促す活動であり、サンプリングや店頭ディスプレイ、イベントへのスポンサーシップなど多岐にわたる\n\nD.セールス・プロモーションは、長期的なブランドイメージを構築するための最も効果的な手段であり、広告よりも累積的な効果が高い", "answer": "D", "explanation": "セールス・プロモーションは、顧客の関心を購買に直結させる意図を持つため「即物的な面」が強い手段です。\n\nこれに対し、広告は顧客の意識下に累積的にイメージを浸透させるプル効果を主目的としており、セールス・プロモーションはむしろ広告を補う機能として位置づけられます。", "source": "グロービス マネジメントブック 改訂3版\n\n18.セールス・プロモーションと販売戦略 P.82-83"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 19, "question": "■問19.下記、文章の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・顧客維持型マーケティングの類型（手法）として、「ワン・トゥ・ワン・マーケティング」と「データベース・マーケティング」などがある。\n\n・ワン・トゥ・ワン・マーケティングは、「（①）」を把握することを前提に展開されるマーケティングで、「（②）」を高めることではなく、「（③）」を高めることに焦点が置かれる。\n\nA. ①顧客一人ひとり ②市場シェア ③顧客内シェア\n\nB. ①製品品質 ②顧客内シェア ③市場シェア\n\nC. ①製品品質 ②市場シェア ③製品認知度\n\nD. ①顧客一人ひとり ②顧客内シェア ③製品認知度", "answer": "A", "explanation": "・ワン・トゥ・ワン・マーケティングは、「 ①顧客一人ひとり」を把握することを前提に展開されるマーケティングで、「②市場シェア」を高めることではなく、「③顧客内シェア」を高めることに焦点が置かれる。つまり、市場内の何人の顧客に買ってもらうかよりも、1人の顧客に何回かってもらうかを重視する。\n\n顧客を企業にとっての「パートナー」と考え、彼らとの間に好ましい関係や歴史を構築しながら、\n\n生涯にわたる彼らのニーズを満たす製品を提供し続け、最大限の利益をその顧客から得ることがポイントとなる。", "source": "グロービス マネジメントブック 改訂3版\n\n19.顧客維持型マーケティング P.84-85\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 20, "question": "■問20.以下の文章からBtoBマーケティングの特徴として誤っているものをすべて選択してください。\nA.エンドユーザーと購入意思決定者が同一である\n\nB.製品・サービスが顧客企業の競争力に寄与するか否かがKBFとなる\n\nC.組織ならではの保守性や硬直性を持っている\n\nD.顧客が少なく、特定しやすい\n\nE.多くのユーザーがいるため、新しいサービスが採用されやすい\n\nF.提供する製品・サービスがコモディティであるほど、顧客企業の関心はブランドにシフトする", "answer": "AとEとFが誤り", "explanation": "BとCとDは記載の通り。\n\nAは「同一である」が誤り。BtoBではエンドユーザーと購入意思決定者が異なる。\n\nEは「新しいサービスが採用されやすい」が誤り。BtoBでは多くのユーザーがいるため、慣性が働きやすい。\n\nFは「ブランド」が誤り。コモディティであるほど、顧客企業の関心はコストにシフトする。", "source": "グロービス マネジメントブック 改訂3版\n\n20.BtoBマーケティング P.86-87\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 21, "question": "■問21.レピュテーション・マネジメントの必要性に関する説明として、誤っているものを1つ選びなさい。\nA.悪いレピュテーションのほうがよいレピュテーションよりも広がりやすいため、企業は悪いレピュテーションを初期の段階で食い止めることに注目している。\n\nB.事故や不祥事が起こった際の経営陣の不用意な発言などは、レピュテーションを毀損する典型的な要因となる。\n\nC.レピュテーションは、企業のさまざまな活動やコミュニケーションがそのまま人々に正確に伝わることで形成される。\n\nD.人々は、情報の断片を組み合わせて、その企業のレピュテーションを頭の中に形成する。", "answer": "C", "explanation": "現代人は忙しく、情報の山に埋もれてしまいがちだ。企業のさまざまな活動やコミュニケーションが、そのまま人々に伝わることを期待してはいけない。人々は、情報の断片を組み合わせて、その企業のレピュテーションを頭の中に形成するからだ。人々を不用意に刺激する発言や行動は、他の真面目なレピュテーションの向上・維持の努力を台無しにしてしまう。認識は受け手が決定するのだ、ということを強く再確認する必要がある。", "source": "グロービス マネジメントブック 改訂3版\n21.レピュテーション P.88-89"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 22, "question": "■問22.下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢 AからDのうちから選んでください。\n・マーケティングではなぜ（①）を軸に考えなくてはならないのか。それは企業が（②）に成長するには、企業に収益をもたらす顧客の創造と維持が欠かせないからだ。\n\n・顧客を引きつけるためには、顧客ニーズを満たす製品を生み出し、常に（①）を高める努力が必要である。\n\n・顧客の欲求を表す概念として「（③）」と「（④）」がある。（③）とは、衣食住などの生理的なことから社会的、文化的、個人的なことに至るさまざまな事柄に対して人間が感じる「満たされない状態」のことだ。これに対して（④）は、（③）を満たすために製品化されたものを求める感情、つまり「具体的な製品やサービスへの欲求」のことである。\n\nA. ①営業活動 ②単発的 ③ウォンツ ④ニーズ\n\nB. ①市場調査 ②継続的 ③ニーズ ④ウォンツ\n\nC. ①顧客満足 ②継続的 ③ニーズ ④ウォンツ\n\nD. ①顧客満足 ②単発的 ③ウォンツ ④ニーズ", "answer": "C", "explanation": "・マーケティングではなぜ顧客満足を軸に考えなくてはならないのか。それは企業が継続的に成長するには、企業に収益をもたらす顧客の創造と維持が欠かせないからだ。\n\n・顧客を引きつけるためには、顧客ニーズを満たす製品を生み出し、常に顧客満足を高める努力が必要である。\n\n・顧客の欲求を表す概念として「ニーズ」と「ウォンツ」がある。ニーズとは、衣食住などの生理的なことから社会的、文化的、個人的なことに至るさまざまな事柄に対して人間が感じる「満たされない状態」のことだ。これに対してウォンツは、ニーズを満たすために製品化されたものを求める感情、つまり「具体的な製品やサービスへの欲求」のことである。", "source": "グロービス マネジメントブック 改訂3版\n\n1．マーケティングの発想 P.48-49\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 23, "question": "■問23.マーケティング戦略は、全社レベル、事業レベル、製品レベルの各視点で考えなくてはならない。それぞれの記述について、誤っているものを1つ選択して下さい。\n①全社レベル：全社的視点に立って方針を決定したり、シナジーなどを考慮して事業部間の調整を図る必要がある。さらに、コーポレート・ブランドの育成や管理なども全社的な観点から考えなければならない。\n\n②事業レベル：セグメンテーションやターゲティング、ポジショニング、マーケティング・ミックスなどのマーケティング戦略の根幹を担っている。製品間の調整を図るときにも、事業レベルの視点が必要である。\n\n③製品レベル：扱っている製品について「だれに何をいくらで売るか。それをどのように認知させ、どのように供給するか」をトータルで考えていく。個々の製品ベースで最適なマーケティング戦略を考えれば良い。", "answer": "③が誤り", "explanation": "正しくは、\n\n【③製品レベル：扱っている製品について「だれに何をいくらで売るか。それをどのように認知させ、どのように供給するか」をトータルで考えていく。個々の製品ベースで最適なマーケティング戦略を考えていると、機能の重複などの無駄が生じたり、製品間や事業間の整合性がとれなくなったりする。】\n\nとなります。全社的視点に立って方針を決定したり、シナジーなどを考慮して事業部間の調整を図る必要があります。", "source": "グロービス マネジメントブック 改訂3版\n\n2.マーケティングの役割 P.50-51"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 24, "question": "■問24.マーケティング組織に関する説明として、誤っているものを1つ選びなさい。\nA. マーケティング活動を効果的に行うためには、組織構造や人事システムなどにも気を配ることが大切である。\n\nB. マーケティング活動の成果は主に設備やシステムによって決まるため、従業員の役割は限定的である。\n\nC. 市場環境の変化に応じて、組織構造を見直し再構築する必要が生じることがある。\n\nD. マーケティング担当者の成果に対して適切な評価や報酬制度がなければ、インセンティブは生まれにくい。", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 25, "question": "■問25.市場の機会の発見について①～④に入る語句の組み合わせとして適切なものを、選択肢A～Dより選択してください。\n外部環境ではマクロ環境、「①」について、内部環境では自社の「②」などを明らかにする。その後SWOT分析を行い、「③」を発見する。SWOT分析とは内部分析による自社の強み・弱みと、外部分析による市場の「④」をかけ合わせて総合的に判断するためのフレームワークである。\n\nA. ①経営資源、強み・弱み ②KSF ③機会・脅威 ④競合\n\nB. ①市場(顧客)、競合 ②経営資源や強み・弱み ③KSF ④機会・脅威\n\nC. ①機会・脅威 ②市場(顧客)、競合 ③強み・弱み ④KSF\n\nD. ①KSF ②機会・脅威 ③市場(顧客) ④強み・弱み", "answer": "B", "explanation": "外部環境ではマクロ環境、「市場(顧客)、競合」について、内部環境では自社の「経営資源や強み・弱み」などを明らかにする。その後SWOT分析を行い、「KSF」を発見する。SWOT分析とは内部分析による自社の強み・弱みと、外部分析による市場の「機会・脅威」をかけ合わせて総合的に判断するためのフレームワークである。です！", "source": "グロービス マネジメントブック 改訂3版\n\n4.市場の機会の発見P.54-55"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 26, "question": "■問 26. 下記選択肢AからDの文章の中から、誤っているものを全て選んでください。\nＡ．マーケティング戦略を策定する際、市場で起こっていることを把握し、自社のアイディアが市場に受け入れられるかどうかを確認する必要がある。そのため、考えられる仮説と予測される結果を事前に考え、調査結果との違いを評価する「仮説検証型のリサーチ」を実施する事が望ましい。\n\nＢ．リサーチは通常、1、仮説の設定 → 2、リサーチ目的の設定 → 3、リサーチの設計と実施 → 4、仮説の検証という手順で行われる。\n\nC．仮説を検証するために必要なデータを収集する際、新聞等で一般に公表されているデータのように他の目的のために集められたデータを「1次データ」 、特定の目的のために自らリサーチして集めるデータを「2次データ」と呼ぶ。\n\nD．自らリサーチしてデータを集める際、品質(正確さ)とコスト(金銭・時間的)のトレードオフを考える必要がある。また、調査の精度や回答率に影響を与える質問形式(記述か選択か)や、質問数等にも留意する必要がある。", "answer": "ＢとＣが誤り", "explanation": "Ａ：正しい\n\nＢ：1、リサーチ目的の設定 → 2、仮説の設定 の順番が正しい。まず誰がどのような目的でどのような情報を必要としているのか明確にして初めて、リサーチすべき問題や必要なデータを特定することができる。\n\nＣ：特定の目的のために集める情報を「1次データ」、一般に公表されているデータを「2次データ」と呼ぶ。\n\nＤ：正しい", "source": "グロービス マネジメントブック 改訂3版\n\n5 .マーケティング・リサーチ p.56- 57"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 27, "question": "■問27.どの顧客層（セグメント）をターゲットにするかを決めるのがターゲティングである。ターゲティングの際に注意すべき“6R”について、下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢AからCより選んでください。\n・有効な市場規模：その事業あるいは商売が成立する最低限の規模を獲得できる（①）でなければならない\n\n・（②）：一般的に、市場の生成期や成長段階の初期に、売上げやシェア獲得の大きなチャンスがある。\n\n・顧客の優先順位／波及効果：もし周囲への影響力の強い（①）があるならば優先的にアプローチをすべきである。\n\n・到達可能性：たとえ魅力的な（①）があっても、地理的に遠かったり、名簿を入手できなかったりすると、顧客に的確なアプローチができない。\n\n・（③）：すでに競合がその市場で大きな地位を占めている場合、市場の魅力度は低減する。競合の優位性が小さい領域で差別化できれば、新たな地位を獲得する可能性が広がる\n\n・（④）：実行されたアクションに対し、適切な結果がもたらされたかを測定すべきである。広告の効果や、商品に対する満足度の調査などが挙げられる。\n\nA. ①成長性 ②セグメント ③競合状況 ④反応の測定可能性\n\nB. ①セグメント ②成長性 ③競合状況 ④反応の測定可能性\n\nC. ①成長性 ②セグメント ③反応の測定可能性 ④競合状況", "answer": "B", "explanation": "ターゲティングを行うときは、特に以下の6点(6R)に注意し、総合的に判断しなくてはならない。\n\n有効な市場規模（Realistic Scale）\n成長性（Rate of Growth）\n顧客の優先順位／波及効果（Rank／Ripple Effect）\n到達可能性（Reach）\n競合状況（Rival）\n反応の測定可能性（Response）", "source": "グロービス マネジメントブック 改訂3版\n\n6.セグメンテーションとターゲティングP.58-59\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 28, "question": "■問28. ポジショニングを決定する際の留意点として、誤っているものを1つ選択してください。\nA.優れたポジショニングが想定する顧客イメージは、実際にその商品を購入すると想定されるターゲット顧客とは異なる場合がある。\n\nB.どんなに魅力的なポジショニングを考えていても、それを顧客にきちんと伝えるコミュニケーションの努力がなければ、顧客の頭の中に像は結ばれない。\n\nC.ポジショニングにおいては、売り手の意図が顧客に正確に伝わることが最優先であり、内容が売り手の独りよがりであっても、製品そのものが優れていれば成功する。\n\nD.製品のポジショニングが売り手企業自体やその既存製品のポジショニングと整合していないと、顧客に混乱した印象を与えるだけでなく、企業イメージを損なう可能性がある。", "answer": "C", "explanation": "ポジショニングを決定する際の留意点の一つには、「顧客にとって共感できること」が挙げられる。\n\n売り手の意図を正確に伝えられたとしても、それが売り手の独りよがりな内容であれば成功しない。製品を購入する顧客にとって意味がある、重要なポジショニングでなければならない", "source": "グロービス マネジメントブック 改訂3版\n7 ポジショニング P.60-61"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 29, "question": "■問29.マーケティング・ミックスにおける「製品の類型」について、誤っているものをすべて選択してください。\nA. 実務でよく使われる製品分類は、「物理特性」・「使用目的」・「顧客の購買プロセス」という切り口で分けたものである。\n\nB. 物理特性は、「非耐久財」・「耐久財」・「サービス」の３つに分類される。\n\nC. 使用目的は、個人消費のための「生産財」と、原材料や部品、設備品などの生産のために使用される「消費財」に分類される。\n\nD. 顧客の購買プロセスは、「最寄品」「買回品」「専門品」に分類される。", "answer": "Cのみ誤り", "explanation": "C. 使用目的は、個人消費のための「消費財」と、原材料や部品、設備品などの生産のために使用される「生産財」に分類される。生産財はさらに、「材料・部品」、「道具や機械などの「資本財」、保守・修繕に用いる「備品・サービス」に分けられる。", "source": "グロービス マネジメントブック 改訂3版\n\n製品特性  P.62-63\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": 30, "question": "■問30.強いブランドを持つことで企業が得られる効果について、誤っているものをすべて選択してください。\nA.商標権を設定することで法的保護が受けられ、競合と差別化できる\n\nB.顧客のブランド・ロイヤルティを得て、安定的な売上げを確保できる\n\nC.低価格が設定可能になり、プロモーションへの依存度が小さくなり、販売数量の増加を実現できる\n\nD.新規参入者に対する障壁となり、競争優位の構築に貢献する", "answer": "Cが誤り", "explanation": "AとBとDは記載の通り。\n\nCの「低価格設定」と「販売数量の増加」が誤り。強いブランドによってプレミアム価格が設定可能になり、プロモーションへの依存度が小さくなり、高マージンを実現できる。", "source": "グロービス マネジメントブック 改訂3版\n9.ブランド P.64-65\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MKT"}, {"subject": "GMAP2026S_MKT", "tag": "GMAP2026S_MKT", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 1, "question": "■問1.「経営者の第一の使命は〇〇価値の最大化である。」\n〇〇に入る言葉を以下の選択肢から選んで答えなさい。\n\nA.顧客\n\nB.株主\n\nC.自社\n\nD.市場", "answer": "B.株主", "explanation": "戦略策定では方向性を示さなくてはならないが、その前にまず企業の目的を知っておく必要がある。そもそも企業は何のために日々の活動を行っているのだろうか。経営者の第一の使命は株主価値の最大化である。欧米では「企業は株主のもの」という考え方が一般的だ。日本でもグローバル化や市場の要請を受けて、IR （インベスターズ・リレーションズ：投資家向け広報活動）の強化や利益重視の経営指標の導入など、企業経営の透明性を高め、株主重視の姿勢を打ち出そうとする企業が増えている。", "source": "グロービス マネジメントブック 改訂3版\n\n1.経営戦略の意義と企業の目的 P.2-3\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 2, "question": "■問2.経営理念、経営戦略、全社戦略、事業戦略について、正しいものを全て選択してください。\nA.経営理念は、企業の存在意義や使命を普遍的な形で表した基本的価値観であり、従業員の求心力を高めたり、企業文化の形成に役割を果たしたりするもので、ビジョンとも言う。\n\nB.経営戦略とは、経営理念を実現するために、企業がどの事業領域でどのように戦うのかを示す具体的な方法論のことである。\n\nC.全社戦略とは、経営戦略の3つの戦略レベルのうち、どのように事業を組み合わせ、どのように各事業に経営資源を配分するかを決定することである。\n\nD.事業戦略とは、経営戦略の3つの戦略レベルのうち、個別の事業分野において競争に勝ち抜くための戦略をいう。事業の組み合わせや相乗効果を考慮し、事業間の整合性を保ちつつ事業戦略を構築することが、多角化企業の事業戦略において求められる。", "answer": "Cのみ", "explanation": "A：前段は正しい。経営理念は企業の存在意義や使命を普遍的な形で表した基本的価値観。一方ビジョンは、経営理念に基づき、自社が目指す中期的なイメージを示すもの。\nB：説明は全社戦略について。経営戦略は、経営理念と現実との間のギャップを埋めるための具体的な方法論をいい、全社戦略だけでなく事業戦略や機能戦略も含む。\n\nC：正しい\n\nD：前段は正しい。事業の組み合わせや資源配分について、事業間の調整を図り、相乗効果の発揮を検討し、事業間の整合性を考慮するのは全社戦略の役割。", "source": "グロービス マネジメントブック 改訂3版\n\n2.経営理念と戦術レベル P.4-5"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 3, "question": "■問3.下記文章中の（①）～（⑦）に入る語句を選択肢A～Gのうちから選んでください。\n戦略策定プロセスは通常、以下の流れをたどる。このプロセスは一方通行の流れではなく、仮説・検証を繰り返したり、実施結果や環境変化に応じて戦略の見直しを行うことも大切だ。\n\n・（①）：戦略目標を策定する際の思想的なバックボーンとなる。\n\n・（②）：自社を取り巻く内外の環境に目を配る。市場における機会と脅威の発見、経営資源や自社の構造上の強みや弱みの把握によって、自社にとってのビジネスチャンスを見つける。\n\n・（③）：②を踏まえて、当該事業を成功させるための要件を探り、それを実現するために何をすべきかを検討する。\n\n・（④）：事業目標に到達するために戦略案を何通りか考え出し、事業展開の可能性を探る。\n\n・（⑤）：予想される結果や必要となる資源、実行の難易度などを検討し、実行すべき戦略を絞り込む。\n\n・（⑥）：戦略の遂行度合いを示す指標を設定し、どの程度実行されているかを把握できるようにする。複数のアクションプランが整合性を保ちながら実行できるように、評価・報奨制度、コミュニケーション、意思決定のルールなども整備する。\n\n・（⑦）：当初設定した期間終了後に、期待された効果を上げたか確認する。うまくいかなかった場合はその原因を解明し、必要に応じて修正案を考える。\n\nA. 戦略の選択\n\nB. 環境分析\n\nC. 戦略オプションの立案\n\nD. 経営理念・ビジョン\n\nE. 戦略のレビュー\n\nF. 成功要因（Key Success Factor）の抽出\n\nG. 戦略の実行", "answer": "①D、②B、③F、④C、⑤A、⑥G、⑦E", "explanation": "・①D. 経営理念・ビジョン：戦略目標を策定する際の思想的なバックボーンとなる。\n\n・②B.環境分析：自社を取り巻く内外の環境に目を配る。市場における機会と脅威の発見、経営資源や自社の構造上の強みや弱みの把握によって、自社にとってのビジネスチャンスを見つける。\n\n・③F. 成功要因（Key Success Factor）の抽出：環境分析を踏まえて、当該事業を成功させるための要件を探り、それを実現するために何をすべきかを検討する。\n\n・④C. 戦略オプションの立案：事業目標に到達するために戦略案を何通りか考え出し、事業展開の可能性を探る。\n\n・⑤A. 戦略の選択：予想される結果や必要となる資源、実行の難易度などを検討し、実行すべき戦略を絞り込む。\n\n・⑥G. 戦略の実行：戦略の遂行度合いを示す指標を設定し、どの程度実行されているかを把握できるようにする。複数のアクションプランが整合性を保ちながら実行できるように、評価・報奨制度、コミュニケーション、意思決定のルールなども整備する。\n\n・⑦E.戦略のレビュー：当初設定した期間終了後に、期待された効果を上げたか確認する。うまくいかなかった場合はその原因を解明し、必要に応じて修正案を考える。", "source": "グロービス マネジメントブック 改訂3版\n\n3．戦略策定プロセス P.6-7"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 4, "question": "■問4.全社戦略で主に注目すべき3つの要素はどれか。\nA.ドメイン、コア・コンピタンス、資源配分\n\nB.売上高、利益率、株価\n\nC.製品価格、広告宣伝、在庫管理\n\nD.採用、教育、評価制度", "answer": "A", "explanation": "全社戦略では主に、 ドメイン（事業を展開する領域）、 コア・コンピタンス（企業の中核的な力）、 資源配分（経営資源の全体的な最適化）に注目する必要がある。これらは持続的な競争優位を構築するために不可欠な要素だ。つまり、 どこで戦うのか「戦う土俵」を決め、 そこで他社より優位に立てる能力を発揮し、 その優位性を維持・発展できるように経営資源（ヒト、モノ、カネなど）を配分することによって、その企業の競争優位は確固たるものになる。", "source": "グロービス マネジメントブック 改訂3版\n\n4.全社戦略の構成要素(1)：ドメイン P.8-9\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 5, "question": "■問5. 企業の「コア・コンピタンス」を見極める場合に考える点について、次の5つから「誤っているもの」を全て選択してください。\n① 模倣可能性(Imitability)\n\n② 移転可能性 (Transferability)\n\n③ 代替可能性 (Substitutability)\n\n④ 信頼性 (Reliability)\n\n⑤ 耐久性 (Durability)", "answer": "「④のみ」が誤り。", "explanation": "正しくは、「④ 稀少性 (Scarcity)」です。\n\n「コア・コンピタンス」は企業内部で培った中核的な力で、自社独自の価値を生み出す源泉となります。「コア・コンピタンス」を見極める場合、5つの要素「① 模倣可能性(Imitability)、② 移転可能性 (Transferability)、③ 代替可能性 (Substitutability)、④ 稀少性 (Scarcity)、⑤ 耐久性 (Durability)」について考える必要がある。①②③の可能性が低いほど、また④⑤が高いほど、競争優位は持続しやすくなると言われる。\n\nなお、競争優位を築けたとしても、市場環境の変化とともに陳腐化するおそれがあるため、「継続的な投資」「コア・コンピタンスの再定義」「新たな能力の育成」などの努力が欠かせません。", "source": "グロービス マネジメントブック 改訂3版\n\n全社戦略の構成要素(2)：コア・コンピタンスと資源配分 P.10-11"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 6, "question": "■問6.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n・事業ポートフォリオは、事業の（①）、自社の（②）、他の事業との（③）という3つの視点から考える必要がある。\n\nA. ①ライフサイクル ②ブランド力 ③エナジー\n\nB. ①魅力度 ②競争優位 ③シナジー\n\nC. ①実現性 ②株主 ③カニバリズム\n\nD. ①多角化 ②顧客 ③収益性", "answer": "B", "explanation": "・事業ポートフォリオとは、①事業の魅力度、②自社の競争優位、③他の事業とのシナジーという3つの視点から考える必要がある。", "source": "グロービス マネジメントブック 改訂3版\n\n6.事業ポートフォリオと事業ライフサイクル P.12-13（タイトル下にあるPOINTより）\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 7, "question": "■問7.下記文章中の（①）～（④）に入る語句として適切なものを選択肢A～Dのうちから一つ選んでください。\nプロダクト・ポートフォリオ・マネジメント(PPM)モデルでは「市場成長率」と「相対マーケットシェア」の2軸でマトリクスをつくり、事業を４つの象限に分けている。\n\n成長性は高いがシェアの低い（①）では、早いうちに集中投資してシェアを拡大する戦略をとるか、思い切って撤退するかの判断が必要だ。\n\nシェアは高いが成長率の低い（②）では、投資をシェア維持に必要な最小限度にとどめて収益を上げ、キャッシュを回収する戦略を取り、他の事業への資金源とする。\n\nシェアも成長性も高い（③）は、現在のシェアを維持しつつ成長するための投資を行い、将来の（②）に育てる。\n\nシェアも成長性も低い（④）は見込みがないため、買い手がいるうちに売却するなどの撤退戦略をとる。\n\nA. 負け犬\n\nB. 金のなる木\n\nC. 花形事業\n\nD. 問題児", "answer": "①：D.問題児、②：B.金のなる木、③：C.花形事業、④：A.負け犬", "explanation": "横軸「相対マーケットシェア」、縦軸「市場成長率」の図をイメージすると理解が深まるでしょう。", "source": "グロービス マネジメントブック 改訂3版\n\n7.ポートフォリオ・マトリクス P.14-15"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 8, "question": "■問8.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A\\~Dのうちから選んでください。\nアンゾフの事業拡大マトリクスには、次の３つの方向がある。1つめは、同じ市場に対して新しい（①）を行い、製品群の守備範囲を広げる方向である。２つめは、製品は変えずに新たな（②）を取り込み、市場拡大を図る方向である。３つめは、新製品を新市場に展開する拡大で、一般的に言われる「（③）」に相当する方向である。\n\nA. ①ブランド創出 ②技術 ③ポジショニング\n\nB. ①コスト削減 ②資源 ③新規参入\n\nC. ①製品開発 ②顧客 ③多角化\n\nD. ①マーケティング ②チャネル ③差別化", "answer": "C.", "explanation": "アンゾフの事業拡大マトリクスは、事業拡大を製品軸と市場軸でとらえる。製品軸を左右（左に既存製品、右に新製品）に置き、市場軸を上下（上に既存市場、下に新市場）を置いて、事業拡大を考える。１つめは、同じ市場に対して新しい製品開発を行い、製品群の守備範囲を広げる右方向への拡大だ。２つめは、製品は変えずに新たな顧客を取り込み、市場拡大を図る下方向への拡大だ。３つめは新製品を新市場に展開する右下方向への拡大で、これが一般的に言われる「多角化」に相当する。", "source": "グロービス マネジメントブック 改訂3版\n\n8.事業拡大と多角化の基本戦略 P.16-17"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 9, "question": "■問9. 競争優位を築くための基本戦略の1つである差別化戦略について、下記文章中の\n（①）～（④）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n\n・差別化戦略の差別化の源泉としては、（①）、（②）、（③）、（④）などが挙げられる。\n\nA. ①ブランド・イメージや独自開発 ②高品質素材 ③アフターサービス ④販売チャネル\n\nB. ①ブランド・イメージや独自技術 ②製品（性能やデザイン） ③顧客サービス ④販売チャネル\n\nC. ①ブランド・イメージや独自技術 ②製品（性能やデザイン） ③アフターサービス ④販売チャネルA\n\nD. ①ブランド・イメージや独自開発 ②高品質素材 ③顧客サービス ④販売チャネル", "answer": "B", "explanation": "差別化戦略では「自社の製品を差別化して、業界の中でもユニークだと見られる何かを創造すること」が基本テーマである。そのユニークさは、顧客に価値として認識され、競合に簡単に模倣できないのでなければならない。差別化の源泉としては、ブランド・イメージや独自技術、製品（性能やデザイン）、顧客サービス、販売チャネルなど、さまざまなものが挙げられる。", "source": "グロービス マネジメントブック 改訂3版\n\n9．競争優位を築くための基本戦略 P.18-19"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 10, "question": "■問10.規模の経済、経験曲線、範囲の経済について、誤っているものを全て選択してください。\nA.規模の経済とは、単位当たりの変動費は製品の生産量が増えても一定であるが、単位当たりの固定費は生産量が増えると低下する。すなわち、固定費の部分は規模が大きくなればなるほどコスト効率が向上することである。\n\nB.規模の経済は固定費にしか働かず、変動費については働かない。\n\nC.経験曲線とは、現時点までの累積の生産量、すなわち累積の経験量が増えるほどコスト低下に結びつくとする考え方である。\n\nD.範囲の経済とは、単一事業において規模が拡大することで、より経済的な事業運営が可能になることである。", "answer": "BとD", "explanation": "A：正しい\n\nB：変動費についても規模の経済が働く。たとえば、会計上は変動費とされる原材料の仕入価格も、生産量が増えれば購買量も増えるので、買い手の交渉力が増して値引き要求ができるようになる。\n\nC：正しい\n\nD：範囲の経済とは複数の事業活動を持つことにより、より経済的な事業運営が可能になること。たとえば、既存事業において有する販売チャネル、ブランド、固有技術、生産設備などの経営資源やノウハウを複数事業に共用できれば、それだけ経済的と言える。", "source": "グロービス マネジメントブック 改訂3版\n\n10．事業の経済性分析 P.20-21"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 11, "question": "■問11.空欄に入る言葉を以下の選択肢から選んで答えなさい。\n外部環境を分析する目的は、市場における(1)を探り、自社にとっての(2)を見つけることである。また、内部分析では自社の(3)と(4)を把握することに主眼が置かれる。この4つの要素を組み合わせたものが「SWOT分析」だ。環境分析の最終目標は自社にとっての(5)を発見することだが、SWOTを整理することにより、(6)や、自社にとっての(5)を導きやすくなる。\n\n選択肢：\n\na成功要因(KSF)\n\nb強み\n\nc脅威\n\nd存在意義\n\ne弱み\n\nf事業機会\n\ng顧客KBF\n\nh機会\n\ni利益", "answer": "(1)-h (2)-c (3)-b or e(4)-e or b (5)-f (6)-a", "explanation": "外部環境を分析する目的は、市場における機会(Opportunities)を探り、自社にとっての脅威(Threats)を見つけることである。また、内部分析では自社の強み(Strengths)と弱み(Weaknesses)を把握することに主眼が置かれる。この4つの要素を組み合わせたものが「SWOT分析」だ。環境分析の最終目標は自社にとっての事業機会を発見することだが、SWOTを整理することにより、成功要因(KSF)や、自社にとっての事業機会を導きやすくなる。", "source": "グロービス マネジメントブック 改訂3版\n\n11.外部環境分析 P.22-23\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 12, "question": "■問12.下記文章中の（①）～（⑤）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n・「５つの力」分析は、（①）を分析するときに役立つフレームワークである。\n\n・「５つの力」とは、（②）の脅威、（③）の脅威、（④）の交渉力、（⑤）の交渉力、業界内の競合他社を指す。\n\n・（②）が容易な業界では、業界の収益性が上がるとすぐに参入者が増加し、収益性が下がってしまう。\n\n・（③）の脅威とは、（③）の存在だけでなく、イノベーションにより従来の機能をまったく別の製品で代替できる場合なども含む。\n\n・（④）の交渉力が強くなるのは、製品の差別化が難しく他企業も類似製品をつくっている場合や、（④）の情報量が多い場合などである。\n\n・（⑤）の交渉力が強くなるのは、（⑤）の業界が寡占されている場合などである。\n\nA. ①自社の強み ②異業種の参入 ③新規参入 ④売り手 ⑤買い手\n\nB. ①市場規模 ②新規参入 ③既存競合 ④買い手 ⑤売り手\n\nC. ①業界構造 ②新規参入 ③代替品 ④買い手 ⑤売り手\n\nD. ①競争優位性の源泉 ②代替品 ③新規参入 ④売り手 ⑤買い手", "answer": "C", "explanation": "・企業の収益性は業界内での競争力のみで決まるものではなく、業界そのものの収益性にも影響を受け、業界の収益性は業界構造によって規定される。\n\n・５つの力のうち、どれが構造を決める重要な要因になるかは業界によって異なる。\n\n・５つの力を分析することで、業界の収益構造や競争の鍵を発見したり、将来の競争の変化を予測することが可能となる。", "source": "グロービス マネジメントブック 改訂3版\n\n12．業界分析：業界構造と5つの力 P.24-25"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 13, "question": "■問13.アドバンテージ・マトリクスについて、下記（①）～（④）は、選択肢A～Dのどれを指しますか。\n（①）：規模の利益を追求することで優位性を構築できる事業である。汎用的性格の強い商品がこの業界に当てはまる。シェア拡大により、規模を追求することが基本戦略となる。\n\n（②）：過去には規模による格差が存在したものの、コスト低下が進み、大差がなくなってしまっている。成熟期／衰退期の産業で大規模化の限界に至った業界や、慢性的な供給過剰の状態にある業界などが挙げられる。\n\n（③）：競争要因がいくつか存在し、かつ、特定の分野でユニークな地位を築くことで優位性構築が可能な事業である。事業全体の規模と収益性に相関関係はない。\n\n（④）：競争要因が数多く存在するものの、圧倒的な優位性構築が困難な事業である。事業が小規模な段階では高い収益性を維持できるが、事業規模を拡大すると強みが薄れ、収益性を維持できない。地域密着型の事業および事業拡大によるコストダウンの余地が小さい事業がこれに該当する。\n\nA. 分散型事業\n\nB. 手づまり型事業\n\nC. 規模型事業\n\nD. 特化型事業", "answer": "①C、②B、③D、④A", "explanation": "アドバンテージ・マトリクスというフレームワークでは、売上規模と収益性の相関関係を表示し、業界の「競争要因が多いか少ないか」の観点と、競争要因が「優位性構築につながる可能性の大きいか小さいか」の観点から4つのタイプに分けて考える。\n\n（① C. 規模型事業）：規模の利益を追求することで優位性を構築できる事業である。汎用的性格の強い商品がこの業界に当てはまる。シェア拡大により、規模を追求することが基本戦略となる。\n\n（② B. 手づまり型事業）：過去には規模による格差が存在したものの、コスト低下が進み、大差がなくなってしまっている。成熟期／衰退期の産業で大規模化の限界に至った業界や、慢性的な供給過剰の状態にある業界などが挙げられる。\n\n（③ D. 特化型事業）：競争要因がいくつか存在し、かつ、特定の分野でユニークな地位を築くことで優位性構築が可能な事業である。事業全体の規模と収益性に相関関係はない。\n\n（④ A. 分散型事業）：競争要因が数多く存在するものの、圧倒的な優位性構築が困難な事業である。事業が小規模な段階では高い収益性を維持できるが、事業規模を拡大すると強みが薄れ、収益性を維持できない。地域密着型の事業および事業拡大によるコストダウンの余地が小さい事業がこれに該当する。", "source": "グロービス マネジメントブック 改訂3版\n\n13.業界分析：アドバンテージ・マトリクス  P.26-27"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 14, "question": "■問14.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\nバリューチェーン（価値連鎖）という考え方は、事業活動を機能ごとに分解し、どの部分（機能）で(①)が生み出されているかを分析することで事業戦略の構築や改善に役立てようというものだ。\n自社の活動において(②)の源泉を探ることは、資源配分の検討や(③)の決定に役立つ。\n\nA. ①生産量 ②売上高 ③会計方針\n\nB. ①利益率 ②弱点 ③人事制度\n\nC. ①付加価値 ②優位性構築 ③基本戦略\n\nD. ①ブランド力 ②市場占有率 ③組織階層", "answer": "C", "explanation": "内部分析の目的は、競合と比較したときの自社の強みと弱みを把握することにある。それにより、自社の優位性を生かす方向や克服すべき課題が見えてくる。内部分析に役立つのが、ポーターのバリューチェーン（価値連鎖）という考え方だ。これは、事業活動を機能ごとに分解し、どの部分（機能）で付加価値が生み出されているかを分析することで、事業戦略の構築や改善に役立てようというものだ。\n\n自社の活動において優位性構築の源泉を探ることは、資源配分の検討や基本戦略の決定に役立つ。たとえば、優位性構築にそれほど影響を与えない機能は外部資源の利用を検討するなどして、戦略上より有効な機能に自社の経営資源を投入することが可能になる。", "source": "グロービス マネジメントブック 改訂3版\n\n14.内部分析：バリューチェーン P.28-29\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 15, "question": "■問15. コトラーは、企業を「競争上の地位」に応じて4つに分類しました。それぞれの取りうる戦略の説明について、誤っているものを全て選んでください。\n① リーダー\n\nナンバーワンの地位を維持することを目的とした戦略を策定することになる。具体的には「市場規模拡大」「シェア維持」「シェア拡大」の3つの方向性が考えられる。\n\n② チャレンジャー\n\n主な戦略は「リーダーとの直接対決は極力避ける」「背面攻撃(競争範囲の拡大)」「後方攻撃(自分よりシェアの小さな企業を攻撃対象とする)」の3つだ。\n\n③ フォロワー\n\n業界のリーダーに追随し、競合企業からの極端な反撃を招かない方法で経営成果の最大化を目指す。たとえば、競争を仕掛けるよりも、業界秩序維持の名の下にリーダーに追随した価格や製品を提供することが考えられる。\n\n④ ニッチャー\n\n大手が本気で参入してこないような市場のくくりを発見し、そこに限られた経営資源を集中させて、高い専門性やブランド力を維持することで、環境変化により市場そのものが消滅するリスクを回避する戦略をとる。", "answer": "「②、④」が誤り。", "explanation": "正しくは、\n\n「② チャレンジャー\n\n主な戦略は「リーダーとの直接対決を挑む」「背面攻撃(競争範囲の拡大)」「後方攻撃(自分よりシェアの小さな企業を攻撃対象とする)」の3つだ。」\n\nチャレンジャーとは第2位のシェアを維持し、リーダーに取って代わろうとする企業を示す。いずれの場合もリーダー以上の一過性ではない優位性を築く必要がある。\n\n「④ ニッチャー\n\n大手が本気で参入してこないような市場のくくりを発見し、そこに限られた経営資源を集中させて、高い専門性やブランド力を維持することで、他者の参入を防ぐという戦略をとる。」\n\n小さな市場に特化すると、環境変化により市場そのものが消滅するリスクがあり、複数のニッチを持つなどのリスク回避策が必要である。", "source": "グロービス マネジメントブック 改訂3版\n\n15.競争上の地位に応じた戦略 P.30-31"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 16, "question": "■問16.事業ライフサイクルの成熟期における競争戦略の説明として、誤っているものを1つ選択してください。\nA.製品の原価計算の精度を向上させる。\n\nB.コスト競争力の強化をする。\n\nC.新規顧客を開拓する。", "answer": "C", "explanation": "ポーターは、成熟期に移行する業界の競争戦略を次の3点にまとめている。まず、製品構成の合理化と正しい価格政策だ。製品の原価計算の精度を向上させ、収益性が高い製品と不採算製品とを識別し、製品の絞り込みや製品構成の見直しを行う。第2はコスト競争力の強化だ。製造工程の革新と製造に適した製品設計によって実現する。第3は既存顧客への品揃えを充実させ、購買層を広げることである。新規顧客を開拓するよりも、現在抱えている顧客からさらに多く買ってもらうほうが、手っ取り早く、確実なことも多い。", "source": "グロービス マネジメントブック 改訂3版\n\n16.事業ライフサイクルに応じた戦略 P.32-33（P32中段の■成熟期の戦略より）\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 17, "question": "■問17.次のうち、コンフィギュレーション学派に関する記述として誤っているものはどれか？\nA.ラーニング学派については、安定した状況に置かれた組織で有効であると説明する。\n\nB.ポジショニング学派については、経済合理性が強く働いている状況に置かれた組織で有効であると説明する。\n\nC.他の学派の主張も、自説で包括的に説明しようとする。\n\nD.組織を特徴や行動が首尾一貫した集団としてとらえ、最も環境にあったコンフィギュレーションを取ると考える。", "answer": "A が誤り", "explanation": "ラーニング学派は、予測が難しくアイデアが重視される業界(ハイテク産業など)で有効であると考えます。安定環境で有効なのはプランニング学派です。\n\nその他の選択肢\n\nB：正しいです(例えばアメリカにおける多くの生産財事業などで有効と考えます)\n\nC：正しいです\n\nD：正しいです(ある特定の組織は最も環境にあったコンフィギュレーションを取ると考えます)", "source": "グロービス マネジメントブック 改訂3版\n\n17.戦略形成に関する見方 P.34-35"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 18, "question": "■問18.M&Aとアライアンスとの比較について、誤っているものを全て選択してください。\nA. M&Aは時間・資金をそれほど要さないが、アライアンスは時間・資金を要する。\n\nB. M&Aは事後の意思決定に時間がかかる場合があるが、アライアンスは事後にスピーディな意思決定が可能。\n\nC. M&Aは組織文化の摩擦が致命的な問題となりやすいが、アライアンスはM&Aほど致命的ではない。\n\nD. M&Aは解消が困難だが、アライアンスは解消が容易(結束が弱い)。", "answer": "A.とB.", "explanation": "A. M&Aは時間・資金を要するが、アライアンスは時間・資金をそれほど要さない。\n\nB. M&Aは事後にスピーディな意思決定が可能だが、アライアンスは事後の意思決定に時間がかかる場合がある。\n\nC. M&Aは組織文化の摩擦が致命的な問題となりやすいが、アライアンスはM&Aほど致命的ではない。\n\nD. M&Aは解消が困難だが、アライアンスは解消が容易(結束が弱い)。", "source": "グロービス マネジメントブック 改訂3版\n\n18.M&Aとアライアンス P.36-37"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 19, "question": "■問19. イノベーションの影響で企業活動における付加価値構造が破壊され、新しいビジネスシステムへとつくり直されることにより、これまで当然と見なされていた事業の定義やルールが根本的に変わることを、バリューチェーンの再構築と呼ぶ。バリューチェーンの再構築は、パソコンやインターネットの普及、デジタル技術の高性能化・低コスト化をはじめとする近年の情報化の進展により、こうした動きが加速している。たとえば、技術変化によりバリューチェーン全体の中で生産コストの重要性が低下すれば、コスト競争力で業界をリードしていた有力企業が優位性を失い、収益性の悪化に苦しむことになる。こうした事態を避けるためには、変化を先取りし、新たな戦略を打ち出さなくてはならない。それには、自社の事業がバリューチェーンの再構築の影響を受けるかどうかを把握し、新たな可能性を探る必要がある。そのためのチェックリストとして、コンサルティング会社のBCGは以下に掲げる5つの問いかけが有効だとしている。\n下記のBCGの５つの問いかけの中で合っているものの番号をすべて上げてください。\n\n①  バリューチェーン全体の中でコストの割に価値の高い部分はどこか。\n\n② バリューチェーン全体の中で自社事業は顧客とどのような関係にあるか。\n\n③ 自社の事業でネットワーク化の影響を受けるのはどこか。\n\n④ バリューチェーンが変わることで、現在の資産のうち重荷となるものはどれか。\n\n⑤ 新しいバリューチェーンではどのような新しい活動・能力が必要となるか。", "answer": "②・③・⑤", "explanation": "① バリューチェーン全体の中でコストの割に価値の高い部分はどこか。（正解 価値の低い部分はどこか）\n\n②     バリューチェーン全体の中で自社事業は顧客とどのような関係にあるか。\n\n③    自社の事業でネットワーク化の影響を受けるのはどこか。\n\n④     バリューチェーンが変わることで、現在の資産のうち重荷となるものはどれか。\n\n（正解 現在の戦略的資産のうち）\n\n⑤ 新しいバリューチェーンではどのような新しい活動・能力が必要となるか。", "source": "グロービス マネジメントブック 改訂3版\n\n19．バリューチェーンの再構築 P.38-39"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 20, "question": "■問20.グローバル展開の方法と、従来とは異なる競争ルールが働くデファクト・スタンダードをめぐる競争（規格競争）について、誤っているものを選択してください。\nA. 企業がグローバル展開を志向する理由は大きく分けて2つある。第1は利益拡大による成長機会を追求すること。第2は低コストあるいは差別化を実現し、競合他社に対して競争優位を構築することである。\n\nB.グローバル展開を進める場合、生産展開パターンは３つある。第1は国内と地域、地域と地域とのR&Dや生産などの機能を統合し、現地市場への適合性を重視するパターン。第2は本社の指揮下で集中管理した生産を行うパターン。第3は第1と第2との折衷パターンである。\n\nC.デファクト・スタンダードをめぐる競争には、従来の常識とは異なり、技術的優位性はなくても、自社技術をスタンダードとして認めてもらえた企業が市場を制する場合がある。\n\nD.規格競争においても競争上の地位に応じた戦略の定石がかならず当てはまる。例えば、リーダーの同質化戦略は有効であると言える。", "answer": "D", "explanation": "A：正しい\n\nB：正しい\n\nC：正しい\n\nD：規格競争においては競争上の地位に応じた戦略の定石が該当しない場合があります。例えば、リーダーの同質化戦略は有効ではありません。", "source": "グロービス マネジメントブック 改訂3版\n\n20.グローバル化と規格競争 P.40-41"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 21, "question": "■問21. 空欄に入る言葉を以下の選択肢から選んで答えなさい。\nもともと企業（とくに大企業）は公器としての性格が強く、社会に価値を(1)するのは自然な考え方と言える。しかし、20世紀におけるその方法は、(2)の提供、(3)、(4)の提供などに偏っていた。\n\n企業活動に邁進することが社会に価値を(1)することにつながると考えられていたとも言える。\n\nしかし、とくに 1990年代以降、少なくとも先進国においてはこうした単純な考え方は通用しなくなった。\n\n生活が豊かになるにつれ、利益や経済成長という「(5)」だけがよければ手段がすべて正当化されるわけではなくなってきたのだ。また、1980年代以降、とくに欧州を中心に、酸性雨や温暖化対策など、「(6)」を社会全体として真剣に考えなくてはならないという意識が強まってきた。こうした責務をしっかり果たす企業こそが社会から尊敬を受け、持続的に成長すると考えられるようになっているのである。\n\n選択肢：\n\na商品・サービス\n\nb成長\n\nc休暇\n\nd雇用\n\ne納税\n\nf福利厚生\n\ng原因\n\nh結果\n\ni提供\n\nj還元\n\nk過去の清算をどうするのか\n\nl現在をいかによくするか\n\nm未来に何を残せるか", "answer": "(1)-j (2)-a (3)-e (4)-d (5)-h (6)-m", "explanation": "もともと企業（とくに大企業）は公器としての性格が強く、社会に価値を還元するのは自然な考え方と言える。しかし、20世紀におけるその方法は、商品・サービスの提供、納税、雇用の提供などに偏っていた。\n\n企業活動に邁進することが社会に価値を還元することにつながると考えられていたとも言える。\n\nしかし、とくに 1990年代以降、少なくとも先進国においてはこうした単純な考え方は通用しなくなった。\n\n生活が豊かになるにつれ、利益や経済成長という「結果」だけがよければ手段がすべて正当化されるわけではなくなってきたのだ。また、1980年代以降、とくに欧州を中心に、酸性雨や温暖化対策など、「未来に何を残せるか」を社会全体として真剣に考えなくてはならないという意識が強まってきた。こうした責務をしっかり果たす企業こそが社会から尊敬を受け、持続的に成長すると考えられるようになっているのである。", "source": "グロービス マネジメントブック 改訂3版\n\n21.CSR  P.42-43\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 22, "question": "■問22.社会起業家の特徴として正しいものを全て選んでください。\nA.利益を目的とせず、医療や教育、貧困撲滅などの分野を中心にボランティア活動を行う起業家を指す。\n\nB.社会起業家は、医療や教育などに関する問題解決を政府に任せるのではなく、コミュニティの中で解決していこうという機運の高まりの中で広がった。\n\nC.有名な社会起業家の例として、フェアトレードがある。\n\nD.日本では公的な活動で利益の追求を軽視する傾向があるが、行政からのサポートに頼ることなくビジネスとして成立させることで、社会変革を効果的に促すことが求められている。", "answer": "BとC", "explanation": "A：当初、こうした活動はボランティアやNPOの形で行われることが多かったが、徐々に組織化・効率化が進み、ビジネス化したプレイヤーが優位になっていった。\nB：正しい。\nC：正しい。途上国の中でもさらに立場の弱い、農村部の女性や小規模農家、スラムに住む人々などを支援している。製品デザインのアイデアの提供、品質向上研修のための資金援助、売り手にとって有利な取引条件の提供などを行っている。\nD：行政の立場からも、社会起業家を積極的に支援し、彼らのエネルギーを活用することで、社会変革を効果的に促すことができるものとして注目されている。", "source": "グロービス マネジメントブック 改訂3版\n22．社会起業家 P.44-45"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 23, "question": "■問23.下記（①）～（④）の空欄に入る語句の組み合わせとして正しいのは、選択肢A～Dのどれですか。\n戦略は「企業あるいは事業の目的を達成するために、持続的な（①）を確立すべく構造化されたアクションプラン」と定義される。\n\n戦略を策定する場合は、環境変化や競合企業の動きに対して、自社に最も有利となり、かつ（①）を持続できる道筋を選択する。このとき、単発の対応ではなく（②）として機能すること、実行可能な施策であることも重要だ。\n\nトップマネジメントには、企業の目指す（③）の提示、その実現に向けて（④）を巻き込む力、過去の成功体験にとらわれずに変化を受け入れる度量の広さなどが求められる。\n\nA. ①シェア ②慣習 ③方向性やビジョン ④従業員\n\nB. ①競争優位 ②仕組み ③方向性やビジョン ④ステークホルダー\n\nC. ①シェア ②仕組み ③損益目標 ④取引先\n\nD. ①競争優位 ②慣習 ③損益目標 ④株主", "answer": "B", "explanation": "戦略にはさまざまな定義があるが、グロービス マネジメントブック 改訂3版では、戦略を「企業あるいは事業の目的を達成するために、持続的な（①競争優位）を確立すべく構造化されたアクションプラン」と定義する。\n\n戦略を策定する場合は、環境変化や競合企業の動きに対して、自社に最も有利となり、かつ（①競争優位）を持続できる道筋を選択する。このとき、単発の対応ではなく（②仕組み）として機能すること、実行可能な施策であることも重要だ。\n\nトップマネジメントには、企業の目指す（③方向性やビジョン）の提示、その実現に向けて（④ステークホルダー）を巻き込む力、過去の成功体験にとらわれずに変化を受け入れる度量の広さなどが求められる。", "source": "グロービス マネジメントブック 改訂3版\n\n1.経営戦略の意義と企業の目的  P.2-3"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 24, "question": "■問24.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\nドメインを決めるときには、製品やサービスを基準とする（①）から定義したり、市場ニーズを基準とする（②）から定義したりする方法がある。また近年は、自社の競争優位の源泉となる（③）を軸にドメインを定める企業もある。\n\nA. ①事業軸 ②顧客軸 ③ブランド力\n\nB. ①市場軸 ②製品軸 ③経営理念\n\nC. ①製品軸 ②市場軸 ③コア・コンピタンス\n\nD. ①製造軸 ②販売軸 ③資源配分", "answer": "C", "explanation": "ドメインを決めるときには、製品やサービス（製品軸）から定義したり、市場ニーズ（市場軸）から定義したりする方法がある。製品やサービスからの定義とは、自社の持つ製品の優位性や特徴などを最も効果的に発揮できる領域を選んで、事業展開を図っていくやり方だ。また近年は、自社の競争優位の源泉となるコア・コンピタンスを軸にドメインを定める企業もある。ドメインを決めるときのポイントは、自社の強みを十分に発揮できるかどうかだ。", "source": "グロービス マネジメントブック 改訂3版\n\n4.全社戦略の構成要素(1)：ドメイン P.8-9\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 25, "question": "■問25. 「競争優位」を築くための基本戦略に関する記述について、次の4つから「誤っているもの」を全て選択してください。\n① 戦略策定の際には、自社の経営資源と事業特性を十分に考慮して、どの戦略をとるのかは決めずに柔軟に対応する必要がある。\n\n② コスト・リーダーシップ戦略は、コストを中心に競争優位を確立することに主眼を置くもので、「競合他社よりも低いコストを実現すること」が基本テーマとなる。\n\n③ 差別化戦略では、「自社の製品を差別化して、業界の中でもユニークだと見られる何かを創造すること」が基本テーマだ。そのユニークさは、顧客に価値として認識され、競合が簡単に模倣できないものでなければならない。\n\n④ 集中戦略は、「特定の顧客層、特定の製品、特定の市場など限られた領域に企業の経営資源を集中すること」が基本テーマだ。コスト・リーダーシップ戦略と差別化戦略では市場のほぼ全体を対象にしているが、集中戦略では特定のターゲットだけを狙う。", "answer": "「①のみ」が誤り。", "explanation": "正しくは、「① 戦略策定の際には、自社の経営資源と事業特性を十分に考慮して、どの戦略をとるのかを明確にする必要がある。」です。3つの基本的な戦略パターン、「コスト・リーダーシップ戦略」「差別化戦略」「集中戦略」のいずれかを実現できていない事業は窮地に立たされることが多いです。事業特性や市場環境、自社の経営資源などを十分に考慮し、どの戦略が有効であるか判断しましょう。", "source": "グロービス マネジメントブック 改訂3版\n\n競争優位を築くための基本戦略 P.18-19"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 25, "question": "■問25. 「競争優位」を築くための基本戦略に関する記述について、次の4つから「誤っているもの」を全て選択してください。\n① 戦略策定の際には、自社の経営資源と事業特性を十分に考慮して、どの戦略をとるのかは決めずに柔軟に対応する必要がある。\n\n② コスト・リーダーシップ戦略は、コストを中心に競争優位を確立することに主眼を置くもので、「競合他社よりも低いコストを実現すること」が基本テーマとなる。\n\n③ 差別化戦略では、「自社の製品を差別化して、業界の中でもユニークだと見られる何かを創造すること」が基本テーマだ。そのユニークさは、顧客に価値として認識され、競合が簡単に模倣できないものでなければならない。\n\n④ 集中戦略は、「特定の顧客層、特定の製品、特定の市場など限られた領域に企業の経営資源を集中すること」が基本テーマだ。コスト・リーダーシップ戦略と差別化戦略では市場のほぼ全体を対象にしているが、集中戦略では特定のターゲットだけを狙う。", "answer": "「①のみ」が誤り。", "explanation": "正しくは、「① 戦略策定の際には、自社の経営資源と事業特性を十分に考慮して、どの戦略をとるのかを明確にする必要がある。」です。3つの基本的な戦略パターン、「コスト・リーダーシップ戦略」「差別化戦略」「集中戦略」のいずれかを実現できていない事業は窮地に立たされることが多いです。事業特性や市場環境、自社の経営資源などを十分に考慮し、どの戦略が有効であるか判断しましょう。", "source": "グロービス マネジメントブック 改訂3版\n\n競争優位を築くための基本戦略 P.18-19"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 26, "question": "■問26.M&Aとアライアンスを比較した記述として、M&Aに当てはまる記述は次のA～Dのうち、どれか？\nA.時間・資金はそれほど要さない\n\nB.法的手続きが容易\n\nC.組織文化の摩擦が致命的な問題となりやすい\n\nD.解消が容易（結束が弱い）", "answer": "C", "explanation": "企業文化あるいは組織面での適合性がなく、有機的に統合されずにシナジーを発揮できないケースや、社風の違いにより従業員が強い拒否反応を示し、長期にわたって経営の阻害要因となるケースも多い。", "source": "グロービス マネジメントブック 改訂3版\n\n26.M&Aとアライアンス P.36-37（P37のM&A注意点、M&Aとアライアンスの比較の表より）\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_STR"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 27, "question": "■問27.次のA～Dのうち正しいものを全て選べ。\nA. 経営戦略は、経営理念やビジョンと企業の現実の姿との間に存在するギャップを埋めるための具体的な方法論を示すものだ。\n\nB. 経営戦略は通常、全社的な視点(全社戦略)、個別事業の視点(個別戦略)、機能別の視点(機能戦略)という3つの戦略レベルで策定される。\n\nC. ビジョンは、経営理念で規定された経営姿勢や存在意義に基づき、ある時点までに「こうなっていたい」と考える到達点、つまり自社が目指す中期的なイメージを投資家や従業員や社会全体に向けて示したものだ。\n\nD. 経営戦略は行動規範や成功の必須条件、経営姿勢、企業の存在意義など様々な形で表現されるが、一般的には時代の流れを超えた長期的な視点で、社会(顧客)と従業員に関する考えを語ったものが多い。", "answer": "A、C", "explanation": "A：正しいです\n\nB：経営戦略は「全社戦略」「事業戦略」「機能戦略」という3つの戦略レベルで策定されます。「個別戦略」が誤りです。\n\nC：正しいです\n\nD：これは「経営戦略」ではなく「経営理念」の説明です。", "source": "グロービス マネジメントブック 改訂3版\n\n2．経営理念と戦略レベル P.4-5"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 28, "question": "■問28.下記文章中の（①）～（⑤）に入る語句を選択肢A～Eのうちから選んでください。\n・導入期：（①）も（②）も低く、（③）もマイナスだ。競合企業はほとんどないが、需要拡大のために顧客に対するPR活動に力を入れる必要がある。\n\n・成長期：（①）が急速に伸び、（②）も上昇する。（③）もプラスに転じるが、競合他社の参入は増える。競争が激しくなるため、他社との差別化を図る必要がある。\n\n・成熟期：（①）は低成長に転じ、（②）も低下するが、（④）額が少ないため（③）はプラスになる。競争が激化するため、（⑤）が築けなければ敗者となる。\n\n・衰退期：（①）は低下し、（②）も減少する。新規（④）が不要なため一部のリーダー企業は（②）を出すことができるが、安定した収益を上げ続けるには効率性の追求が不可欠となる。\n\nA. キャッシュフロー\n\nB. 投資\n\nC. 競争上の優位性\n\nD. 売上高\n\nE. 利益", "answer": "①D、②E、③A、④B、⑤C", "explanation": "事業ライフサイクルの各段階で競争環境や顧客のニーズ、必要な資金、戦略課題が変わることに注意が必要だ。\n\n・導入期：売上高も利益も低く、キャッシュフローもマイナスだ。競合企業はほとんどないが、需要拡大のために顧客に対するPR活動に力を入れる必要がある。\n\n・成長期：売上高が急速に伸び、利益も上昇する。キャッシュフローもプラスに転じるが、競合他社の参入は増える。競争が激しくなるため、他社との差別化を図る必要がある。\n\n・成熟期：売上高は低成長に転じ、利益も低下するが、投資額が少ないためキャッシュフローはプラスになる。競争が激化するため、競争上の優位性が築けなければ敗者となる。\n\n・衰退期：売上高は低下し、利益も減少する。新規投資が不要なため一部のリーダー企業は利益を出すことができるが、安定した収益を上げ続けるには効率性の追求が不可欠となる。", "source": "グロービス マネジメントブック 改訂3版\n\n6.事業ポートフォリオと事業ライフサイクル P.12-13"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 29, "question": "■問29. 新規参入の脅威 新規参入は競合企業が増えるだけでなく、競争ルールの変化をもたらすこともある。新規参入が容易（参入障壁が低い）業界では、業界の収益性が上がるとすぐに参入者が増加し、収益性は下がってしまう。参入障壁には、（A）の障壁、（B）の障壁、（C）の障壁などさまざまなものがある。海外メーカーの新規参入が脅威となるケースも多い。\n上記（A）（B）（C）に当てはまる語句の組み合わせで合っている番号を答えてください。\n\n（A）技術上（B）マーケティング上（C）人材投資\n（A）技術上（B）事業規模（C）設備投資\n（A）開発上（B）事業規模（C）人材投資\n（A）技術上（B）マーケティング上（C）設備投資\n（A）開発上（B）事業規模（C）人材投資", "answer": "4", "explanation": "新規参入の脅威 新規参入は競合企業が増えるだけでなく、競争ルールの変化をもたらすこともある。新規参入が容易（参入障壁が低い）業界では、業界の収益性が上がるとすぐに参入者が増加し、収益性は下がってしまう。参入障壁には、技術上の障壁、（B）マーケティング上の障壁、設備投資の障壁などさまざまなものがある。海外メーカーの新規参入が脅威となるケースも多い。", "source": "グロービス マネジメントブック 改訂3版\n\n12．業界分析：業界構造と「５つの力」 P.24-25"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": 30, "question": "■問30.より現場に近いところからの戦略立案を重視するのがラーニング学派です。ピーター・センゲ、ゲーリー・ハメル、K・プラハラードがこのラーニング学派の代表ですが、彼らが大前提とした以下の5つの考え方の中で正しいものを全てあげてください。\nA.戦略は創発的なものであり、形式的な計画で生まれるものではない。\n\nB.戦略家は組織のいたるところに存在している。\n\nC.戦略の形成と実行は互いに独立した関係である。\n\nD.組織内で創発したアイデアや行動を戦略にまとめ、組織に展開することは重要ではない。\n\nE.組織学習が創発的戦略の立案・実行・修正を促進する。", "answer": "A、B、E", "explanation": "A：正しい\n\nB：正しい\n\nC：戦略の形成と実行は相互に絡み合っている。\n\nD：組織内で創発したアイデアや行動を戦略にまとめ、組織に展開することが重要である。\n\nE：正しい", "source": "グロービス マネジメントブック 改訂3版\n\n17．戦略形成に関する見方 P.34-35"}, {"subject": "GMAP2026S_STR", "tag": "GMAP2026S_STR", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 1, "question": "■問１.下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢A\\~Dのうちから選んでください。\n・企業の代表的な経営資源は「ヒト」「モノ」「カネ」である。\n\n・かつては企業経営を考えるときに、「モノ」と「カネ」に重きが置かれることが多かったが、最近では「人のマネジメントが今後の企業経営の鍵だ」という声がよく聞かれる。\n\n・その第1の理由は、企業が（①）に対応するには、個々の「ヒト」の能力が必要であるからだ。\n\n・第2の理由は、企業の（②）の源泉が、設備や資金などから、（③）へとシフトしつつあるからだ。\n\n・人・組織のマネジメントを理解し身につけるには、人の特徴や（④）のメカニズムについて把握する必要がある。\n\nA. ①環境変化 ②競争優位 ③知識や知恵 ④行動\n\nB. ①環境変化 ②利益創出 ③技術や特許 ④心理\n\nC. ①グローバル化 ②競争優位 ③技術や特許 ④行動\n\nD. ①グローバル化 ②利益創出 ③知識や知恵 ④心理", "answer": "A", "explanation": "企業が環境変化に対応するには個々の「ヒト」の能力が必要であり、また、競争優位の源泉が設備や資金から知識や知恵へとシフトしつつあることが、人のマネジメントが重要視される背景です。人・組織のマネジメントを習得することができれば、企業の競争力を高めることにもつながります。", "source": "グロービス マネジメントブック 改訂3版\n\n1．企業経営と人・組織のマネジメント P.182-183"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 2, "question": "■問2.人・組織のマネジメントに影響を及ぼす要因について、正しいものを選択してください。\nA.人・組織のマネジメントは、経営理念やビジョンとの整合性を図ることが重要であり、経営戦略との整合性を図る必要はない。\n\nB.人・組織のマネジメントを考える際には、まず外部環境を把握する必要がある。\n\nC.外部環境の中でも、労働市場、法的規制、労働組合、経済状況、技術的進歩、競合他社は人・組織のマネジメントにとくに大きな影響を与える可能性がある。\n\nD.競争力を維持するためには、競合他社の従業員と同等もしくはそれ以上の能力・資質を持った従業員を獲得すれば、育てるような施策を用意する必要はない。", "answer": "BとC", "explanation": "A：経営戦略との整合性も必要。\n\n組織として経営理念やビジョンを尊重し、従業員にもそれらに沿った行動を求めていることを、具体的な施策を通して伝えなくてはならない。それには、経営理念やビジョンを実現するための経営戦略と、それを支援する人・組織のマネジメントが必要となる。このとき、経営理念、ビジョン、経営戦略、人・組織のマネジメントのすべてにおいて整合性をとることが重要だ。これらの間で整合性がとれていなければ、経営理念に共感を覚えて入社した従業員のモチベーションが下がったり、戦略目標の実現を妨げるような行動をとるなどの副作用が生じる恐れがある。\n\nD：育てるような施策を用意する必要がある。\n\n競争力を維持するためには、競合他社の従業員と同等もしくはそれ以上の能力・資質を持った従業員を獲得し、育てるような施策を用意する必要がある。", "source": "グロービス マネジメントブック 改訂3版\n\n2.人・組織のマネジメントに影響を及ぼす要因 P.184-185"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 3, "question": "■問3.人的資源管理（HRM）における4つの要素の説明のなかで、誤っているものを選択してください。\nA.HRポリシーとは、企業の経営理念をもとに戦略を遂行し、ビジョンを実現していくために、組織と人がどうあるべきかを示すもの。企業の経営理念、ビジョン、戦略と密接に関係したものになる。\n\nB.HRポリシーに基づいて、個々の構成員をどのように組み合わせて戦略を遂行させるか決めたものが経営戦略である。\n\nC.HRポリシーに基づいて、個々の構成員をどのように活用・管理していくかを決めたものがHRシステムで、「人員配置」「報奨」「評価」「能力開発」に分けられる。\n\nD.組織文化とは、組織構成員が共有する信念、価値観、行動規範の集合体のこと。企業は経営理念やビジョン、HRMの施策などを通して、組織文化に間接的な影響を与えることができる。", "answer": "B", "explanation": "HRポリシーに基づいて、個々の構成員をどのように組み合わせて戦略を遂行させるか決めたものは組織構造です。\n経営戦略は、企業が競争優位を築くための「目的」や「方向性」であり、HRMが整合させるべき外部の前提条件ですが、HRMそのものの構成要素には含まれません。", "source": "グロービス マネジメントブック 改訂3版\n3.組織行動学と人的資源管理 P.186-187"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 4, "question": "■問4.組織文化と企業経営について、誤っているものをすべて選択してください。\nA.企業文化は、「組織構成員が共有する信念、価値観、行動規範の集合体」と定義できる。\n\nB.組織文化の生成段階では、個々の構成員の価値観や信念などが衝突しあう。\n\nC.生成された組織文化は次の浸透段階で、儀式や逸話、経営陣のメッセージなど具体的になったものや、すでに組織文化を共有している構成員との交流などを通して他の構成員に伝播していく。\n\nD.組織文化の機能には、「判断や行動の指針」、「情報伝達の複雑化」、「個人の動機づけ」がある。", "answer": "Dのみ", "explanation": "正しくは、組織文化の機能には、「判断や行動の指針」、「情報伝達の簡素化」、「個人の動機づけ」がある。\n「情報伝達の複雑化」⇒「情報伝達の簡素化」でした。\n組織文化は、判断や行動の指針を示すことによって、公的な情報伝達において伝えなければならない情報の量を軽減する。", "source": "グロービス マネジメントブック 改訂3版\n12.組織文化と企業経営 P.204-205"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 5, "question": "■問5. 組織設計についての説明で誤っているものを1つ選びなさい。\nA. 組織設計とは、企業戦略を遂行するために、個々の業務をどのように組み合わせ、どのように実行するかを決定することである。\n\nB. 組織設計では、業務プロセスや意思決定プロセスなどの動的な側面も考慮する。\n\nC. 一度出来上がった組織を変えることは難しく、しばしば現状維持へと走りがちになる。\n\nD. 組織設計は、外部環境や戦略との整合性を考慮せず、組織内部の状況に合わせて決定すべきである。", "answer": "D", "explanation": "企業は、外部環境や企業戦略との整合性を常に問い続けながら、競争優位の源泉を生み出し、それを維持できるような組織構造の構築を目指していく必要がある。", "source": "グロービス マネジメントブック 改訂3版\n\n13.組織設計 P.206-207\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_HRM"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 6, "question": "■問6. 「マトリクス型組織」についての説明で誤っているものを1つ選びなさい。\nA. 「マトリクス型組織」には、事業を中心とした組織形態に、専門性の高い情報を共有化させる特徴がある。\n\nB.「マトリクス型組織」では、その組織の構成員は役割の違う2つの組織に属することになる。\n\nC. 「マトリクス型組織」では、権限や責任が明確になり、専門性の高い組織運営が可能になる。\n\nD. 「マトリクス型組織」では、1人の人間が2つの役割を同時に効果的に果たすことが期待される。", "answer": "C", "explanation": "「マトリクス型組織」とは、\n\n「事業部制組織」と「機能別組織」のそれぞれの長所を組み合わせて専門性の高い情報の伝達を円滑に行うことで、\n\n1人の人間が2つの役割を同時に効果的に果たすことが期待される組織形態である。\n\n（A・B・Dが正しい）\n\n一方で、デメリットとして、各構成員は「事業部制」のボスと「機能別」のボスの2名のボスを持つことになる。その結果として、権限や責任があいまいかつ流動的になることがあり、指揮命令系統が混乱したり、業務に支障が生じたりする恐れがある。\n\n（Cの「権限や責任が明確」が誤り）", "source": "グロービス マネジメントブック 改訂3版\n\n14.組織形態 P.208-209\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_HRM"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 7, "question": "■問7.人員配置とは、企業の戦略を遂行するために必要な人員構成を実現することだ。「人員配置」について、誤っているものを全て選びなさい。\nA.求められる人員構成と現状との間の不足分を埋めることである。\n\nB.求められる人員構成と現状との間の余剰分を解消することである。\n\nC.戦略を遂行するために最適な人員構成を実現する際には、短期的視点だけではなく、中長期的な視点も必要である。\n\nD.人材配置にはマネジメントから組織全体へのメッセージという側面はない。", "answer": "Dのみ", "explanation": "A.正しい\n\nB.正しい\n\nC.正しい\n\nD.誤り\n\n人員配置にはマネジメントから組織全体へのメッセージという側面もある。たとえば、組織内で評価の高い人材を特定部門に重点的に配置した場合、「その部門が戦略上、重視されている」というメッセージになる。その結果、その部門のメンバーのモチベーションは高まることになる。", "source": "グロービス マネジメントブック 改訂3版\n\n15.人員配置 P.210-211"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 8, "question": "■問8.下記文章中の（①）から（④）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・報奨は（①）の1つで、従業員の企業への貢献の対価である。\n\n・報奨システムを設計する際は、（②）や評価との整合性を考慮に入れなくてはならない。\n\n・報奨を考える際の基本要素は、「何に対して」支払うかを示す「報奨（③）」、「どのように」支払うかを示す「報奨項目」、「だれにいくら」支払うかを示す「報奨（④）」の3つだ。\n\nA. ①フリンジ・ベネフィット ②社会的責任 ③基準 ④水準\n\nB. ①インセンティブ ②経済合理性 ③基準 ④水準\n\nC. ①インセンティブ ②社会的責任 ③水準 ④基準\n\nD. ①フリンジ・ベネフィット ②経済合理性 ③水準 ④基準", "answer": "B", "explanation": "・報奨は「インセンティブ」の1つで、給与やボーナス、福利厚生など、従業員の企業への貢献の対価として企業から従業員に提供されるもの。\n\n・報奨システムを設計する際は、「経済合理性」や評価との整合性を考慮に入れる。また従業員のモチベーションを高めるためには、公平で、誰もが納得できるような評価方法を用いることが不可欠。\n\n・報奨を考える際の基本要素について、具体的な報奨「基準」としては、能力や職務、年齢、業務の成果などが挙げられる。また、報奨「水準」は、「外部競争力」と「内部公平性」を考慮して決定する。", "source": "グロービス マネジメントブック 改訂3版\n\n16．報奨 P.212-213"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 9, "question": "■問9.評価方法を設計する際に、「何を」(評価項目)、「誰が」(評価者)、「どれくらいの期間で」(評価期間)評価するかを考える必要がありますが、下記の中から最も適切なものを選択してください。\nA.[評価項目]企業は一般に、「成果」と「能力」のみを評価項目として組み合わせて用いている。\n\nB.[評価項目]評価項目を考える際は、最も重要である「人事制度との整合性」のみをおさえていればよい。\n\nC.[評価者]「上司」による評価が一般的だが、近年では部下や同僚による評価、顧客による評価を実施している企業もある。\n\nD.[評価期間]評価期間は、会計年度の単位である「1年」が絶対とされる。", "answer": "C", "explanation": "Aは誤りです。正しくは、企業は一般に、「成果」「能力」の他に、「勤務態度」などの評価項目を組み合わせて用いています。\n\nBは誤りです。正しくは、評価項目を考える際に最も重要なのは、企業戦略との整合性です。人事制度との整合性だけを最も重要とするのは適切ではありません。\n\nDは誤りです。正しくは、評価期間は一律に1年を絶対とするのではなく、環境変化が激しい業界や企業では、1年より短い期間で設定することが適切な場合もあります。", "source": "グロービス マネジメントブック 改訂3版\n\n17.評価 P.214-215"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 10, "question": "■問10.能力開発に関する記載について、誤っているものを一つ選択してください。\nA.企業にとっての能力開発は、「コスト」ではなく、企業の競争優位の源泉となる知識を生み出す人に対する「戦略的な投資」としてとらえることが重要である。\n\nB.企業が行う能力開発には、業務を行いながら業務知識や仕事のやり方を身につけるOJTと、業務時間外に業務知識などを学ぶOff-JTがある。これまで多くの日本企業ではOJTが能力開発の中心だったが、Off-JTを有効に活用していく必要がある。\n\nC.従業員は自分のキャリアについて、自ら考えていくことも必要だ。自分に「エンプロイアビリティー」（雇用されうるだけの能力）があるかを常に問い続け、戦略的にキャリア・デザインを考えなくてはならない。\n\nD.企業が従業員のキャリア開発を行う目的は、従業員の能力を高めることで、組織文化への理解を最大化することにある。", "answer": "D", "explanation": "A.正しい\n\nB.正しい\n\nC.正しい\n\nD.誤り\n\n正しくは、企業が従業員のキャリア開発を行う目的は、従業員の能力を高めることで、組織の成果を最大化することにある。\n\n補足：具体的には、企業の求める人材像に合わせて、異なる領域をいくつか経験させたり、特定領域で難易度の高い業務を与えたりして、さまざまな業務経験を積ませる。キャリアを重ねる過程で、組織の成果に繋がる幅と深さのある知識を習得し、部門横断的な知識の交換や従業員間の相互作用が起こる場合もある。その結果、新しい付加価値が生まれたり、組織文化への理解が深まる。", "source": "グロービス マネジメントブック 改訂3版\n\n18.能力開発 P.216-217"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 11, "question": "■問 11. 下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢A\\~Dのうちから選んでください。\n・政府はワーク・ライフ・バランスを「仕事と生活の調和」と訳し、とくに企業の従業員が仕事と生活の適切なバランスをとることを提唱している。その背景にあるのは、（①）や男女共同参画推進といった国家的な事情であるが、こうした要請に限らず、従業員が人間として豊かな生活を送れるようにすることは、企業の（②）上も大きな課題となりつつある。\n\n・一方、日本は、アメリカ以上に仕事人間が多い国である。もともと（③）を是とする下地はあったが、そうした慣習への見直しを迫ったのが、（①）や男女共同参画推進の視点である。\n\n・少子化を例にとると、その原因はさまざまあるが、従業員（とくに男性）が会社に時間をとられてしまい、（④）への参加がなかなかできないことが夫婦が出産に踏み切れない大きな要因とされた。\n\nA. ①高齢化対策 ②倫理 ③長時間労働 ④介護\n\nB. ①高齢化対策 ②戦略 ③成果主義 ④介護\n\nC. ①少子化対策 ②倫理 ③成果主義 ④育児\n\nD. ①少子化対策 ②戦略 ③長時間労働 ④育児", "answer": "D", "explanation": "ワーク・ライフ・バランスが提唱される背景には「少子化対策」や男女共同参画推進があり、これは企業の「戦略」上も大きな課題です。日本ではもともと「長時間労働」を是とする下地がありましたが、見直しが迫られています。男性が「育児」に参加できないことが少子化の要因とされています。", "source": "グロービス マネジメントブック 改訂3版\n\n21． ワーク・ライフ・バランス P.222- 223"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 12, "question": "■問12.適応アプローチについて、誤っているものを選択してください。\nA.メンタル不調は、無断欠勤が続く、情緒が不安定になるなど、さまざまな形で現れる。健康や生命への危険を及ぼすような状況が見られ、上司として「安全配慮義務」を履行すべきならば、医師による健康診断を最優先で勧めることが望まれる。\n\nB.適応アプローチで重要なのは、職場において対応可能なケースをしっかり見極め、組織行動学、人的資源管理の両面から適切な対策を打つということだ。\n\nC.組織行動学的なものとしては、カウンセリング・マインドを持ち、部下の話にしっかり耳を傾けるなどがある。\n\nD.人的資源管理に関連する打ち手としては、まず研修を行えば良い。", "answer": "D", "explanation": "D：研修だけではない。\n\nたとえば、評価の際に部下に対して納得性の高いフィードバックを行ったり、能力開発のヒントを適切に提示したりすることも、ストレス削減につながる。", "source": "グロービス マネジメントブック 改訂3版\n\n22.メンタルヘルス P.224-225\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_HRM"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 13, "question": "■問13.経営資源としての人の特徴の説明のなかで、誤っているものを選択してください。\nA.人の能力は向上し、時には低下する。また能力の種類も変化する。\n\nB.意思、感情、欲求、能力などは、「変えよう」と決めることで少しずつだが変えることができる。変えようとする気持ちが大切である。\n\nC.意思、感情、欲求、能力などのあり方や変化の程度には個人差がある。同一人物でも注目するタイミングによって、感じ方や欲求の程度が異なる場合がある。\n\nD.意思、感情、欲求、能力などの組み合わせに基づく何らかのメカニズムによって、人の行動はある程度決まる。", "answer": "B", "explanation": "A.正しい\n\nB.誤り\n\nC.正しい\n\nD.正しい\n\nBの内容が誤っており、正しくは以下の通り。\n\n意思、感情、欲求、能力などは、「変えよう」と決めてすぐに変えられるものではない。無理に変えようとすると、抵抗が生じることも多い。", "source": "グロービス マネジメントブック 改訂3版\n1.企業経営と人・組織のマネジメント P.182-183"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 14, "question": "■問14.次の文章中の(①)～(④)にあてはまる語句の組み合わせとして最も適切なものを、以下の選択肢A～Dから選びなさい。\n・自分の価値観や目的が所属している(①)やビジョン、目的に合致したり、共感できる部分が大きい場合などに、人は働きがいを感じる。\n\n・企業は組織として経営理念やビジョンを尊重し、従業員にもそれらに沿った行動を求めていることを、(②)を通して伝えなければならない。\n\n・外部環境の中でも、労働市場、法的規制、労働組合、経済状況、技術的進歩、(③)は人・組織のマネジメントに特に大きな影響を与える可能性がある。\n\n・企業は必要に応じて、在宅勤務やワークシェアリングなどを柔軟に取り入れ、(④)労働力を活用する方法を考える必要がある。\n\nA：①組織文化 ②包括的な施策 ③社内組織 ④顕在的\n\nB：①組織の価値観 ②包括的な施策 ③社内組織 ④潜在的\n\nC：①組織文化 ②具体的な施策 ③競合他社 ④顕在的\n\nD：①組織の価値観 ②具体的な施策 ③競合他社 ④潜在的", "answer": "D\n①組織の価値観、②具体的な施策、③競合他社、④潜在的", "explanation": "自分の価値観や目的が所属している組織の価値観やビジョン、目的に合致したり、共感できる部分が大きい場合などに、人は働きがいを感じる。したがって、「ヒト」を惹きつけ、その能力を発揮させるためには、企業は経営理念やビジョンを明示する必要がある。\nさらに、組織として経営理念やビジョンを尊重し、従業員にもそれらに沿った行動を求めていることを、具体的な施策を通して伝えなくてはならない。それには、経営理念やビジョンを実現するための経営戦略と、それを支援する人・組織のマネジメントが必要となる。このとき、経営理念、ビジョン、経営戦略、人・組織のマネジメントのすべてきおいて整合性をとることが重要だ。\n\nまた、労働市場、法的規制、労働組合、経済状況、技術的進歩、競合他社などの外部環境からの影響に留意しながら、柔軟に対応することが求められる。", "source": "グロービス マネジメントブック 改訂3\n2.人・組織のマネジメントに影響を及ぼす要因 P.184-185"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 15, "question": "■問15. 以下は組織行動学の視点について説明した内容です。誤っているものを複数選択してください。\nA.人の行動は、「個人」か、「集団」（目的を持った個人の集合）か、「組織」（目的を持った集団の場合）かによって異なってくる。\n\nB.意思決定をする場合、要する時間やコンフリクトの多寡などの違いは、個人・集団・組織のいずれにおいて変わらない。\n\nC.個人・集団・組織の特徴を理解しておくことが、マネジメントを行う上では重要になる。\n\nD.人や組織に働きかけるときには、まず行動を起こし、その結果を踏まえて状況を認識する必要がある。", "answer": "B、D", "explanation": "A：正しい（設問の記述通り）\n\nB：誤り\n\n正しくは、意思決定をする場合、個人・集団・組織によって、要する時間やコンフリクトの多寡などに違いが生じる。\n\nC：正しい（設問の記述通り）\n\nD：誤り\n\n正しくは、組織行動学では、まずその場の状況を認識し、それから自分がとるべき行動と、それが他者や組織に与える影響について十分に考慮したうえで行動を起こす必要がある。「行動」の前には必ず「認識」というステップを踏むことが重要だ。", "source": "グロービス マネジメントブック 改訂3版\n\n3.組織行動学と人的資源管理 P.186-187"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 16, "question": "■問16. 「組織文化」に関連する内容ついての説明で誤っているものを1つ選びなさい。\nA. 組織文化を把握するには、組織固有の行動パターンを観察すると良い。様々な儀式、創業エピソード、組織内でのみ通用する独特な言葉などに行動パターンが顕著に示される。\n\nB.組織文化の生成段階では、個々の構成員の価値観や信念などが衝突しあう。リーダーシップを発揮する人の理念や哲学の影響力は相対的に低い。\n\nC. 組織文化の持つ機能を大別すると、「判断や行動の指針」「情報伝達の簡素化」「個人の動機づけ」の3つの機能があると言われている。\n\nD. 強烈な価値観が組織内で共有されている場合、構成員のものの見方が固定化し、環境変化を見過ごす原因になることがある。", "answer": "B", "explanation": "A・C・Dは正しい。\n\nBは「リーダーシップを発揮する人の理念や哲学の影響力は相対的に低い」が誤り。\n\n組織文化の生成プロセスにおいて、\n\n「リーダーシップを発揮する人の理念や哲学が大きな影響力を持つ」が正しい。\n\n一般的に、組織規模が小さかったり従業員間の物理的・心理的距離が近い組織の方が、\n\n比較的容易に企業文化が生成される。", "source": "グロービス マネジメントブック 改訂3版\n\n12.組織文化と企業経営 P.204-205\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_HRM"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 17, "question": "■問17.組織設計にあたって考慮すべき要素には、分業と協業、指揮命令系統、管理範囲、意思決定権限、分化と統合が挙げられる。分業と協業の説明について、誤っているものを全て選びなさい。\nA.分業とは、組織全体の業務を、専門性などの基準に基づき、組織構成員に割り振ること。\n\nB.協業とは、組織全体として協力して業務を行うことを言う。\n\nC.企業は通常、業務を製造、営業、経理などの機能別に分解し、構成員に割り当てる分業体制を取っている。そのため、協業の必要が生じた場合にも、特に業務間での業務の受け渡し方法などについての調整は不要である。\n\nD.分業は効率化に役立ち、業務を細分化し、業務範囲を狭くするほど、従業員は倦怠感やストレスを感じにくくなる。そのため、仕事への意欲を高めることができ、従業員のモチベーションや業務効率を向上させることができる。", "answer": "CとD", "explanation": "A.正しい\n\nB.正しい\n\nC.誤り\n企業は通常、業務を製造、営業、経理などの機能別に分解し、構成員に割り当てる分業体制をとっている。そのため、協業などの必要性が生じると、複数の業務間で業務の受け渡し方法などについて調整しなくてはならない。\n\nD.誤り\n\nある程度の分業は業務効率化に役立つが、過度の業務細分化は従業員のモチベーションや業務効率を低下させる原因になりうる。業務範囲が狭く単調になると、従業員は倦怠感やストレスを感じ、仕事への意欲を失ってしまうからだ。", "source": "グロービス マネジメントブック 改訂3版\n\n13.組織設計 P.206-207"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 18, "question": "■問18.下記文章中の（①）から（④）に入る語句の組み合わせとして適切なものを、選択肢AからDより選んでください。\n・組織形態の基本的なものとして、ヒエラルキー型組織（機能別組織、事業部別制組織）、（①）型組織がある。\n\n・組織形態は組織構造の決定要因に加え、（②）、事業特性、戦略、HRポリシーなどを考慮して設計する。\n\n・機能別組織は、専門的な知識を持った人材を育成することができる一方、幅広い知識をもった（③）が育ちにくく、組織間のコンフリクトが起きやすい。\n\n・企業の規模が拡大し、さまざまなビジネスを手掛けるようになると、単純な機能別組織では対応しきれなくなるため、（④）組織をとる企業が多くなってくる。\n\nA. ①ネットワーク ②外部環境 ③マネージャー ④ティール\n\nB. ①マトリクス ②外部環境 ③マネージャー ④事業部制\n\nC. ①マトリクス ②内部環境 ③新人 ④ティール\n\nD. ①ネットワーク ②内部環境 ③新人 ④事業部制", "answer": "B", "explanation": "・組織形態の基本的なものとして、ヒエラルキー型組織（機能別組織、事業部制組織）、「マトリクス」型組織がある。\n\n・組織形態は組織構造の決定要因に加え、「外部環境」、事業特性、戦略、HRポリシー等を考慮して設計する。\n\n・機能別組織は、その機能を深く理解し、専門的な知識を持った人材を育成することができる。また、部門間で機能の重複がないので、経営効率の点で優れている。その一方で、全社の利益の最大化（全体最適）よりも各組織の利益の最大化（部分最適）を追求しがちになる。また、幅広い知識を持った「マネージャー」が育ちにくく、組織間のコンフリクトが起きやすい。\n\n・企業の規模が拡大し、さまざまなビジネスを手がけるようになると、単純な機能別組織では対応しきれなくなるため、「事業部制」組織をとる企業が多くなってくる。", "source": "グロービス マネジメントブック 改訂3版\n\n14．組織形態 P.208-209"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 19, "question": "■問19.人員配置において人員不足分を埋めるための調達方法として、人材を組織の外部から調達する採用(外部調達)と内部から調達する異動・昇進(内部調達)が挙げられます。外部調達と内部調達に関する事項で、正しいものを全て選んでください。\nA.内部調達は金銭的コストが不要であるのに対し、外部調達は、社内の採用担当者の人件費に加え、人材紹介会社など外部サービスを利用すると実質的な支払いが生じる。\n\nB.内部に適当な人材がいない場合、組織内で育成するよりも外部から人材を採用する方が、通常は短期間で調達できる。\n\nC.内部調達のほうがあらかじめ得られる情報が豊富なので、その人材が求める要件を満たしているかどうかを評価しやすい。\n\nD.新しい人材が組織に参加した結果、他の従業員モチベーションが向上したり、組織間のセクショナリズムやマンネリズムの打破、組織の活性化につながる場合がある。", "answer": "B、C、D", "explanation": "A：誤り\n\nB：正しい\n\nC：正しい\n\nD：正しい\n\nAは前半の内部調達に関する記述が誤りです。内部調達は金銭的コストが不要に見えますが、実際にはその人材が現在のスキルや経験などを身につけるまでに、能力開発などの金銭的コストが発生しています。外部調達に関する記述は正しいです。", "source": "グロービス マネジメントブック 改訂3版\n\n15.人員配置 P.210-211"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 20, "question": "■問20 報奨に関する説明のなかで、誤っているものを選択してください。\nA.報奨はインセンティブの１つで、従業員の企業への貢献の対価である。従業員のモチベーションを高めるためには、公平で、だれもが納得できるような評価方法を用いることが不可欠である。\nB.報奨は、「報奨基準」「報奨項目」「報奨水準」の３つの基本的な要素に分けて考えるとわかりやすい。\nC.報奨項目の種類として、代表的な項目には「基本給と手当」「インセンティブ・システム」「福利厚生（フリンジ・ベネフィット）」がある。\nD.インセンティブ・システムの例として、一定の基準に従って利益を配分するプロフィット・シェアリングや、自社株式を購入する権利を与える持株会などがある。\nE.福利厚生には、「その企業に所属していることによって得られる特典」のすべてが該当する。具体的には、退職金や年金積立、財形貯蓄、優遇ローン、健康保険、社宅／独身寮、各種施設の法人割引などがある。", "answer": "D", "explanation": "• A 正しい\n• B 正しい\n• C 正しい\n• D 誤り\n正しくは、インセンティブ・システムの例として、一定の基準に従って利益を配分するプロフィット・シェアリングや、自社株式を購入する権利を与える【ストック・オプション】などがある。\n• E 正しい", "source": "グロービス マネジメントブック 改訂3版\n16.報奨 P.212-213"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 21, "question": "■問21. 評価に関する留意事項について、最も適切なものを選択してください。\nA.評価を誤らせる原因を完全に取り除くことは容易であるため、評価者が陥りがちな傾向を認識する必要はあまりない。\n\nB.特定の項目についての評価が総合的な評価に影響を与える傾向を「中心化傾向」という。\n\nC.ハロー（後光）効果とは、際立って高い評価を受けた項目があった場合、その評価に引っ張られて、他の項目についても優れていると判断してしまうことなどを指す。\n\nD.従業員の評価を5段階で行うと、自然と最高の「5」や最低の「1」に評価が集中する傾向があり、これを中心化傾向と呼ぶ。", "answer": "C", "explanation": "・Aは誤りです。評価を誤らせる原因を完全に取り除くことは難しいため、評価者が陥りがちな傾向を認識し誤差や偏りを減らすことが重要です。\n\n・Bは誤りです。これは「ハロー（後光）効果」の説明です。\n\n・Dは誤りです。中心化傾向とは、潜在的に最高の評価や最低の評価をつけることを避け、3や4に評価が集中する傾向のことです。", "source": "グロービス マネジメントブック 改訂3版\n\n17．評価 P.214-215"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 22, "question": "■問22.能力開発は「コスト」ではなく、企業の競争優位の源泉となる知識を生み出す人に対する「戦略的な投資」としてとらえることが重要だ。こうした視点を持ち、持続的に好調な業績を上げている企業に見られる特徴について正しいものを選択してください。\nA.経営者自身が自分のミッションとして能力開発に積極的に関与していない。\n\nB.継続的な能力開発の仕組みを作り上げることを意識し、短期での静態的な計画に基づいて育成を進めている。\n\nC.変化に追従するための最新知識（フロー）を得ることではなく、変化そのものの意味合いをとらえ、進むべき方向を自ら考える自律的な思考力（ストック）を開発することに投資をしている。", "answer": "C", "explanation": "A：経営者自身が自分のミッションとして能力開発に積極的に関与している。\n\nB：継続的な能力開発の仕組みをつくり上げることを意識し、短期から中長期にかけての動態的な計画に基づいて育成を進めている。", "source": "グロービス マネジメントブック 改訂3版\n\n18.能力開発 P.216-217"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 23, "question": "■問23.ワーク・ライフ・バランスの説明のなかで、誤っているものを選択してください。\nA.近年、副業や兼業などを積極的に支援する企業も増えているが、そうした活動を加速するためにも、ワーク・ライフ・バランスは重要である。\n\nB.多くの組織ではフレックスタイムでの勤務、在宅での勤務、弾力的な休職制度、退職した社員の再雇用、パートタイム労働の多様化など、多様かつ柔軟な働き方ができるような制度を設け始めている。\n\nC.人間は、組織の構成員である以前にひとつの人格であり、組織で働くことは生活の一部にすぎない。家族や地域社会、学校の同窓会などの組織や社会において一定の役割を担うことを期待されているし、また貢献したいと望んでいる。\n\nD.マネジメントにおいて、従業員が組織における役割とそれ以外の社会における役割をメリハリをもって担えるようサポートすることが求められる。それは長い目でみればCSRを果たすことにもつながり、人材獲得の競争力や企業業績にもつながっていく。", "answer": "A", "explanation": "A.誤り\n\nB.正しい\n\nC.正しい\n\nD.正しい\n\nAの内容が誤っており、正しくは以下の通り。\n\n近年、ボランティア活動などを積極的に支援する企業も増えているが、そうした活動を加速するためにも、ワーク・ライフ・バランスは重要です。\n日々の生活が充実していなければ、従業員もボランティア活動に取り組もうなどとは考えないためです。", "source": "グロービス マネジメントブック 改訂3版\n21.ワーク・ライフ・バランス P.222-223"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 24, "question": "■問24.次の文章中の(①)～(④)にあてはまる語句の組み合わせとして最も適切なものを、以下の選択肢A～Dから選びなさい。\n・現代は、予想もしない急激な変化が常態化しているハイパー・チェンジの時代であり、こうした時代には、社員の疲労、うつ状態、感情障害などが増加し、多大な(①)を引き起こしかねない。従業員のメンタルな健康に十分な配慮をすることで、組織の(②)を高く維持することが求められている。\n\n・1980年代以降、だれもがストレス性疾患のリスクにさらされるようになり、社内に(③)を常駐させる企業が増えた。\n\n・あらゆるメンタル不調を医学の領域に押し込め、医学的に対応しようとするアプローチに対する反省から生まれたのが、適応アプローチだ。このアプローチで重要なのは、職場において対応可能なケースをしっかり見極め、(④)、人的資源管理の両面から適切な対策を打つということだ。\n\nA：①人件費増大 ②評判 ③保健師 ④心理学\n\nB：①経済的損失 ②生産性 ③産業医 ④組織行動学\n\nC：①人件費増大 ②生産性 ③産業医 ④心理学\n\nD：①経済的損失 ②評判 ③保健師 ④組織行動学", "answer": "B\n①経済的損失 ②生産性 ③産業医 ④組織行動学", "explanation": "・現代は、予想もしない急激な変化が常態化しているハイパー・チェンジの時代であり、こうした時代には、社員の疲労、うつ状態、感情障害などが増加し、多大な経済的損失を引き起こしかねない。従業員のメンタルな健康に十分な配慮をすることで、組織の生産性を高く維持することが求められている。\n\n・適応アプローチで重要なのは、組織行動学、人的資源管理の両面から適切な対策を打つということだ。組織行動学的なものとしては、カウンセリング・マインドを持ち、部下の話にしっかり耳を傾けるなどがある。人的資源管理に関連する打ち手としては、研修や、評価の際に部下に対して納得性の高いフィードバックを行ったり、能力開発のヒントを適切に提示することなどがある。", "source": "グロービス マネジメントブック 改訂3版\n\nメンタルヘルスP.224-225"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 24, "question": "■問24.次の文章中の(①)～(④)にあてはまる語句の組み合わせとして最も適切なものを、以下の選択肢A～Dから選びなさい。\n・現代は、予想もしない急激な変化が常態化しているハイパー・チェンジの時代であり、こうした時代には、社員の疲労、うつ状態、感情障害などが増加し、多大な(①)を引き起こしかねない。従業員のメンタルな健康に十分な配慮をすることで、組織の(②)を高く維持することが求められている。\n\n・1980年代以降、だれもがストレス性疾患のリスクにさらされるようになり、社内に(③)を常駐させる企業が増えた。\n\n・あらゆるメンタル不調を医学の領域に押し込め、医学的に対応しようとするアプローチに対する反省から生まれたのが、適応アプローチだ。このアプローチで重要なのは、職場において対応可能なケースをしっかり見極め、(④)、人的資源管理の両面から適切な対策を打つということだ。\n\nA：①人件費増大 ②評判 ③保健師 ④心理学\n\nB：①経済的損失 ②生産性 ③産業医 ④組織行動学\n\nC：①人件費増大 ②生産性 ③産業医 ④心理学\n\nD：①経済的損失 ②評判 ③保健師 ④組織行動学", "answer": "B\n①経済的損失 ②生産性 ③産業医 ④組織行動学", "explanation": "・現代は、予想もしない急激な変化が常態化しているハイパー・チェンジの時代であり、こうした時代には、社員の疲労、うつ状態、感情障害などが増加し、多大な経済的損失を引き起こしかねない。従業員のメンタルな健康に十分な配慮をすることで、組織の生産性を高く維持することが求められている。\n\n・適応アプローチで重要なのは、組織行動学、人的資源管理の両面から適切な対策を打つということだ。組織行動学的なものとしては、カウンセリング・マインドを持ち、部下の話にしっかり耳を傾けるなどがある。人的資源管理に関連する打ち手としては、研修や、評価の際に部下に対して納得性の高いフィードバックを行ったり、能力開発のヒントを適切に提示することなどがある。", "source": "グロービス マネジメントブック 改訂3版\n\nメンタルヘルスP.224-225"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 25, "question": "■問25. 以下は「人の行動メカニズム」に関する記述である。誤っているものを1つ選択してください。\nA.企業は通常、人・組織のマネジメントの具体的な施策（報奨や評価制度など）を用いて、従業員やその集合である組織に影響を与え、企業の戦略目標の実現につながる行動を促そうとする。\n\nB.従業員に期待どおりに動いてもらうためには、人の行動のメカニズム（法則性）を理解しておくことが重要である。\n\nC.人の行動メカニズムを理解しないまま施策を打つと、弊害が生じることもある。\n\nD.個人の考え方や価値観は、属している企業の影響を受けて類似する傾向があるため、一定の傾向として整理することで、行動の予測に活用できる。", "answer": "D", "explanation": "A：正しい\n\nB：正しい\n\nC：正しい\n\nD：誤り\n\n個人の考え方や価値観は多様性に富む。したがって、多面的な視点からさまざまな可能性を予測するよう心がけることも大切。", "source": "グロービス マネジメントブック 改訂3版\n\n1.企業経営と人・組織のマネジメント P.182-183\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_HRM"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 26, "question": "■問26.「外部環境要因」に関連する内容についての説明で誤っているものを1つ選びなさい。\nA. 法的規制とは、法律や条令、裁判所が下した判例のことである。これに従って、人と組織のマネジメントを行わなければならない。\n\nB. 企業が従業員の賃金レベルや就業条件など、人・組織のマネジメントの具体的施策を決定するには、従業員の同意を得る必要があるが、労働組合と交渉を行う必要はない。\n\nC. 景気動向や金利・為替の変動などの経済状況も、人・組織のマネジメントに影響を及ぼす。\n\nD. 企業の競争力を維持するためには、競合他社の従業員と同等もしくはそれ以上の能力・資質を持った従業員を獲得し、育てるような施策を用意する必要がある。", "answer": "B", "explanation": "A・C・Dは正しい。\n\nBは「従業員の同意を得る必要があるが、労働組合と交渉を行う必要はない」が誤り。\n\n従業員の同意を得るために、従業員の代表である労働組合と交渉を行う必要がある。", "source": "グロービス マネジメントブック 改訂3版\n\n2.人・組織のマネジメントに影響を及ぼす要因 P.184-185"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 27, "question": "■問27.人・組織のマネジメントは、「組織行動学」（OB）と「人的資本管理」（HRM）に分けて考えることができる。OBとHRMの説明について、正しいものを全て選びなさい。\nA.OBとHRMは、社会学や心理学などから導き出された「人の行動メカニズム」に基づいている。\n\nB.人の行動メカニズムを考慮しながら、HRMではマネージャーなどの「個人の取り組み」によって、OBでは評価制度などの「仕組み」をつくることによって、組織や人に働きかける。\n\nC.企業はOBの考え方とHRMの考え方とを組み合わせて、人・組織のマネジメントを行うが、そのときに重要なのは、OBの個別の行動とHRMの具体的な仕組みとの間で整合性がとれていることである。\n\nD.人・組織のマネジメントは人事部門の専管事項と見なされることが多く、企業の競争優位の源泉となる「ヒト」と、ヒトの持つ「知識」や「知恵」の重要性が増している今日、人事部門以外の機能を担う部門のマネージャーもOBとHRMを理解する必要がある。", "answer": "A, C, D", "explanation": "A.正しい\n\nB.誤り\n\n人の行動メカニズムを考慮しながら、OBではマネージャーなどの「個人の取り組み」によって、HRMでは評価制度などの「仕組み」をつくることによって、組織や人に働きかける。\n\nC.正しい\n\nD.正しい", "source": "グロービス マネジメントブック 改訂3版\n\n3.組織行動学と人的資源管理 P.186-187\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_HRM"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 28, "question": "■問28.下記の「組織文化の機能」に関する文章中の（①）から（④）に入る語句の組み合わせとして適切なものを、選択肢AからDより選んでください。\n・組織文化は、とるべき判断や行動の指針を与える。その結果、（①）のスピードを速め、学習コストを低減する。\n\n・組織文化は、（②）の簡素化の機能を持つ。これにより、情報の解釈における不確実性も小さくなるので、構成員間の誤解やコンフリクトを回避することができる。\n\n・組織文化によって、構成員は何を行えば組織で評価されるかを学び、自ら目標を設定し、実践するための（③）を高めることができる。\n\n・組織文化の機能は企業にとってよい影響を与えているように見えるが、あまりに強烈な価値観が組織内で共有化されている場合、構成員のものの見方が固定化し、（④）を見過ごす原因になることがある。\n\nA. ①成長 ②組織構造③スキル ④企業価値\n\nB. ①成長 ②情報伝達 ③モチベーション ④企業価値\n\nC. ①意思決定 ②組織構造 ③スキル ④環境変化\n\nD. ①意思決定 ②情報伝達 ③モチベーション ④環境変化", "answer": "D", "explanation": "・組織文化は、とるべき判断や行動の指針を与える。その結果、「意思決定」のスピードを速め、学習コストを低減する。\n\n・組織文化は、「情報伝達」の簡素化の機能を持つ。これにより、情報の解釈における不確実性も小さくなるので、構成員間の誤解やコンフリクトを回避することができる。\n\n・組織文化によって、構成員は何を行えば組織で評価されるかを学び、自ら目標を設定し、実践するための「モチベーション」を高めることができる。\n\n・組織文化の機能は企業にとってよい影響を与えているように見えるが、あまりに強烈な価値観が組織内で共有化されている場合、構成員のものの見方が固定化し、「環境変化」を見過ごす原因になることがある。", "source": "グロービス マネジメントブック 改訂3版\n\n12.組織文化と企業経営  P.204-205"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 29, "question": "■問29.組織設計にあたって考慮すべき要素には、分業と協業、指揮命令系統、管理範囲、意思決定権限、分化と統合が挙げられます。以下の記載の中で誤っているものを1つ選んでください。\nA.「問題が生じたときに、だれに報告・相談すればよいか」といった指揮命令系統の一貫性と明確さは業務を行ううえで不可欠である。\n\nB.管理範囲とは、1人のマネジャーが統制できる構成員の数を示したものである。管理範囲が広すぎると、組織の階層が増えて意思決定に時間がかかるなどの弊害が生じる。\n\nC.意思決定権限とは、組織のどこで意思決定を行うかを示したものである。組織の上位レベルである経営陣が組織の意思決定権限を独占的に持っている場合、その組織は「集権化されている」と言う。\n\nD.意思決定権限において、組織の下位レベルの者が主要な意思決定を行う機会が多いほど、その組織は「分権化されている」ことになる。", "answer": "B", "explanation": "A：正しい\n\nB：誤り\n\nC：正しい\n\nD；正しい\n\nBは誤りです。正しくは、組織の階層が増えて意思決定に時間がかかるなどの弊害が生じるのは、管理範囲が狭い場合です。一方、管理範囲が広い場合は、統制が効かず、不適切な行動が発生し、業務に支障をきたします。", "source": "グロービス マネジメントブック 改訂3版\n\n13.組織設計 P.206-207"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": 30, "question": "■問30.それぞれの組織形態のデメリットに関する記載について、正しいものを選択してください。\nA.機能別組織は、幅広い知識を持ったマネジャーが育ちにくく、組織間のコンフリクトが起きやすい。その結果、最終的な意思決定がトップ・マネジメントに委ねられることが多くなり、意思決定に時間を要する。\n\nB.事業部制組織は、各事業部間の競争意識が高いため、全社的に協力すべきときに協力しなかったり、経営資源を各事業部に分配する際に資源の取り合いになるおそれがある。\n\nC.マトリクス型組織の構成員は、通常2人のボスを持つことになるので、権限や責任が曖昧かつ流動的になり、指揮命令系統が混乱したり、業務に支障が生じるおそれがある。\n\nD.機能別組織は、個別の事業や製品について各機能部門の意思決定への関与が不明確なため、事業責任の所在が曖昧になりやすい。", "answer": "全て", "explanation": "A.正しい\n\nB.正しい\n\nC.正しい\n\nD.正しい", "source": "グロービス マネジメントブック 改訂3版\n\n14.組織形態 P.208-209"}, {"subject": "GMAP2026S_HRM", "tag": "GMAP2026S_HRM", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 1, "question": "■問1.下記A～Dの選択肢のうち、リーダーシップのステップとして正しいものを選んでください。\nA. ①短期的な計画や予算を立案する ②組織構造の設計、人員の配置、詳細計画のコミュニケーションなどを行う ③予算や実績管理などを行い、問題解決を図る\n\nB. ①短期的なビジョンを提示する ②ビジョンを伝達することにより、メンバーを統合する ③予算や実績管理などを行い、問題解決を図る\n\nC. ①長期的な計画や予算を立案する ②組織構造の設計、人員の配置、詳細計画のコミュニケーションなどを行う ③メンバーの動機づけを行う\n\nD. ①長期的なビジョンを提示する ②ビジョンを伝達することにより、メンバーを統合する ③メンバーの動機づけを行う", "answer": "D", "explanation": "Aはマネジメントに対する記述となる 。BとCはステップも内容も誤り。グロービスマネジメントブックでは、マネジメントとリーダーシップを異なる機能としてとらえるハーバード・ビジネススクールのJ.コッター教授の理論に従う。コッターは、経営陣やマネジャーに求められる機能を「変革を推し進める機能」と「効率的に組織を運営する機能」の2つに分け、前者をリーダーシップ、後者をマネジメントと定義した。", "source": "グロービス マネジメントブック 改訂3版\n\n4．リーダーシップとマネジメント P.188-189"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 2, "question": "■問2.エンパワーメントの成功要件として誤っているものを全て選んでください。\nA.経営理念、ビジョンの共有：「組織は何のために存在するのか」という組織の存在意義や使命と、ある時点までに「こうなっていたい」と思う組織の到達目標を通して、「必ずすべきこと」や「すべきではないこと」などの行動規範を共有する。\n\nB.正当な評価と報奨：OBの取り組みとしては、行動規範にかなった行動はほめ、反する行動に対しては適切な罰を与えるなどが挙げられる。これら評価と報奨が対象とする行動と、経営理念やビジョンが求める行動規範が乖離している場合、構成員は困惑し、エンパワーメントを行っても組織目標の実現に結びつかない。\n\nC.能力の把握と資源の提供：エンパワーメントを行う際には、業務を任せる相手の性格を見極めることが重要である。構成員の性格を把握したうえで、自律的に動くために必要な情報や経営資源を提供し、成功体験を積ませることにより、構成員のモチベーションをさらに高めることができる。", "answer": "B,C", "explanation": "Ｂ：(正) 改善を求める （誤）適切な罰を与える\n\n正当な評価と報奨：OBの取り組みとしては、行動規範にかなった行動はほめ、反する行動に対して改善を求めることなどが挙げられる。これら評価と報奨が対象とする行動と、経営理念やビジョンが求める行動規範が乖離している場合、構成員は困惑し、エンパワーメントを行っても組織目標の実現に結びつかない。\n\nＣ：（正）能力 （誤）性格\n\n能力の把握と資源の提供：エンパワーメントを行う際には、業務を任せる相手の能力を見極めることが重要である。構成員の能力を把握したうえで、自律的に動くために必要な情報や経営資源を提供し、成功体験を積ませることにより、構成員のモチベーションをさらに高めることができる。", "source": "グロービス マネジメントブック 改訂3版\n\n5．エンパワーメント P.190-191"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 3, "question": "■問3.多様なステークホルダーに影響を与える「パワー」、すなわち「人や組織の行動に影響を与える力」に関する記述として、正しいものはどれか。\nA.パワーを構成する要素は「強制力」「報酬力」「正当権力」「専門力」の4つである。\n\nB.戦略の実現には必ずしも1人で全てのパワーの源泉を兼ね備えている必要はない。\n\nC.パワーの受け手と与え手の関係によって、影響力の度合いは変化するが、こうした関係は不変ではない。\n\nD.社会的・倫理的に問題のある方法を用いることを避けるために、企業が求める行動規範や価値観を明確にし、社内に浸透させる必要がある。", "answer": "B,C,D", "explanation": "A.アメリカの社会心理学者のジョン・フレンチとバートラム・ラーベンによると、パワーを構成する5つの要素は「強制力」「報酬力」「正当権力」「専門力」、そして「同一視力」である。", "source": "グロービス マネジメントブック 改訂3版\n\n6.パワー p.192-193"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 4, "question": "■問4.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n・(①)は、人間を「本来怠け者で責任を回避しようとする」(②)理論と、\n\n「本来勤勉で、進んで仕事を行い、責任を取ろうとする」(③)理論と考える。\n\n・近年では(④)理論に基づいて(⑤)を考えることが必要だと言われている。\n\nA. ①マグレガー ②X ③Y ④Y ⑤動機づけ\n\nB. ①ポーター ②X ③Y ④X ⑤動機づけ\n\nC. ①マグレガー ②Y ③X ④Y ⑤報酬\n\nD. ①ポーター ②Y ③X ④X ⑤報酬", "answer": "A", "explanation": "D.マグレガーは、人間をX理論とY理論で説明している。\n\nX理論では「人間は本来怠け者で、責任を回避しようとするものだ」と考えるのに対し、\n\nY理論では「人間は本来勤勉で、進んで仕事を行い、責任を取ろうとするものだ」と考える。\n\n近年では、Y理論に基づいて動機づけを考えることが必要だと言われている。", "source": "グロービス マネジメントブック 改訂3版\n\n7．モチベーションとインセンティブ P.194-195"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 5, "question": "■問5.下記文章中の（①）から（⑥）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n＜集団を捉える視点＞\n\n■①：集団の構成員間で共有する行動基準を指す。\n\n■②：集団において期待される行動様式を指す。\n\n■③：集団内における相対的な位置付けを指す。\n\n■④：集団の構成員数を指す。\n\n■⑤：集団の構成員の組み合わせの多様さを指す。\n\n■⑥：集団が構成員を引きつけ、その集団の一員であり続けるように動機づける度合いを指す。\n\nA. ①役割 ②規範 ③凝集性 ④多様性 ⑤規模 ⑥地位\n\nB. ①役割 ②規範 ③凝集性 ④規模 ⑤多様性 ⑥地位\n\nC. ①規範 ②役割 ③地位 ④規模 ⑤多様性 ⑥凝集性\n\nD. ①規範 ②役割 ③地位 ④多様性 ⑤規模 ⑥凝集性", "answer": "C", "explanation": "①規範：たとえば、構成員間で「役職が上位の人に対して批判的意見を言うべきではない」という意識が浸透している場合、それがその集団の規範と言える。\n\n②役割：人はさまざまな集団に属するが、集団によって期待される役割が対立したり矛盾することがある。その結果、強いストレスが生じたり、期待される役割を果たせなかったりする。\n\n③地位：地位は、公式に規定される場合と集団の規範や価値観に基づき、個人の能力や経験などによって非公式に与えられる場合がある。地位の獲得は重要なモチベーションの１つである。\n\n④規模：一般に、人数が多ければより多様な意見や情報を入手でき、少なければ意思決定や行動がより迅速になる。\n\n⑤多様性：構成員のバックグラウンドや文化、価値観などが多様な集団は、同質的な人々から成る集団よりも、個人間の相違が大きいため、短期的にはコンフリクトを生むことが多い。しかし、そうした困難をいったん克服できれば、構成員がさまざまな情報や能力を持っていることの利点が発揮され、より高い成果を生み出す可能性が高い。\n\n⑥凝集性：凝集性の高さは、各構成員の魅力や構成員間の相互作用、集団の目標や規模などの要素によって決まる。集団の凝集性が高いとき、共有する目標に対する集団としての成果が大きくなる傾向がある。", "source": "グロービス マネジメントブック 改訂3版\n\n8.集団のメカニズム P196-197\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_OBH"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 6, "question": "■問     6.リーダーが高い成果を上げるチームをつくるために重要なことの１つに「凝集性」がある。賛同するメンバー、そうでないメンバーを見極める中で、リーダーは「集団の発展段階」を考慮に入れ、構成員に働きかけていくことを求められる。「集団の発展段階」の５つの形成プロセスである下記のA～Eをプロセス順に並び替えなさい。\nA.規範形成期\n\nB.終了期\n\nC.形成期\n\nD. 実現期\n\nE.激動期", "answer": "C→E→A→D→B", "explanation": "形成期→激動期→規範形成期→実現期→終了期\n\n形成期：集団結成が明示され、構成員が顔合わせする段階。人が集まっただけで、集団の機能もなく、目的や規範も共有されていない。\n\n激動期：議論・緊張・衝突が生まれる段階。構成員間での考え方や主張がぶつかり、集団内での自分の役割や地位についてイメージができる。\n\n規範形成期：構成員が規範を作り出す段階。集団の目的・各自の役割を明確にし共有する。\n\n実現期：特定の目的を持った集団として構成員が統合され、集団が機能する段階。マネジメントの巧拙によっては、このステップに至らないまま解散することもある。\n\n終了期：集団目的の達成や目的の分化などの理由によって集団が解散する段階。", "source": "グロービス マネジメントブック 改訂3版\n\n9．チーム・マネジメントP.198-199"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 7, "question": "■問7.円滑なコミュニケーションを行うプロセスのAからDを順番に並べてください。\nA.伝達\n\nB.解読\n\nC.記号化\n\nD. フィードバック", "answer": "C→A→B→D", "explanation": "記号化→伝達→解読→フィードバックの順となる。\n\n・記号化：メッセージを記号に変換すること。大きく言語、非言語の２種類ある。言語にすることにより、話す、聞く、書く、読むといった方法が可能になる。非言語は表情や態度、行動、相手との距離のとり方など言語以外の記号である。\n\n・伝達：さまざまなチャネル（伝達経路）を通じてメッセージを受け手に伝えること。チャネルは、電話や電子メールなどの具体的な方法を指すこともあれば、組織における公式／非公式な伝達経路を指すこともある。チャネルの選択はコミュニケーションの目的と大きく関係する。ビジネス上の公式なメッセージは、組織のルールに則して正規のチャネルに乗せることが重要になる。特に業務上の指示・命令、報告・連絡などは、チャネルの正当性がメッセージの信頼性に影響を与える。\n\n・解読：受け手が記号化されたメッセージの意味を読み取ること。送り手と受け手は通常、それぞれの個人的経験や組織内における地位や役割などが異なっているため、両者が同じ記号から読み取るメッセージが完全に同じなることは稀である。\n\n・フィードバック：受け手が解読したメッセージを送り手とともに確認すること。具体的には、ポイントを繰り返したり、言い換えたりすることによって、お互いの理解する意味合いがほぼ一致していることを確認する。", "source": "グロービス マネジメントブック 改訂3版\n\n10．コミュニケーション P.200-201"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 8, "question": "■問8.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・コンフリクト（対立、軋轢）とは、相反する意見、態度、要求などが存在し、互いに譲らないことで緊張状態が生じることを言う。\n\n・コンフリクトは通常、そのマイナス面ばかりに目が向きがちだが、マネジメントのやり方次第で、アイデアの創造や本質的な問題の発見などにつながり、組織の成果を高めるドライバーとなりうる。\n\n・コンフリクトのプラス面として、互いに（①）で意欲が高まる、相互の意見交換の過程で相手への理解が深まる、その過程において自己の考えを明確にして当初のアイデアを発展させたり、新たな視点や本質的な問題が発見出来ることなどが挙げられる。\n\n・マイナス面としては、不快感を味わう、非効率的な（②）が増える、情報が正しく伝達されず（③）に歪みが生じる、などがある。\n\nA. ①同調すること ②コミュニケーション ③意思決定\n\nB. ①同調すること ②共同作業 ③役割分担\n\nC. ①競い合うこと ②共同作業 ③役割分担\n\nD. ①競い合うこと ②コミュニケーション ③意思決定", "answer": "D", "explanation": "・コンフリクトのプラス面として、互いに競い合うことで意欲が高まる、相互の意見交換の過程で相手への理解が深まる、その過程において自己の考えを明確にして当初のアイデアを発展させたり、新たな視点や本質的な問題が発見出来ることなどが挙げられる。\n\n・マイナス面としては、不快感を味わう、非効率的なコミュニケーションが増える、情報が正しく伝達されず意思決定に歪みが生じる、などがある。", "source": "グロービス マネジメントブック 改訂3版\n\n11.コンフリクト P.202-203"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 9, "question": "■問9.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n<組織変革の方法とプロセス>\n\n組織変革は直ぐにできるものではなく、次の３つの段階を踏んで進めていくことが重要であると社会心理学者のクルト・レビンは、謳っている。\n\n●①：メンバーに変革の必要性を理解させ、現状を打破して、変化へ向けて準備させる段階。\n\n●②：変化のための具体的な方策を実施し、新たな行動や考え方を学習させていく段階。\n\n●③：新しく導入された変化を定着させる段階。\n\nA. ①解凍 ②移動 ③再凍結\n\nB. ①説得 ②納得 ③定着\n\nC. ①解凍 ②浸透 ③再凍結\n\nD. ①説得 ②学習 ③理解", "answer": "A", "explanation": "社会心理学者のクルト・レビンは、変革のプロセスを「解凍・移動・再凍結」の三段階にまとめている。\n\n●解凍：メンバーに変化の必要性を理解させ、現状を打破して、変化へ向けて準備させる段階。\n\n●移動：変化のための具体的な方策を実施し、新たな行動や考え方を学習させていく段階。\n\n●再凍結：新しく導入された変化を定着させる段階。\n\n企業は推進役となるリーダーの強い意志の下、このプロセスに沿って変革を進めていくことが重要。", "source": "グロービス マネジメントブック 改訂3版\n\n19.変革のマネジメント P.218-219"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 10, "question": "■問10.センゲは、「学習する組織」の実現のために必要な要素として「5つのディシプリン」(構成技術)を挙げました。以下の要素で誤っているものをすべて選択してください。\nA.システム思考：独立した事象に目を奪われずに、各要素間の相互依存性、相互関連性に着目し、全体像とその動きをとらえる思考方法を言います。\n\nB.自己実現と自己研鑽：自らのビジョンや欲求が何であるか探り続けると同時に、現状を的確に見極めることによって両者のギャップを認識し、ビジョンや欲求の実現に向けて行動することを言います。\n\nC.メンタル・モデルの克服：物事の見方や行動に大きく影響を与える固定観念や暗黙の前提をメンタル・モデルと言います。自社や競合、市場に関して組織で共有しているメンタル・モデルを認識し、それを打破するための取り組みは必要です。\n\nD.共有ビジョンの構築：各個人のビジョンから共有されたビジョンを導くことにより、お題目ではなく、組織の構成員が心底望む将来像を構築することを言います。\n\nE.個人学習：学習の基礎単位はチームではなく、個人です。個人で考えることにより、構成員間のダイアローグ（対話）を通して複雑な問題を探求するときよりも優れた解決方法の発見につながります。", "answer": "Eのみ誤り", "explanation": "個人学習ではなく、チーム学習です。学習の基礎単位は個人ではなく、チームです。優れた解決方法の発見につながるのは、個人で考えるときよりも、構成員間のダイアローグ（対話）を通じて複雑な問題を探求するときです。", "source": "グロービス マネジメントブック 改訂3版\n\n20．組織学習 P.220-221"}, {"subject": "GMAP2026S
