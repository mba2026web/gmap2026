_OBH", "tag": "GMAP2026S_OBH", "qnum": 11, "question": "■問11.以下はグループシンクの考え方を説明した文章となります。①から④を埋める組み合わせとして正しいものを、下記A～Dから選んでください。\n一般に、集団における意思決定は個人で行う意思決定より優れている。それは、多様な意見や情報を収集できたり、決定内容がより多くの人に受け入れられる可能性が高いからだ。\n\n一方、集団ゆえに陥りやすい問題もある。その1つである「グループシンク」は合意に至ろうとするプレッシャーから、集団において物事を多様な視点から批判的に評価する能力が欠落する傾向である。とくに集団の（①）が高い場合や、外部と隔絶している場合、（②）なリーダーが存在する場合などに起きやすい。グループシンクを避けるためには、異なった意見を十分に受け入れ、（③）な批判を重視し、（④）の分析に時間をかけるなどの配慮が必要だ。\n\nA. ①凝集性 ②理想的 ③内省 ④要因\n\nB. ①凝集性 ②支配的 ③建設的 ④選択肢\n\nC.①地位 ②理想的 ③建設的 ④要因\n\nD.①地位 ②支配的 ③内省 ④選択肢", "answer": "B", "explanation": "「グループシンク」は合意に至ろうとするプレッシャーから、集団において物事を多様な視点から批判的に評価する能力が欠落する傾向である。とくに集団の凝集性が高い場合や、外部と隔絶している場合、支配的なリーダーが存在する場合などに起きやすい。グループシンクを避けるためには、異なった意見を十分に受け入れ、建設的な批判を重視し、選択肢の分析に時間をかけるなどの配慮が必要だ。", "source": "グロービス マネジメントブック 改訂3版\n\n8.集団のメカニズム． P.196-197"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 12, "question": "■問12. 以下は代表的なモチベーション理論について述べたものである。以下の(1)〜(6)にあてはまるものを以下の選択肢A〜Fからそれぞれ選んでください。\n①マズローの欲求５段階説：人間の欲求を「生理的」「安全」「(1)」「尊厳」「(2)」という、低次から高次への５段階に分けて考えた。低次の欲求が満たされるとより高次の欲求へと移行する。それと同時に、低次の欲求によるモチベーション形成へのインパクトは弱まる。\n\n②マクレガーの(3)理論・(4)理論：人間を(3)理論と(4)理論で説明している。(3)理論では「人間は本来怠け者で、責任を回避しようとするものだ」、(4)理論では、「人間は本来勤勉で、進んで仕事を行い、責任を取ろうとするものだ」と考える。近年では(4)理論に基づいて動機づけを考えることが必要だと言われている。\n\n③ハーズバーグの動機づけ・衛生理論：仕事に対する満足をもたらす要因と、不満をもたらす要因が異なることを示し、前者を(5)、後者を(6)と呼んだ。(5)を与えることにより、満足を高め、モチベーションを向上させることができる。一方、(6)に対して手を打つことにより、不満は解消されるが、そのことが満足感やモチベーションを高めるとは限らない。\n\nA. X、 B. 社会的、 C. 自己実現、D. 動機づけ要因、 E. Y、 F. 衛生要因", "answer": "(1) B, (2) C, (3)A, (4)E, (5)D, (6)F", "explanation": "①マズローの欲求５段階説：人間の欲求を「生理的」「安全」「社会的」「尊厳」「自己実現」という、低次から高次への５段階に分けて考えた。低次の欲求が満たされるとより高次の欲求へと移行する。それと同時に、低次の欲求によるモチベーション形成へのインパクトは弱まる。\n\n②マクレガーのX理論・Y理論：人間をX理論とY理論で説明している。X理論では「人間は本来怠け者で、責任を回避しようとするものだ」、Y理論では、「人間は本来勤勉で、進んで仕事を行い、責任を取ろうとするものだ」と考える。近年ではY理論に基づいて動機づけを考えることが必要だと言われている。\n\n③ハーズバーグの動機づけ・衛生理論：仕事に対する満足をもたらす要因と、不満をもたらす要因が異なることを示し、前者を動機づけ要因、後者を衛生要因と呼んだ。動機づけ要因を与えることにより、満足を高め、モチベーションを向上させることができる。一方、衛生要因に対して手を打つことにより、不満は解消されるが、そのことが満足感やモチベーションを高めるとは限らない。", "source": "グロービス マネジメントブック 改訂3版\n\nモチベーションとインセンティブ P.194-195"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 13, "question": "■問13.コミュニケーションの落とし穴に関する記述として、正しいものはどれか。\nA.送り手に関わる阻害要因に「選択的認知」がある。これは受け手により好意的に受け入れてもらうために、送り手が情報を操作することである。\n\nB.受け手に関わる阻害要因に「フィルタリング」がある。これは個人的な経験に基づいて複数の情報から特定の情報のみを選択したり、自己の関心を反映させた解釈を行うことである。\n\nC.送り手と受け手双方に関わる阻害要因に「文化的差異」がある。文化的な背景が違うと、同じ単語やジェスチャーが意味するものが異なることがある。\n\nD.非言語コミュニケーション、とくに「感情表現」は送り手と受け手双方に誤解を与えることが多い。極端な感情表現に直面すると、理性的かつ客観的な思考過程を無視し、感情的な判断を下しがちになる。", "answer": "CとD", "explanation": "AとBは、誤り。\n\n正しくは\n\nA.送り手に関わる阻害要因に「フィルタリング」がある。〜\n\nB.受け手に関わる阻害要因に「選択的認知」がある。〜\n\nである。", "source": "グロービス マネジメントブック 改訂3版\n\n10．コミュニケーション P.200-201"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 14, "question": "■問14.ビジネスにおけるエンパワーメントの特徴のうち、誤っているものを1つ選んでください。\nA.エンパワーメントの特徴は「自律性」を促し、「支援」することにある\n\nB.エンパワーメントは習得可能な「経営の技術」である\n\nC.業務の遂行を支援する方法は従業員自身が問題点を発見したり、不足する能力を開発できる環境を整えることだ\n\nD.業務の遂行を支援する方法は、従業員に具体的な指示を与えて従わせることにある", "answer": "Dのみ誤り", "explanation": "業務の遂行を「支援」するやりかたも、具体的な指示や解決策を従業員に与えるのではなく、従業員自身が問題点を発見したり、不足する能力を開発できるように環境を整えるといった形をとる。", "source": "グロービス マネジメントブック 改訂3版\n\nエンパワーメント P.190-191\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_OBH"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 15, "question": "■問15.経営管理者に要求される能力として「企業変革の必要性」と「企業運営の複雑性」の２つの軸で整理した時、「企業変革の必要性が高く、企業運営の複雑性が低い」という場合に要求される能力は①から④のうち、どれでしょう。\n■①：リーダーシップ、マネジメント機能ともそれほど必要としない\n\n■②：高度のリーダーシップが必要であるが、マネジメント機能へのニーズは少ない\n\n■③：高度のマネジメント機能が必要であるが、リーダーシップ機能へのニーズは少ない\n\n■④： リーダーシップ、マネジメントの両機能が大いに要求されている", "answer": "②", "explanation": "「企業変革の必要性が低く、企業運営の複雑性が低い」→19世紀における大部分の企業組織\n\n「企業変革の必要性が高く、企業運営の複雑性が低い」→企業の創業期 ☚正解\n\n「企業変革の必要性が低く、企業運営の複雑性が高い」→高度成長期の大企業\n\n「企業変革の必要性が高く、企業運営の複雑性が高い」→現在の大部分の大企業\n\n（「グロービス マネジメントブック 改定3版」 P189の右下にあるマトリクス参照）", "source": "グロービス マネジメントブック 改訂3版\n\n4．リーダーシップとマネジメント P.188-189"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 16, "question": "■問16.激変する環境において企業が存続していくために、変革の力を内在化させた「学習する組織」になる必要がある。アージリスが提唱する「ダブルループ・ラーニング」について正しいものを選択しなさい。\nA.既存の目標達成へ向けて軌道修正を行う学習プロセス\n\nB.個人学習と組織学習を行い能力開発・スキルアップを図る学習プロセス\n\nC.組織の目的や前提そのものを疑い、それらも含めて軌道修正を行う学習プロセス\n\nD.個人の結果を組織で振り返り、また個人行動を修正する学習プロセス", "answer": "C", "explanation": "アージリスは、組織における学習プロセスは、「シングルループ・ラーニング」と「ダブルループ・ラーニング」の2形態あるとしている。\n\n問題に対して、既存の目的達成へ向けて軌道修正を行うことを「シングルループ・ラーニング」と呼ぶ。\n\n一方、「ダブルループ・ラーニング」とは、問題に対して、既存の目的や前提そのものを疑い、それらも含めて軌道修正を行うことを言う。\n\n組織の構成員が自発的な意欲と責任感を持って、変革に資するような行動をとるためにこの学習が必要である。", "source": "グロービス マネジメントブック 改訂3版\n\n20.組織学習P.220-221"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 17, "question": "■問17.パワーを有効に活用するためには、人や組織の行動に影響を及ぼすパワーの源泉を理解する必要があります。この「パワーの源泉」について、誤っているものを①から⑤の中、すべて選択してください。\n①.強制力：受け手にとって苦痛となるものを取り除くことで、影響力を及ぼすことのできる力。たとえば、ペナルティ（罰則）などが該当する。\n\n②.報酬力：受け手にとっての励みとなるものを与えることで、影響を及ぼすことのできる力。たとえば、インセンティブなどが該当する。\n\n③.正当権力：受け手に対して影響を及ぼすことができない社会的地位の高さ。たとえば、公式の地位などが該当する。\n\n④.専門力：受け手が信頼することのできる優れた専門性の高さ。たとえば、専門知識、技術などが該当する。\n\n⑤.同一視力：受け手にとって魅力のある人物、理想像であること。たとえば、業務\n\n経験、実績などが同一視力を形成する要素となりうる。", "answer": "①、③が誤り", "explanation": "① 強制力：受け手にとって苦痛となるものを与えることで、影響力を及ぼすことのできる力。たとえば、ペナルティ（罰則）などが該当する（苦痛となるものを取り除くではなく、与えるが正解）。\n\n③ 正当権力：受け手に対して影響を及ぼすことができる社会的地位の高さ。たとえば、公式の地位などが該当する（影響を及ぼすことができないのではなく、できるが正解）。\n\n②、④、⑤はそのとおり。", "source": "グロービス マネジメントブック 改訂3版\n\n６．パワー P.192-193"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 18, "question": "■問18.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・組織変革とは、新しい環境に適応するために組織を変化させることである。\n\n・一般には、過去の（①）にとらわれて変化を嫌い、変化から取り残された組織を刷新することを指す場合が多い。\n\n・しかし、環境が大きく変わることの多い今日では、変化を好み、自ら変化を生み出し、変化に自律的に対応する「（②）組織」になることが、組織変革の（③）になっている。\n\nA. ①伝統 ②自己変革型 ③始まりのスタート\n\nB. ①成功 ②自己変革型 ③最終ゴール\n\nC. ①伝統 ②共創型 ③始まりのスタート\n\nD. ①成功 ②共創型 ③最終ゴール", "answer": "B", "explanation": "・一般には、過去の成功にとらわれて変化を嫌い、変化から取り残された組織を刷新することを指す場合が多い。\n\n・しかし、環境が大きく変わることの多い今日では、変化を好み、自ら変化を生み出し、変化に自律的に対応する「自己変革型組織」になることが、組織変革の最終ゴールになっている。", "source": "グロービス マネジメントブック 改訂3版\n\n19.変革のマネジメント P.218-219"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 19, "question": "■問19.下記文章中の（①）から（④）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n<コンフリクトが個人および組織に及ぼしている効果>\n\nコンフリクトにはプラスの効果もマイナスの効果もある。対策を打つ前に、①の効果がより強く表れているかを分析する。\n\n<コンフリクトのパターン>\n\nコンフリクトの最初の②に対して、どのような対応を示し、そこからどのようにコンフリクトが深まったのかというパターンをつかむ。これにより、コンフリクトの根本原因と対処の糸口が見えてくることが多い。\n\nまた、当事者がどのように③を表現しているかも重要だ。コンフリクトは必ずしも④に表現されるとは限らない。表面化していないコンフリクトを発見するほうが困難かつ重要である場合が多い。\n\nA. ①どちら ②きっかけとなる行動 ③相違点 ④直接的\n\nB. ①マイナス ②きっかけとなる行動 ③不満 ④攻撃的\n\nC. ①プラス ②不満 ③問題 ④直接的\n\nD. ①マイナス ②不満 ③相違点 ④攻撃的", "answer": "A", "explanation": "<コンフリクトが個人および組織に及ぼしている効果>\n\nコンフリクトにはプラスの効果もマイナスの効果もある。対策を打つ前に、どちらの効果がより強く表れているかを分析する。\n\n<コンフリクトのパターン>\n\nコンフリクトの最初のきっかけとなる行動に対して、どのような対応を示し、そこからどのようにコンフリクトが深まったのかというパターンをつかむ。これにより、コンフリクトの根本原因と対処の糸口が見えてくることが多い。\n\nまた、当事者がどのように相違点を表現しているかも重要だ。コンフリクトは必ずしも直接的に表現されるとは限らない。表面化していないコンフリクトを発見するほうが困難かつ重要である場合が多い。", "source": "グロービス マネジメントブック 改訂3版\n\n11.コンフリクトP.202-203"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 20, "question": "■問20.集団の特徴をその形成プロセスに沿ってとらえておくと、新たにチームを結成し、発展させていく際に役立つ。集団の発展は5つの段階に分けることができる。\n以下の5つの段階の説明として誤っているものをすべて選んでください。\n\nA．形成期：構成員が規範を作り出す段階。集団の目的・各自の役割を明確にし共有する。\n\nB．激動期：議論・緊張・衝突が生まれる段階。構成員間での考え方や主張がぶつかり、集団内での自分の役割や地位についてイメージを形づくっていく。\n\nC．規範形成期：集団結成が明示され、構成員が顔合わせする段階。人が集まっただけで、集団の機能もなく、目的や規範も共有されていない。\n\nD．実現期：特定の目的を持った集団として構成員が統合され、集団が機能する段階。マネジメントの巧拙によっては、このステップに至らないまま解散することもある。\n\nE．終了期：集団目的の達成や目的の分化などの理由によって集団が解散する段階。", "answer": "AとC", "explanation": "Aの説明とCの説明が真逆になっている。\n\n正しくは、\n\nA．形成期：集団結成が明示され、構成員が顔合わせする段階。人が集まっただけで、集団の機能もなく、目的や規範も共有されていない。\n\nC．規範形成期：構成員が規範を作り出す段階。集団の目的・各自の役割を明確にし共有する。", "source": "グロービス マネジメントブック 改訂3版\n\n9．チーム・マネジメントP.198-199"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 21, "question": "■問21.下記A～Dの選択肢のうち、パワーの源泉についての説明として正しいものを選んでください。\nA. 強制力：相手にとって励みとなるものを与えることで、影響を及ぼすことのできる力。たとえば、インセンティブなどが該当する。\n\nB. 報酬力：受け手に対し影響を及ぼすことができる社会的地位の高さ。たとえば、公式の地位などが該当する。\n\nC. 正統権力：受け手が信頼することのできる優れた専門性の高さ。たとえば、専門知識、技術などが該当する。\n\nD. 同一視力：受け手にとって魅力のある人物、理想像であること。たとえば、業務経験、実績などが要素となりうる。", "answer": "D", "explanation": "パワーは5つの源泉で構成される。\n\nA.強制力は、受け手にとって苦痛になるものを与えることで、影響を及ぼすことのできる力。たとえば、ペナルティ（罰則）などが該当する\n\nB.報酬力は、受け手にとって励みとなるものを与えることで、影響を及ぼすことのできる力。たとえば、インセンティブなどが該当する\n\nC.正統権力は、受け手に対し影響を及ぼすことができる社会的地位の高さ。たとえば、公式の地位などが該当する\n\nD.同一視力に関する正解\n\nこのほか、専門力は、受け手が信頼することのできる優れた専門性の高さ。たとえば、専門知識、技術などが該当する。", "source": "グロービス マネジメントブック 改訂3版\n\n６．パワー P192-193"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 22, "question": "■問22. 以下は集団のメカニズムについて述べたものである。空欄(1)〜(6)にあてはまるものを選択肢A〜Fからそれぞれ選んでください。\n集団における意思決定\n\n一般に、集団における意思決定は個人で行う意思決定より優れている。それは、多様な意見や情報を収集できたり、決定内容がより多くの人に受け入れられる可能性が高いからだ。\n\n一方、集団ゆえに陥りやすい問題もある。その1つである「（1）」は、合意に至ろうとするプレッシャーから、集団において物事を多様な視点から批判的に評価する能力が欠落する傾向である。とくに集団の「（2）」が高い場合や、外部と隔絶している場合、支配的なリーダーが存在する場合などに起きやすい。グループシンクを避けるためには、異なった意見を十分に受け入れ、「（3）」を重視し、選択肢の分析に時間をかけるなどの配慮が必要だ。\n\n公式集団（フォーマル・グループ）と非公式集団（インフォーマル・グループ）\n\n企業には通常、公式集団と非公式集団が存在する。企業が公式に形成する「（4）」では、達成すべき目標と職務や役割が組織によって明確に定められる。一方、非公式集団は自然発生的に形成されるもので、多くの場合、「（5）」に基づいている。\n\nそこには、組織によって公式に定められた目標や役割はなく、集団構成員間の非公式な交流の中で共有された共通の利害や関心が存在する。非公式集団における人間関係や交流は、公式集団における行動や「（6）」に影響を及ぼす。\n\nA. 業績\n\nB. 建設的な批判\n\nC. 公式集団\n\nD. グループシンク\n\nE. 個人的な人間関係\n\nF. 凝集性", "answer": "（1） D（グループシンク）\n\n（2） F（凝集性）\n\n（3） B（建設的な批判）\n\n（4） C（公式集団）\n\n（5） E（個人的な人間関係）\n\n（6） A（業績）", "explanation": "複数の人が集まって形成される集団（グループ）の「行動」と「その基本原理」は、個人のそれとは異なる。組織の目標を実現するために、規範、役割、地位、規模、多様性、凝集性などの集団の特徴を理解する必要がある。", "source": "グロービス マネジメントブック 改訂3版\n\n集団のメカニズム  P.196-197"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 23, "question": "■問23.モチベーションとインセンティブに関する記述として、正しいものを全て選べ。\nA.代表的なインセンティブとして、金銭的報奨、社会的評価、自己実現の場の提供などがある。\n\nB.金銭的報奨は具体的・定量的でわかりやすく、不足すれば不満の原因となり、充足すればした分だけモチベーションを高める効果がある。\n\nC.魅力あるリーダや気心の知れた仲間などの社会的関係も、個人の安心感や余裕を生み、組織への帰属意識やコミットメントを引き出す。\n\nD.モチベーションの代表的な例として社会的動機があるが、これは「生活に必要な金銭を得たい」という最も一般的・根本的なものである。", "answer": "AとC", "explanation": "B.金銭的報奨はあるレベルを超えるとモチベーションを高める効果が薄れる傾向もある。\n\nD.問題文は金銭的動機を示しており、社会的動機とは「一定の価値観を共有できる集団（組織）の中で社会生活を営み、その中で注目や評価を受けたり、権力を得たい」という欲求から生じる。", "source": "グロービス マネジメントブック 改訂3版\n\n7.モチベーションとインセンティブ p.194-195"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 24, "question": "■問24.下記文章中の（①）から（⑤）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n「学習する組織」の特徴は次の通りだ。\n\n過去の（①）や戦略の枠に思考や行動を縛られることなく、変化に対応し、（②）していく機能を備えている。\n\nすべての構成員が（③）と（④）を持ち、現在の環境に適応する強さと将来の変化に対応する（⑤）を理解し実践する。つまり、組織全体が学習する能力を備えている。\n\nここでいう「学習」とは単に知識を習得することに留まらず、思考や行動のパターンを変えていくことを指す。\n\nA. ①組織文化 ②自己改革 ③自律性 ④協調性 ⑤柔軟性\n\nB. ①外部環境 ②エンパワーメント ③リーダーシップ ④適応能力 ⑤可能性\n\nC. ①企業風土 ②自己改革 ③リーダーシップ ④協調性 ⑤可能性\n\nD. ①内部環境 ②エンパワーメント ③自律性 ④適応能力 ⑤柔軟性", "answer": "A", "explanation": "「学習する組織」の特徴について答えてください。\n\n過去の組織文化や戦略の枠に思考や行動を縛られることなく、変化に対応し、自己改革していく機能を備えている。\n\nすべての構成員が自律性と協調性を持ち、現在の環境に適応する強さと将来の変化に対応する柔軟性を理解し実践する。つまり、組織全体が学習する能力を備えている。\n\nここでいう「学習」とは単に知識を習得することに留まらず、思考や行動のパターンを変えていくことを指す。", "source": "グロービス マネジメントブック 改訂3版\n\n組織学習 P. 220-221"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 25, "question": "■問25.コミュニケーション・プロセスの説明について、A群のプロセスとB群の説明を繋げ、適切な組み合わせをつくりなさい。\n＜A群：プロセス＞\n\n①記号化\n\n②フィードバック\n\n③伝達\n\n④解読\n\n＜B群：説明＞\n\n[a] メッセージを記号に変換すること\n\n[b] さまざまなチャネルを通してメッセージを受け手に伝えること\n\n[c] 受け手が記号化されたメッセージの意味を読み取ること\n\n[d] 受け手が解読したメッセージを送り手とともに確認すること", "answer": "①ー[a]\n\n③ー[b]\n\n④ー[c]\n\n②ー[d]", "explanation": "①記号化 ：[a] メッセージを記号に変換すること\n\n③伝達 ：[b] さまざまなチャネルを通してメッセージを受け手に伝えること\n\n④解読 ：[c] 受け手が記号化されたメッセージの意味を読み取ること\n\n②フィードバック：[d] 受け手が解読したメッセージを送り手とともに確認すること\n\nなお、A群のプロセスの順番に注意。\n\n記号化→伝達→解読→フィードバック が正しい。", "source": "グロービス マネジメントブック 改訂3版\n\nコミュニケーション P.200-201"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 26, "question": "■問26.変革に対する抵抗や対処について、誤りである文章を一つ選択しなさい。\nA.変革の実行は通常、大きな困難を伴う。なぜなら、人の行動にも、内からの力を受けない限り同じ状態にとどまろうという「慣性の法則」が働くからだ。\n\nB.変革に対する抵抗を克服するためには、その原因を突き止め、状況に応じた対策を講じる必要がある。\n\nC.変革の必要性に対する認識が不足している場合は、理解を促すためのコミュニケーションを強化したり、変革の計画や実行段階に構成員を参加させることで対応する。\n\nD.変化に対する不安が原因であれば、新たに必要とされるスキルを身につける機会を提供するなど、不安感を取り除く措置を講じるのである。", "answer": "A", "explanation": "B～Dはすべて正解。\n\nA.が誤り。\n\n変革の実行は通常、大きな困難を伴う。なぜなら、人の行動にも、「外」からの力を受けない限り同じ状態にとどまろうという「慣性の法則」が働くからだ。", "source": "グロービス マネジメントブック 改訂3版\n\n19.変革のマネジメントP.218-219"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 27, "question": "■問27.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\n・コンフリクト（対立、軋轢）とは、相反する意見、態度、（①）などが存在し、互いに譲らないことで緊張状態が生じることを言う。\n\n・コンフリクトのプラス面として、互いに競い合うことで意欲が高まる、相互の意見交換の過程で相手への理解が深まる、その過程において（②）を明確にして当初のアイデアを発展させたり、新たな視点や本質的な問題が発見できることなどが挙げられる。\n\n・ハーバード大学ビジネススクールのジェームズ・ウェアとルイス・バーンズは、個人間のコンフリクトに対処するには、まず状況をよく理解し、状況そのものを変えるか、当事者の態度や対応を変える必要があるとしている。その具体的な方法として、交渉、制御、（③）を挙げている。\n\nA. ①要求 ②自己の考え ③（建設的）対峙\n\nB. ①利益 ②組織の目標 ③（建設的）対峙\n\nC. ①要求 ②他者の意見 ③妥協\n\nD. ①感情 ②自己の考え ③競争", "answer": "A", "explanation": "・コンフリクト(対立、軋轢）とは、相反する意見、態度、（①要求）などが存在し、互いに譲らないことで緊張状態が生じることを言う。\n\n・コンフリクトのプラス面として、互いに競い合うことで意欲が高まる、相互の意見交換の過程で相手への理解が深まる、その過程において（②自己の考え）を明確にして当初のアイデアを発展させたり、新たな視点や本質的な問題が発見できることなどが挙げられる。\n\n・ハーバード大学ビジネススクールのジェームズ・ウェアとルイス・バーンズは、個人間のコンフリクトに対処するには、まず状況をよく理解し、状況そのものを変えるか、当事者の態度や対応を変える必要があるとしている。その具体的な方法として、交渉、制御、(③（建設的）対峙)を挙げている。", "source": "グロービス マネジメントブック 改訂3版\n\n11．コンクリフト P.202-203"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 28, "question": "■問28.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢AからDより選んでください。\n・高い成果を上げるチームをつくるには、「構成員の組み合わせ」と「凝集性」が重要だ。\n\n・多様な能力を持つ構成員で編成されているチームは、より大きな成果を生み出す可能性を持つ。なぜなら、（①）というスキル、（②）のスキル、（③）のスキル、という３つの重要なスキルがチームとして十分に発揮されるからだ。\n\nA. ①技術的な専門知識 ②共創 ③社内政治\n\nB. ①技術的な専門知識 ②問題解決や意思決定 ③対人関係上\n\nC. ①ビジョン構築 ②問題解決や意思決定 ③社内政治\n\nD. ①ビジョン構築 ②共創 ③対人関係上", "answer": "B", "explanation": "・多様な能力を持つ構成員で編成されているチームは、より大きな成果を生み出す可能性を持つ。なぜなら、技術的な専門知識というスキル、問題解決や意思決定のスキル、対人関係上のスキル、という３つの重要なスキルがチームとして十分に発揮されるからだ。", "source": "グロービス マネジメントブック 改訂3版\n\n9.チーム・マネジメント P.198-199"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 29, "question": "■問29.下記文章中の（①）から（④）に入る語句の組み合わせとして適切なものを選択肢AからDのうちから選んでください。\nエンパワーメントは組織構成員の（①）的な行動を促すために用いられる（②）の技法の1つである。エンパワーメントを（③）に活用するには、構成員の（①）性を促すと同時に、その（④）を制御することも必要だ。\n\nA.①自律 ②リーダーシップ ③有効 ④行動\n\nB.①積極 ②マネジメント ③最大限 ④プラスの感情\n\nC.①自律 ②マネジメント ③最大限 ④問題行動\n\nD.①積極 ②リーダーシップ ③有効 ④マイナスの感情", "answer": "A", "explanation": "エンパワーメントは組織構成員の自律的な行動を促すために用いられるリーダーシップの技法の1つである。エンパワーメントを有効に活用するには、構成員の自律性を促すと同時に、その行動を制御することも必要だ。", "source": "グロービス マネジメントブック 改訂3版\n\n5.エンパワーメントP.190-191"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": 30, "question": "■問30.下記A～Dの選択肢のうち、マネジメントのステップとして正しいものを選んでください。\nA. ①短期的な計画や予算を立案する ②組織構造の設計、人員の配置、詳細計画のコミュニケーションなどを行う ③予算や実績管理などを行い、問題解決を図る\n\nB. ①短期的なビジョンを提示する ②ビジョンを伝達することにより、メンバーを統合する ③予算や実績管理などを行い、問題解決を図る\n\nC. ①長期的な計画や予算を立案する ②組織構造の設計、人員の配置、詳細計画のコミュニケーションなどを行う ③メンバーの動機づけを行う\n\nD. ①長期的なビジョンを提示する ②ビジョンを伝達することにより、メンバーを統合する ③メンバーの動機づけを行う", "answer": "A", "explanation": "BとCはステップも内容も誤り。Dは「リーダーシップ」に対する記述となる 。グロービスマネジメントブックでは、リーダーシップとマネジメントを異なる機能としてとらえるハーバード・ビジネススクールのJ.コッター教授の理論に従う。コッターは、経営陣やマネジャーに求められる機能を「変革を推し進める機能」と「効率的に組織を運営する機能」の2つに分け、前者をリーダーシップ、後者をマネジメントと定義した。", "source": "グロービス マネジメントブック 改訂3版\n\n4．リーダーシップとマネジメント P.188-189"}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_OBH", "tag": "GMAP2026S_OBH", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 1, "question": "■問01.企業経営とアカウンティングについて説明した文章のうち、誤っているものを選択してください\nA.アカウンティングは企業の経済活動を映す鏡であり、ステークホルダーに対して説明責任を果たすことを目的にしている\n\nB.ステークホルダーとは、企業の活動によって直接的に影響を受ける人々や団体のことを指し、具体的には株主や経営者、従業員、債権者のみを指す。間接的に影響を受ける地域住民や行政官庁などは含まない。\n\nC.経営活動に関する情報収集という点では、株主よりも経営者のほうが優位に立ちやすい。このように受け取る情報に格差があることを、「情報の非対称性」という。\n\nD.企業のディスクロージャーとしては、会社法や金融商品取引法、企業会計原則、法人税法などで開示が義務付けられている制度的ディスクロージャーに加えて、株式市場に自社をアピールするためにコミュニケーション戦略の一部として行われるＩＲ活動がある。ＩＲ活動は、自発的ディスクロージャーに分類される。", "answer": "Bが誤り", "explanation": "ステークホルダーとは、企業の活動によって直接的・間接的に影響を受ける人々や団体のことを指します。具体的には株主や経営者、従業員、金融機関、債権者、取引先、競合企業、顧客、地域住民、環境保護団体、格付け機関、税務当局、行政官庁などです。", "source": "グロービス マネジメントブック 改訂3版\n\n1.企業経営とアカウンティング P.92-93"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 1, "question": "■問1.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A\\~Dのうちから選んでください。\n・税効果会計と退職給付会計はともに会計制度の国際化の潮流から導入された会計制度だ。\n\n・税効果会計の適用により、貸借対照表には「(①)資産」や「(①)負債」が、損益計算書には「法人税等調整額」が記載されることになった。\n\n・退職給付金会計とは、従業員が退職するときに企業が支払う退職金や企業年金を厳格に見積もり、これに対する企業の対応状況を開示する(②)制度だ。\n\n・「(③)給付型」を採用していることから生じる問題に対応するため、将来の企業年金の給付水準が上下するリスクを従業員が負う「(③)拠出型」の企業年金制度の検討する企業も増えている。\n\nA. ①繰延税金 ②福利厚生 ③ポイント\n\nB. ①繰延税金 ②会計 ③確定\n\nC. ①固定 ②繰延税金 ③ポイント\n\nD. ①流動 ②福利厚生 ③ポイント", "answer": "B", "explanation": "・税効果会計では法人税等を、退職給付会計では退職一時金と企業年金の積立不足分を費用としてとらえ、財務諸表に反映させる。\n・現在の会計制度では、将来の支払いに必要な退職一時金と年金給付を一体のものとして考え、現時点で必要な運用原資を退職給付債務に一本化して会計処理を行う。\n・いまの会計規則では、年金の積立不足額も退職一時金とともに「退職給付引当金」として計上するようになった。", "source": "グロービス マネジメントブック 改訂3版\n\n10.税効果会計と退職給付会計 P110-111"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 2, "question": "■問2.アカウンティングの目的や特徴について、正しいものを選択してください。\nA.管理会計はさまざまな法律や規則（会社法・金融商品取引法・税法など）によって厳格に規定されている。\n\nB.財務会計上の利益と税務会計上の課税対象所得は必ず一致する。\n\nC.企業活動のグローバル化やステークホルダーの多国籍化に伴い、日本でも会計基準の見直しが行われてきている。その一例として、連結を主、単体を従とした開示制度が挙げられる。\n\nD.経営者が自社の経営状況を把握したり、戦略を策定する際に、どの部門も納得するような合理的な計算を行うことは求められない。", "answer": "Cのみ", "explanation": "A不正解：管理会計ではなく財務会計の内容です。\n\nB不正解：必ず一致するというのは誤りです。「必ずしも一致しない」が正解です。\n\nC正解：正解です。他にも連結キャッシュフロー計算書の義務化、税効果会計や退職給付会計などの導入があります。\n\nD不正解：どの部門も納得するような合理的な計算を行うことが求められます。そこに管理会計の意義があります。", "source": "グロービス マネジメントブック 改訂3版\n\n2.アカウンティングの目的 P.94-95\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 3, "question": "■問３. 会計年度の経営成績を正しく示すためには、期間損益計算に基づく必要があります。その認識基準として、現金主義、発生主義、実現主義の3つの方法がありますが、以下のうち、収益と費用の認識として、正しいものを全て選んでください。\nA.費用収益対応原則とは、発生した費用のうち、その期の収益獲得に貢献した部分だけをその期の費用として測定・認識することである。\n\nB.現金主義では、現金の収入（入金）・支出（支払い）と同時に収益・費用を認識する。企業活動の実態においては、現金主義による期間損益計算では経営成績を正しく示すことができない場合が多い。\n\nC.実現主義は、経済的価値の増加が実現したときに収益を認識する。たとえば、顧客から注文を受けた段階で企業経済価値は増加したことになるが、実現主義ではこの段階で収益を計上し、発生主義の場合は、確実に商品を顧客宛に発送した段階で収益を計上する。\n\nD.家賃を後払いする場合は、まだ現金を支払っていなくても、使用期間相当分は今期の費用として計上されることは、現金主義に基づく。", "answer": "Ａ，Ｂ", "explanation": "Ａ.正しい\n\nＢ.正しい\n\nC.たとえの説明が発生主義と実現主義が逆。注文を受けた段階で収益計上するのが発生主義で、確実に商品を顧客宛に発送した段階で収益を計上するのが実現主義。\n\nD.現金主義ではなく発生主義に関する説明。", "source": "グロービス マネジメントブック 改訂3版\n\n3.収益および費用の認識 P.96-97"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 4, "question": "■問4. 財務諸表（財務三表）の定義や特徴について、誤っているものを選択してください。\nA.損益計算書（P/L）は、ある一定の期間における企業の経営成績を示したもので、企業の1年間の活動をまとめたビデオテープに例えられる。\n\nB.企業会計は「発生主義・実現主義」をとっているため、キャッシュフロー計算書における現金の増減は、帳簿上の利益（損失）の額と必ず一致する。\n\nC.貸借対照表（B/S）は、ある時点（決算期末時点）での企業の資産内容を明らかにしたもので、スナップ写真に例えられる。\n\nD.損益計算書（P/L）では、企業活動を内容別に分けて費用と収益を対応させており、営業活動の成果を表す営業利益や、財務活動の成果を表す経常利益などを把握できる。", "answer": "B", "explanation": "企業会計は一般に、発生主義・実現主義がとられているため、必ずしも利益（損失）と現金の増減が一致するとは限らない。帳簿上は利益が出ていても、資金繰りの問題で倒産に追い込まれるケース（いわゆる黒字倒産）もある。したがって、事業を継続させるには、利益（損失）だけでなく、実際の現金の動きを把握する必要がある。", "source": "グロービス マネジメントブック 改訂3版\n\n財務諸表の成り立ち P.98-99"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 5, "question": "■問05. 次に基づき、A社の「税引等調整前当期純利益」を計算してください（単位：億円）。\n・売上高：1,000\n\n・売上原価：600\n\n・販売費及び一般管理費：250\n\n・受取利息：10\n\n・受取配当金：20\n\n・支払利息：15\n\n・社債利息：5\n\n・特別利益：40\n\n・特別損失：10\n\nA：190\n\nB：160\n\nC：400\n\nD：150", "answer": "A", "explanation": "売上総利益400➡営業利益150➡経常利益(150+30-20)=160 ➡税引等調整前当期純利益 (160+40-10)=190", "source": "グロービス マネジメントブック 改訂3版\n\n5．損益計算書      P.100-101\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 6, "question": "■問6.流動資産と固定資産の説明について次のうち誤っているものを選択してください。\nA. 流動資産は短期間に現金化するものと短期間に費用となるものから構成される。\n\nB．流動資産は当座資産、たな卸資産、繰延資産、その他流動資産の４つに分類される。\n\nC．有形固定資産とは建物・機械装置などの償却資産と、土地・建設仮勘定などの非償却資産から成る。\n\nD．たな卸資産とは営業活動の仕入れ・生産段階で生じる完成品・半製品などのように販売されることで初めて現金化される資産を指す。", "answer": "B", "explanation": "流動資産とは当座資産、たな卸資産、その他流動資産の３つに分類される。当座資産とは売掛金や受取手形など営業活動の販売段階で生じる売掛金・受取手形など、営業活動の回収段階で生じる現金・預金に近い資産を指す。たな卸資産については問題の選択肢Dを参照。その他流動資産とは１年以内に費用として損益計算書に計上される（費用化される）前払費用などを指す。なお、繰延資産とは固定資産と同じく短期に費用化できない資産として特別に認められているもの。社債発行差金や研究開発費などを繰延資産として計上する場合があるが、実際には公開企業ではあまり見られない科目である。", "source": "グロービス マネジメントブック 改訂3版\n\n貸借対照表（資産）Ｐ102～103"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 7, "question": "■問07.貸借対照表における負債、純資産について、誤っているものを全て選択してください。\nA.貸借対照表の負債と純資産は、企業活動に必要な資金をどこから用立てたのかという資金調達の源泉を示す。負債は第三者からの借り入れ、つまり将来決められた期日に支払うべき債務である。純資産は株主からの借入金である。\n\nB.流動負債とは、企業の通常の営業サイクル中または短期間（1年以内）に支払わなくてはならない負債である。代表的な勘定科目として支払手形、買掛金、未払費用、未払金、前受収益、未払法人税、短期借入金などがある。\n\nC.固定負債とは、支払猶予期間が長期的な（1年を超える）負債である。企業の資金調達である長期借入金・社債に加えて、退職給付引当金、賞与引当金などの各種引当金から構成される。\n\nD.株主資本とは、株主が企業に拠出した資金のみを指し、資本金、資本剰余金、自己株式からなる、財務活動に対応する。", "answer": "A、Dが誤り", "explanation": "A：純資産は株主からの出資（返済義務なし）であり、返済義務のある借入金ではないので注意。\n\nD：株主資本とは、株主が企業に拠出した資本金のほか、過去の利益の蓄積分である利益剰余金を含む。利益剰余金は、営業活動に対応する。", "source": "グロービス マネジメントブック 改訂3版\n\n貸借対照表（負債+純資産） P.104-105"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 8, "question": "■問8.キャッシュフロー計算書の説明として正しいものを全て答えよ。\nA.キャッシュフロー計算書は、会計年度の期首に企業が持っていた現金と現金同等物（当座預金や普通預金など）の額が、期中の活動を経て期末にどの程度増減したかというプロセスを表す。\n\nB.キャッシュフロー計算書は、企業活動に即して営業活動・財務活動の2区分を設け、それぞれの現金の増減を表示する。\n\nC.営業活動によって生じるキャッシュフローを把握するには、直接法と間接法がある。直接法では、営業活動から生じる現金の入金と支出を直接算出する。間接法は、当期純利益の数字に減価償却費を加え、さらに損益計算書上の各項目の増減を加えて機械的に現金の増減を算出する。\n\nD.貸借対照表との関係で現金の動きを考えると、おおむね資産の増加は現金の増加を、負債・純資産の増加は現金の減少を意味する。", "answer": "A", "explanation": "A：正しい。記載の通り。\n\nB：誤り。キャッシュフロー計算書は、企業活動に即して営業活動、投資活動、財務活動の3区分を設け、それぞれの現金の増減を表示する。\n\nC：誤り。直接法では、営業活動から生じる現金の入金と支出を直接算出する。間接法は、当期純利益の数字に減価償却費を加え、さらに貸借対照表上の各項目の増減を加えて機械的に現金の増減を算出する。\n\nD：誤り。貸借対照表との関係で現金の動きを考えると、おおむね資産の増加は現金の減少を、負債・純資産の増加は現金の増加を意味する。", "source": "グロービス マネジメントブック 改訂3版\n\n8.キャッシュフロー計算書 P.106-107"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 9, "question": "■問09.連結会計について説明した文章のうち、誤っているものを選択してください。\nA.医薬品事業も営んでいる食品メーカーの場合、医薬品事業からの売上高が全体の売上高の10%を超えていれば、食品事業と併せて医薬品事業のセグメント情報も開示しなくてはならない\n\nB.親会社が子会社に商品を販売した場合（内部取引）、親会社の売上高と子会社の仕入れは「内部取引の相殺消去」として処理される\n\nC.親会社が子会社を買収した場合、買収金額と子会社の簿価が異なるのが普通であり、この差額を表す科目を「持分法」と言う\n\nD.2000年3月期より日本の会計制度は、企業会計のグローバル・スタンダードである連結会計に転換した", "answer": "Cのみが誤り", "explanation": "Cは「のれん」について説明している文章です。\n\n「持分法」とは、関連会社利益のうち親会社持株比率相当分だけを企業集団の利益として連結財務諸表に含める会計処理を指します。", "source": "グロービス マネジメントブック 改訂3版\n\n9.連結会計 P.108-109\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 11, "question": "■問11.日本では会計基準変更後、保有目的別に4つの基準が適用される。有価証券の計上方法について、下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。なお、同じ語句が入る場合があります。\n・売買目的有価証券：（①）\n\n・満期保有目的の債券：（②）\n\n・子会社・関連会社株式：（③）\n\n・その他有価証券：（④）\n\nA. ①時価法 ②時価法 ③償却原価法 ④原価法\n\nB. ①原価法 ②償却原価法 ③原価法 ④原価法\n\nC. ①原価法 ②時価法 ③償却原価法 ④時価法\n\nD. ①時価法 ②償却原価法 ③原価法 ④時価法", "answer": "Ｄ", "explanation": "・売買目的有価証券：時価法で計上\n\n→貸借対照表には市場価格で評価計上し、損益計算書には市場価格が取得価格より高ければ有価証券評価益として、低ければ有価証券評価損として計上しなければなりません\n\n・満期保有目的の債券：償却原価法で計上\n\n→償却原価法とは、例えば1年前に97円で購入した債権が、満期時に100円で償還されると仮定します。その価値が1年ごとに98年、99円、100円と1円ずつ増加する場合、今期の決算期末には98円として計上されます\n\n・子会社・関連会社株式：原価法で計上\n\n→記載の通りです\n\n・その他有価証券：時価法で計上\n\n→記載の通りです。貸借対照表上に市場価格を反映させなくてはなりませんが、損益計算書上に有価証券損益を計上しない点が、売買目的有価証券と異なります。", "source": "グロービス マネジメントブック 改訂3版\n\n11.有価証券（時価会計）P.112-113"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 12, "question": "■問12.A〜Dに示す各指標を算出してください。（計算式の答えは小数点第二位を四捨五入してください）\n2025年\n\n売上高 ：10,000\n\n売上高総利益 ：4,000\n\n当期純利益 ：1,000\n\n総資産 ：5,000\n\n流動負債 ：1,000\n\n固定負債 ：2,000\n\nA. ROE\n\nB. 売上高当期純利益率\n\nC. ROA\n\nD. 財務レバレッジ", "answer": "A. ROE：50.0%\n\nB. 売上高当期純利益率：10.0%\n\nC. ROA：20.0%\n\nD. 財務レバレッジ：2.5", "explanation": "ROE：当期純利益(1,000)÷自己資本(総資産5,000-流動負債1,000-固定負債2,000)x100\n\n売上高当期純利益率：当期純利益(1,000)÷売上高(10,000)×100\n\nROA：当期純利益(1,000)÷総資産(5,000)×100\n\n財務レバレッジ：総資産(5,000)÷自己資本(2,000)\n\n暗算しやすいようにしています。数値は覚えてしまいやすいですが、計算式は思い出せるようにしておきましょう。", "source": "グロービス マネジメントブック 改訂3版\n\n12.総合力分析：ROAとROE P.114-115"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 13, "question": "■問13. 売上高利益率とは、売上高に対してどのくらいの利益を獲得することができたかを示す指標ですが、どの利益を用いるかにより、いくつかの指標があります。以下のうち、指標とそこから分かる傾向について、誤っているものを選んでください。\nA.売上高総利益率は、利益率の高い製品を販売しているか否かを示している。この指標は業種によって差があるが、同一の業界内では一般に大きな相違はない。この指標を上げるためには取引先の見直しや商品構成の見直し、仕入／生産コストの削減などが有効だと考えられ、これに合わせた行動が必要になってくる。\n\nB.売上高営業利益率は、企業本来の営業活動による利益率であり、本業の利益率が高いかどうかを示している。この指標を同業他社と比較することにより、販売活動や管理活動の効率性がわかり、合理化の余地の有無なども把握することができる。\n\nC.売上高経常利益率は、経常的な通常の企業活動における利益率を表した指標である。この指標には、持分法による投資損益や、金融収支のよしあし、資金調達力の相違については反映されない。\n\nD.各売上高利益率は企業の営業プロセスにより規定されるため、事業形態や業種が異なる企業同士を比較してみても優劣をつけることはできない。しかしながら、似通った事業プロセスの企業や、同一企業を時系列で比較することにより、さまざまなことがわかる。", "answer": "Ｃが誤り", "explanation": "Ａ.正しい\n\nＢ.正しい\n\nC.売上高経常利益率には金融収支のよしあしや資金調達力の相違が反映される。連結の場合、経常利益は持分法による投資損益によっても影響される。\n\nD.正しい", "source": "グロービス マネジメントブック 改訂3版\n\n収益性分析 P.116-117"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 14, "question": "■問14.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A\\~Dのうちから選んでください。\n・企業の安全性とは財務体質の健全性を意味し、万一の場合に外部の債権者に対して約束どおりの支払いを行うことが可能であるかを示している。\n\n・短期（1年以内）に返済する必要のある負債に対し、同期間内に現金化される資産で賄えるかを測る指標が（①）であり、150%から200%程度が望ましいと言われている。\n\n・（②）とは、固定資産の調達がどれだけ純資産によって賄われているかを示す指標である。この比率は100%以下であるのが望ましいが、現実には製造業で120%程度となっている。\n\n・（③）は、事業利益が支払うべき金利の何倍あるか、という金利支払能力を示す指標であり、製造業平均で18倍と言われている。\n\nA. ①流動比率 ②固定比率 ③インタレスト・カバレッジ・レシオ\n\nB. ①当座比率 ②固定比率 ③自己資本比率\n\nC. ①流動比率 ②固定長期適合率 ③インタレスト・カバレッジ・レシオ\n\nD. ①当座比率 ②固定長期適合率 ③自己資本比率", "answer": "A", "explanation": "・①流動比率（流動資産／流動負債）: 短期的な支払能力を測る指標。短期間（1年以内）に返済する必要のある負債は、同じく短期間内に現金化される資産で賄われる必要がある。この「支払い」と「回収」の期間を対応させる考え方が流動比率の根底にあり、150％〜200％程度が望ましいとされるが、日本の製造業の平均は130〜140％である。\n\n・②固定比率（固定資産／純資産）: 固定資産の調達がどれだけ純資産で賄われているかを示す。固定資産は長期保有が前提のため、長期的に安定した調達手段によるべきであり、100％以下が理想であるが、現実には製造業で120%程度となっている。\n\n・③インタレスト・カバレッジ・レシオ（〈営業利益＋金融収益〉／支払利息）: 金利の支払能力を示す指標であり、事業利益が支払うべき金利の何倍あるかという、金利支払い能力を示す指標。この比率は高いに越したことはないが、企業の成長度合いで評価されるべき指標であり、製造業で18倍と言われている。", "source": "グロービス マネジメントブック 改訂3版\n\n14.安全性分析 P.118-119"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 15, "question": "■問15. 下記に、企業が投資家に評価してもらえるような経営を行うために、理解しておく必要がある指標について書いています。正しいものを全て選んでください。\nA. 日本企業は利益の多寡にかかわらず、安定配当政策をとる傾向がある。その場合、利益が減ると配当性向（配当金総額/税引後当期純利益）が高くなるケースも出てくる。\n\nB. Earnings per Share (EPS)とは、税引前当期純利益/発行済み株式数のことである。\n\nC. Price Earnings Ratio (PER)とは、株価と1株当たりの純資産の比率を表す指標だが、個別銘柄が同業他社と比べて際立って高いPERを示していたら、一般に買われすぎと判断され、売却の判断材料の一つとなる。\n\nD. Price to Book Ratio (PBR) とは、株価を1株当たりの利益で割った指標のことだが、PBR１倍を下回っている場合、株式市場が評価している株価は企業の清算価値を下回っていることになり、投資判断における危険信号と捉えられる。", "answer": "Aのみ", "explanation": "A. 正解\n\nB. Earnings per Share（1株あたり利益）＝税引後当期純利益/発行済み株式数\n\nC. PER（Price Earnings Ratio）は、株価収益率のことで、株価と１株当たりの利益の比率を示す指標です。後半の文章は正しくPERを表しています。\n\nD. PBR（Price to Book Ratio）は、株価純資産倍率のことで、株価と1株当たりの純資産の比率を表す指標です。後半の文章は正しくPBRを表しています。", "source": "グロービス マネジメントブック 改訂3版\n\n株式市場が企業を評価する指標P.120-121\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 16, "question": "■問16.たな卸資産の評価方法について正しい選択肢をすべて選びなさい。\nA. たな卸資産に加わった新しい順から販売（払い出し）していくと仮定した方法のことを先入先出法という。\n\nB．平均法には総仕入金額と総仕入数量からその期の平均単価（簿価）を算出し、その期中に販売されたすべての製品についてその価格（簿価）を原価とする移動平均法と仕入のたびに平均単価に算出しなおし、払出原価を計算する総平均法がある。\n\nC．原価法とはたな卸資産を取得原価で評価する方法である。ただし、時価が取得原価（簿価）より著しく下落したときには、いかなる場合においても強制的に時価を評価額としなければならない。\n\nD．低価法とは時価と原価を比較していずれか低いほうの価格で評価する方法であり、価値を堅く見積もる保守主義に基づいている。", "answer": "D", "explanation": "A．たな卸資産に加わった×新しい順（→〇古い順）から販売（払い出し）していくと仮定した方法のことを先入先出法という。\n\nB．平均法には総仕入金額と総仕入数量からその期の平均単価（簿価）を算出し、その期中に販売されたすべての製品についてその価格（簿価）を原価とする×移動平均法（→〇総平均法）と仕入のたびに平均単価を算出しなおし、払出原価を計算する×総平均法（→〇移動平均法）がある。\n\nC．原価法とはたな卸資産を取得原価で評価する方法である。ただし、時価が取得原価（簿価）より著しく下落したときには、×いかなる場合においても（→〇回復する見込みがある場合は原価法で問題ない）強制的に時価を評価額としなければならない。", "source": "グロービス マネジメントブック 改訂3版\n\nたな卸資産 Ｐ122～123"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 17, "question": "■問17.減価償却と固定資産について、誤っているものを全て選択してください。\nA.減価償却とは、時が経つにつれ使用価値が減少していく機械や土地等の有形固定資産に対し、使用期間にわたって費用処理を行うことである。\n\nB.減価償却は費用として認識され、キャッシュの流出を伴う。\n\nC.定額法とは、減価償却費を各期間にわたって均等に計上する方法であり、定額法における減価償却費は、（取得原価－残存価値）×（1÷耐用年数）で求められる。\n\nD.特許権、商標権などの無形固定資産も償却をしなければならない。ただし、一般には定率法により、残存価値ゼロで償却される。", "answer": "A、B、Dが誤り", "explanation": "A：誤り：有形固定資産であってもその使用価値が減少しないと考えられる土地は、償却の対象にはならない。\n\nB：誤り：減価償却費は費用として認識されるが、実際にはキャッシュの流出を伴わない\n\nD：誤り：特許権や商標権などの無形固定資産は償却の対象となるが、一般には「定額法」により償却される。", "source": "グロービス マネジメントブック 改訂3版\n\n減価償却と固定資産 P.124-125"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 18, "question": "■問18.以下データを参照してA〜Dの数値を算出してください。（B、Dは計算値の小数点以下第2位を四捨五入して少数点以下第1位まで解答してください）\n売上高：2000百万円\n\n変動費：1200百万円\n\n固定費：  700百万円\n\nA.限界利益（単位：百万円）\n\nB.限界利益率（単位：％）\n\nC.損益分岐点売上高（単位：百万円）\n\nD.損益分岐点の比率（単位：％）", "answer": "A：限界利益 800百万円\n\nB：限界利益率 40.0%\n\nC：損益分岐点売上高 1750百万円\n\nD：損益分岐点の比率 87.5%", "explanation": "A：限界利益＝売上高ー変動費＝2000百万円ー1200百万円＝800百万円\n\nB：限界利益率＝限界利益÷売上高＝800百万円÷2000百万円＝40.0%\n\nC：損益分岐点売上高＝固定費÷限界利益率＝700百万円÷40%=1750百万円\n\nD：損益分岐点の比率＝損益分岐点売上高÷現在の売上高=1750百万円÷2000百万円=87.5%", "source": "グロービス マネジメントブック 改訂3版\n\n18.損益分岐点分析 P.126-127"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 19, "question": "■問19.X社は単一製品を製造している。202X年の予算は次の通りである時、次のA～Cの問いに答えよ。（X社は全部原価計算を採用しているものとする。また、計算式の答えは小数点第二位を四捨五入してください）\n202X年\n\n予定生産量 ：10,000個\n\n変動費合計 ：3,000,000円\n\n固定費合計 ：2,000,000円\n\nA. 予定生産量が予定通り10,000個であった場合の1個あたりの製造原価を求めよ\n\nB. 予定生産量が20,000個に増えた場合の1個あたりの固定費を求めよ\n\nC. 予定生産量が20,000個に増えた場合の1個あたりの製造原価を求めよ", "answer": "A. 500円/個\n\nB. 100円/個\n\nC. 400円/個", "explanation": "A：1個あたりの変動費は、変動費合計(3,000,000)÷予定生産量(10,0000)＝300円/個。1個あたりの固定費は、固定費合計(2,000,000)÷予定生産量(10,000)＝200円/個。よって、1個あたりの製造原価は、300円/個＋200円/個＝500円/個となる。\n\nB：予定生産量が20,000個の時の固定費は、固定費合計(2,000,000)÷予定生産量(20,000)＝100円/個となる。\n\nC：予定生産量が20,000個の時の1個あたりの製造原価は、1個あたりの変動費が変わらないため、300円/個+100円/個＝400円/個となる。\n\nこのように「全部原価計算」では、生産量の増加に伴って製品単位当たりの原価が下がる傾向がある。", "source": "グロービス マネジメントブック 改訂3版\n\n19．原価計算P.128-129\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 20, "question": "■問20.一般、マネジメント・コントロールのプロセスは以下の4段階からなる。上流から順に並べなさい。\nA.経営資源配分計画策定（プログラミング）\n\nB.予算編成（バジェッティング）\n\nC.部門別実行計画策定\n\nD. 実績分析・業績評価・報告（レポーティング）", "answer": "C→A→B→D", "explanation": "部門別実行計画策定：全社の戦略計画を各部門の実行計画に翻訳し、方向付けするプロセスである。\n\n経営資源配分計画策定：具体的にどのプロジェクト、セクションにどれだけの資源を配分するか決定する。\n\n予算編成：各種の課題別実行計画を、各管理責任単位の管理者が責任を負えるような形の収益や費用に置き換えるプロセスである。\n\n実績分析・業績評価・報告：業績をプロジェクト別、管理責任単位別に記録集計し、予算との差異を分析することにより、業績評価や行動修正のための資料として活用する。", "source": "グロービス マネジメントブック 改訂3版\n\n20．マネジメント・コントロール P.130-131"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 21, "question": "■問21.内部統制について説明した文章のうち、正しいものを選択してください\nA.内部統制とは企業の財務報告の信頼性を確保し、かつ事業経営に関わる法規の遵守を促すことを目的として企業内部に設けられ運用される仕組みであり、事業経営の有効性や効率性を高めることは目的ではない\n\nB.内部統制は6つの構成要素に大別されアメリカ・日本ともに同じ要素で構成されている\n\nC.日本における内部統制の構成要素には、「ＩＴによる効率化」は手段の話なので含まれていない。\n\nD.それぞれの企業においてどのような内部統制の仕組みを構築し、運用するかは各国の法制や社会慣行、あるいは個々の企業が置かれた環境や事業特性などを踏まえ、工夫していくべきものだ。", "answer": "Ｄ", "explanation": "・A：内部統制とは、企業の財務報告の信頼性を確保し、事業経営の有効性と効率性を高め、かつ事業経営に関わる法規の順守を促すことを目的として企業内部に設けられ、運用される仕組みのことです。\n\n・Ｂ・Ｃ：６つの構成要素は、①統制環境、②リスク評価の機能、③統制活動、④情報・伝達の機能、⑤監視活動、⑥①～⑤の諸要素がＩＴによって効率的に実施されること。アメリカのＳＯＸ法では①～⑤を定めており、このうち⑥は日本独自に追加されたものです。", "source": "グロービス マネジメントブック 改訂3版\n\n21.内部統制P.132-133"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 22, "question": "■問22.A〜Dに示す各指標を算出してください。（計算式の答えは小数点第二位を四捨五入してください）\n2025年\n\n売上高：10,000\n\n本社建物の減価償却費：500\n\n製造ラインの材料、労務、経費：6,000\n\n広告宣伝費：1,500\n\n持ち合い株売却益：300\n\n支払利息：200\n\nA. 売上高総利益率\n\nB. 売上高営業利益率\n\nC. 売上高経常利益率\n\nD. 売上高税引前当期純利益率", "answer": "A:40％\n\nB:20％\n\nC:18％\n\nD:21％", "explanation": "（A）売上高総利益率\n\n売上総利益＝売上高（10,000）ー製造原価※製造ラインの材料、労務、経費（6,000）＝4,000\n\n売上高総利益率：売上総利益（4,000）÷売上高（10,000）＝40％\n\n（B）売上高営業利益率\n\n営業利益＝総利益（4,000）ー販管費（本社建物の減価償却費：500+広告宣伝費：1,500）＝2,000\n\n売上高営業利益率＝営業利益（2,000）÷売上高（10,000）＝20％\n\n（C）売上高経常利益率\n\n経常利益＝営業利益（2,000）ー営業外費用（支払利息：200）＝1,800\n\n売上高経常利益率＝経常利益（1,800）÷売上高（10,000）＝18％\n\n（D）売上高税引前当期純利益率\n\n税引前当期純利益＝経常利益（1,800）+特別利益（持ち合い株売却益：300）＝2,100\n\n売上高税引前当期純利益率＝税引前当期純利益（2,100）÷売上高（10,000）＝21％\n\n暗算しやすいようにしています。数値は覚えてしまいやすいですが、利益の構造と計算の流れは思い出せるようにしておきましょう。", "source": "グロービス マネジメントブック 改訂3版\n\n5.損益計算書 P.100-101"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 23, "question": "■問23. 貸借対照表は大きく資産の部と負債・純資産の部に分けられる。そのうち資産は企業が保有する資金の具体的形態を示すもので、通常、流動資産、固定資産、繰延資産に分類される。下記のそれぞれの説明から誤っているものを選んでください。\nA.流動資産の「流動」とは主に短期間（１年以内）に現金化できることを意味し、流動資産とは「短期間に現金化するもの」の意味合いを持つ。一方、「短期間に費用になるもの」については「流動負債」に分類される。\n\nB.流動資産のうち、「当座資産」は営業活動の仕入れ・生産段階で生じる完成品・半製品などのように販売されることで初めて現金化される資産を指す。\n\nC.固定資産の「固定」とは、主に１年以内に費用化または現金化しないことを意味する。固定資産のほとんどが「長期にわたり費用になるもの」である。固定資産は有形固定資産および無形固定資産の２つに分類される。一方、企業本来の事業活動とは関係のない投資や、支配することを目的として長期的に保有する資産については「繰延資産」に分類される。\n\nD.繰延資産とは固定資産と同じく短期に費用化できない資産として特別に認められているものだ。その効果が一定期間継続すると考えらえるものについて、支出時に一度に費用化するのではなく、一時的に資産として計上する。そしてその効果が及ぶ期間にわたって徐々に費用化していく。公開企業の財務諸表の中ではあまり見られない科目である。", "answer": "A,B,Ｃが誤り", "explanation": "Ａ.「流動資産」は「短期間に現金化するもの」と「短期間に費用となるもの」から構成される。\n\nＢ.流動資産のうち「当座資産」は、営業活動の販売段階で生じる売掛金・受取手形など、営業活動の回収段階で生じる現金・預金のように現金および現金に近い形の資産を指す。設問は「たな卸資産」に関する説明なので誤り。\n\nC. 固定資産は有形固定資産、無形固定資産、投資その他資産の３つに分類される。企業本来の事業活動とは関係のない投資や、支配することを目的として長期的に保有する資産については「投資その他資産」に分類される。\n\nD.正しい", "source": "グロービス マネジメントブック 改訂3版\n\n貸借対照表（資産） P.102-103"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 24, "question": "■問24.貸借対照表の「負債」および「純資産」に関する記述として、正しいものをすべて選択してください。\nA. 貸借対照表の「負債」と「純資産」の合計は、企業活動に必要な資金をどこから用立てたかという「資金調達の源泉」を示している。\n\nB. 純資産は、株主が企業に拠出した資金(資本金、資本剰余金、自己株式)や、過去の利益(利益剰余金)の蓄積で構成される。\n\nC. 流動負債とは、支払猶予期間が1年を超える長期的な負債のことであり、代表的なものに長期借入金がある。\n\nD. 株主資本のうち、資本金や資本剰余金は「財務活動」に対応し、過去の利益の蓄積分である利益剰余金は「営業活動」に対応する。", "answer": "A,B,D", "explanation": "1年以内に支払わなくてはならない負債を「流動負債」、支払猶予期間が1年を超える長期的な負債を「固定負債」と呼ぶ。長期借入金は固定負債に該当するため、Cの「流動負債」という記述は誤りである。", "source": "グロービス マネジメントブック 改訂3版\n\n貸借対照表（負債＋純資産） P.104-105"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 25, "question": "■問25. 貸借対照表との関係で現金の動きを考えると、おおむね資産の増加は現金の（➀）を、負債・純資産の増加は現金の（➁）を意味する。現金を必要以上に多く持っていることは企業活動に活用すべき資金を遊ばせているわけで、この場合、将来の収益に貢献するような投資や借入金の返済、配当の（③）などを検討すべきである。\n上記➀～③を埋める言葉として正しい組み合わせを選んでください。\n\nA. ➀増加 ➁減少 ③増額\n\nB. ➀減少 ➁増加 ③減額\n\nC. ➀減少 ➁増加 ③増額\n\nD. ➀増加 ➁減少 ③減額", "answer": "C", "explanation": "貸借対照表との関係で現金の動きを考えると、おおむね資産の増加は現金の（減少）を、負債・純資産の増加は現金の（増加）を意味する。現金を必要以上に多く持っていることは企業活動に活用すべき資金を遊ばせているわけで、この場合、将来の収益に貢献するような投資や借入金の返済、配当の（増額）などを検討すべきである。", "source": "グロービス マネジメントブック 改訂3版\n\nキャッシュフロー計算書 P.106-107\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 26, "question": "■問26.この会社のROEを求め、正しい選択肢を選びなさい。（ROEは少数第一位を四捨五入して計算してください）\n売上高：10,000\n\n売上原価：7,000\n\n広告宣伝費：2,000\n\n支払利息：300\n\n総資産：3,000\n\n自己資本比率：40％\n\nA．58.3％\n\nB．87.5％\n\nC．83.3％\n\nD．50.0％", "answer": "A", "explanation": "①まずは売上総利益をもとめましょう。\n\n売上（10,000）―売上原価（7,000）＝3,000\n\n※売上原価は小売業では販売された仕入原価であり、製造業では仕入れた原材料や部品などの代金だけでなく、製造ラインの人件費、機械の減価償却費、電気代などの製造経費も含まれます。\n\n②売上総利益を算出したら、営業利益をもとめましょう。\n\n売上総利益（3,000）－販売費及び一般管理費（ここでは広告宣伝費）（2,000）＝1,000\n\n③営業利益を算出したら、支払利息を差し引いて当期純利益をもとめましょう。\n\n営業利益（1,000）－支払利息（300）＝700\n\n※本来は経常利益を算出した後、特別利益、特別損失を差し引き、税金等調整前当期純利益を算出、法人税、住民税などの税金を差し引いて当期純利益を算出しますが、今回はないので経常利益＝当期純利益となります。\n\n④自己資本をもとめましょう。\n\n総資産（3,000）×自己資本比率（40％）＝1,200\n\n※自己資本比率を求める公式は・・・自己資本比率＝自己資本÷（負債＋総資産）\n\n⑤ROE（自己資本利益率）をもとめましょう。\n\n当期純利益（700）÷自己資本（1,200）＝58.3％", "source": "グロービス マネジメントブック 改訂3版\n\n総合力分析：ROAとROE Ｐ114～115"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 27, "question": "■問27.たな卸資産について、誤っているものを全て選択してください。\nA.たな卸資産は、先入先出法、後入先出法、平均法などがあり、どの方法を用いるかによって売上原価や期末残高が変わる。\n\nB.先入先出法（FIFO）は、たな卸資産に加わった古い順から販売（払い出し）していくと仮定した方法で、結果的に在庫として残るのは新しく取得・製造した製品となる。物価が上昇し製造コストも販売単価も上昇している時期には、FIFOでは、利益が小さく計上されることが多い。\n\nC.後入先出法（LIFO）は、FIFOとは逆に最新の仕入在庫から順に販売していくと仮定した方法で、売上総利益は常に最新の状況を示すこととなり、会計上の利益は大きくなることが多い。\n\nD.平均法は、個別の仕入（製造）原価に注目せず、1期間の期首在庫を含めた総仕入金額と総仕入数量からその期の平均単価（簿価）を算出し、その期中に販売されたすべての製品についてその価格（簿価）を原価とする総平均法と、仕入れのたびに平均単価を算出し直し、払出原価を計算する移動平均法がある。", "answer": "B、Cが誤り", "explanation": "B：物価が上昇し製造コストも販売単価も上昇している時期には、FIFOでは「現在の販売価格（高い）-昔の原価（安い）=営業利益（大きい）」となるため、結果として利益が大きく計上されることが多い。\n\nC：FIFOとは逆に最新の仕入在庫から順に販売していくと仮定した方法で、売上総利益（販売価格ー原価）は常に最新の状況を示すこととなり、会計上の利益は小さくなることが多い。", "source": "グロービス マネジメントブック 改訂3版\n\nたな卸資産  P.122-123"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 28, "question": "■問28.減価償却と固定資産の説明として正しいものを全て答えよ。\nA.減価償却とは、時が経つにつれ使用価値（収益力）が減少していく機械や建物、土地等の有形固定資産に対し、使用期間（耐用年数）にわたって費用処理を行うことである。その価値の減少分が減価償却費であり、徐々に取得原価から差し引いていく。最終的には所定の残存価値が残るように償却していく。\n\nB.定額法とは、固定資産の耐用期間中、毎期均等額の減価償却費を計上する方法である。その長所は、計算が容易であり、毎期の減価償却費が均等額で毎年の費用の見積もりが容易であることである。短所は、設備など後年度ほど収益力が衰えるものは修繕費も増加するため、後年度の費用負担が過大となることである。\n\nC.定率法は、固定資産の耐用期間中、毎期首償却残高に一定率を乗じた減価償却費を計上する方法である。長所は機械等の能率が高いとき、すなわち収益の多いときに償却費が多く計上されるため、後年度になって修繕費が多くなるときに償却費が低減し、費用配分が合理的になることである。短所は、設備投資が多いときに当初の償却費負担が過大となり、費用の配分が毎期均等化しないことである。\n\nD.無形固定資産は償却しなくてよい。", "answer": "B、C", "explanation": "A：誤り。減価償却とは、時が経つにつれ使用価値が減少していく機械や建物等の有形固定資産に対し、使用期間（耐用年数）にわたって費用処理を行うことである。ただし、有形固定資産であってもその使用価値が減少しないと考えられる土地等は、償却の対象とはならない。\n\nB：正しい。記載の通り。\n\nC：正しい。記載の通り。\n\nD：誤り。無形固定資産も償却しなければならない。特許権、商標権などの法律上の権利である資産は、有形固定資産の減価償却と同様の償却を行う。ただし、一般には定額法により、残存価額ゼロで償却される。耐用年数も法定有効期間内が望ましいとされている。", "source": "グロービス マネジメントブック 改訂3版\n\n17.減価償却と固定資産 P.124-125"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 29, "question": "■問29.製品Xの販売単価は1個あたり2,000円、変動費は1個あたり1,200円です。固定費が400万円である時、次のA～Cの問いに答えよ。（計算式の答えは小数点第二位を四捨五入してください）\nA. 製品Xの1個あたりの限界利益を求めよ\n\nB. 製品Xの限界利益率を求めよ\n\nC. 製品Xの損益分岐点売上高を求めよ", "answer": "A. 800円/個\n\nB. 0.4(40%)\n\nC. 1000万円", "explanation": "A：製品Xの1個あたりの限界利益は、1個あたりの売価(2,000円)－1個あたりの変動費(1,200円)＝800円/個。\n\nB：限界利益率は、1個あたりの限界利益(800円)÷1個あたりの売価(2,000円)＝0.4となる。\n\nC：損益分岐点売上高は、固定費(400万円)÷限界利益率(0.4)＝1000万円となる。", "source": "グロービス マネジメントブック 改訂3版\n\n損益分岐点分析P.126-127\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_MAC"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": 30, "question": "■問30.問題：ある会社の年間間接費は次の通りです。\n調査活動費 ：1,000,000円\n\n研究活動費 ：2,000,000円\n\n生産活動費 ：3,000,000円\n\n合計：6,000,000円\n\n製品Aの売上高構成比は40%。また、会社全体に占める製品Aの活動消費割合はそれぞれ、調査30％、研究50％、生産10％、である。\n\n次の組合せのうち、\n\n（①）従来配賦（売上高基準）による製品Aの配賦額\n\n（②）ABC（活動基準原価計算）による製品Aの配賦額\n\nをそれぞれ算出してください", "answer": "① 2,400,000円 ② 1,600,000円", "explanation": "従来配賦：6,000,000×40%＝2,400,000円\n\nABC配賦：\n\n1,000,000×0.30＝300,000\n\n2,000,000×0.50＝1,000,000\n\n3,000,000×0.10＝300,000\n\n合計＝1,600,000円", "source": "グロービス マネジメントブック 改訂3版\n\n19．原価計算： P.128-129"}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_MAC", "tag": "GMAP2026S_MAC", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 1, "question": "■問1.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n企業経営における財務の役割は経営目標の実現のために、どのような投資対象にいくら投資するか、どのような手段で必要な資金を調達するかを判断し実行することである。\n\n企業は資金を得るために（①）を投資家向けに発行したり、銀行から借り入れを行う。この資金が主に企業の事業活動に要する資産の購入などの事業投資活動に充てられる。\n\nその後、事業活動が成功すれば事業投資が（②）を生み出す。\n\nこの（②）は企業内で保留されて再び事業投資に振り向けられるかこの企業に資金を提供した（③）に還元される。\n\nA. ①有価証券 ②売上 ③従業員\n\nB. ①有価証券 ②収益（キャッシュフロー）③投資家や銀行\n\nC. ①インベストメント ②収益（キャッシュフロー） ③従業員\n\nD. ①クーポン券 ②キャピタルゲイン ③社会\n\n（正解は下にあります）", "answer": "Ｂ", "explanation": "・企業は株式や債券などの有価証券を発行し市場を通じて投資家から資金を集めます。\n\n・事業活動が生み出した収益（キャッシュフロー）は、事業へ再投資を行うか、資金の\n\n提供者である株主や債権者（銀行など）への還元を行うか決める必要があります。\n\n企業の資金の調達と還元を管理しながら、企業価値の最大化を図ることが、\n\n企業財務の役割と言えます。", "source": "グロービス マネジメントブック 改訂3版\n\n1．企業経営と企業財務 P.136-137\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_FIN"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 2, "question": "■問2.下記文章中の（①）～（ ⑤）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\nファイナンス理論は大きく、（①）と（②）の2つに分けられる。前者は企業に余剰資金を提供して運用したいと思っている投資家の理論、後者は事業に必要な資金を金融市場から調達したいと思っている企業側の理論ということができる。\n\n（①）では、投資家が投資した際のリスクと利回り（リターン）の関係や、投資対象資産の価値・価格が主要なテーマとなる。\n\n（②）の中心的なテーマは、企業が資金調達を行う際、どのような手段で調達すれば（③）を最大化できるかということだ。企業の資金調達方法としては大きく（④）（社債や銀行借入れ）による調達と、（⑤）による調達という2つの手段がある。\n\nA. ①投資理論 ②企業金融理論 ③収益 ④負債 ⑤株主資本\n\nB. ①企業金融理論 ②投資理論 ③企業価値 ④株主資本 ⑤負債\n\nC. ①投資理論 ②企業金融理論 ③企業価値 ④負債 ⑤株主資本\n\nD. ①企業金融理論 ②投資理論 ③収益 ④株主資本 ⑤負債", "answer": "C", "explanation": "ファイナンス理論は大きく、投資理論（インベストメント）と企業金融理論（コーポレート・ファイナンス）の２分野で構成されています。\n\n投資理論では、投資家が投資した際のリスクと利回り（リターン）の関係や、投資対象資産の価値・価格が主要なテーマとなります。\n\n企業金融理論では、いろいろな資金調達手法を組み合わせて、企業の価値を最大にすることが中心的なテーマとなり、企業経営者は、企業価値を最大化するという経営目標の達成を目指します。企業の価値について考えるときの前提となるのが、「企業価値は、将来その企業が生み出すと予想されるキャッシュフローを現時点の価値に換算したものに等しい」という考え方です。\n\n計算上の企業価値が最大になる最適資本構成（負債と株主資本の割合）を検討します。その結果を踏まえて、企業経営者は戦略的な意思決定を行なわなくてはなりません。", "source": "グロービス マネジメントブック 改訂3版\n\n2.  ファイナンス理論の体系 P.138-139"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 3, "question": "■問3.下記文章中の（①）〜（④）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n・将来に受け取る（①）の（②）価値は、（③）を用いて計算することができる。\n\n不確実性が高いほど（③）は高くなり、現在価値は（④）なる。\n\nA.①株式、②未来、③割引率、④小さく\n\nB.①株式、②現在、③利益率、④大きく\n\nC:①現金、②未来、③割引率、④大きく\n\nD.①現金、②現在、③割引率、④小さく", "answer": "D", "explanation": "・ファイナンスでは「今日の１円は明日の１円よりも価値がある」という考え方をする。将来のある金額と同等の価値がある今日の金額のことを（将来のある金額の）現在価値という。\n\n・今日の１円に比べて明日の１円が不確実となる理由は、期待していた額面の金銭が手に入らない場合や、インフレーションやデフレーションにより金銭の購買力が変化する場合があるからである。\n\n・将来ｎ年後に受け取る現金Cの現在価値（PV）は、割引率（r）を用いて計算することができる。\n\nPV= C/(1+ｒ)^n\n\n・割引率は将来受け取るキャッシュフローのリスクに応じて決められる。不確実性（リスク）が高いほど、割引率は高くなり、現在価値は小さくなる。", "source": "グロービス マネジメントブック 改訂3版\n\n3.金銭の時間的価値：現在価値 P.140-141"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 4, "question": "■問4.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n・毎年の受取額がある一定の割合で永久に増えていくキャッシュフローを ( ① ) と呼び、成長が著しい新興企業の ( ② ) の計算などに用いられる。\n\n・1年目の受取額をCF1、キャッシュフローの成長率をg、割引率をrとすると、( ① ) の現在価値は以下のようになる。\n\n・PV= ( ③ )\n\nA. ①永久年金 ②現在価値 ③CF1/(r-g)\n\nB. ①割増永久年金 ②企業価値 ③CF1/(r-g)\n\nC. ①割増永久年金 ②企業価値 ③CF1/(r+g)\n\nD. ①永久年金 ②企業価値 ③CF1/(r+g)", "answer": "B", "explanation": "・ファイナンスでは資産の価値を「その資産が生み出すキャッシュフローの現在価値」としてとらえ、算出の際に用いる手法がDCF法 (割引キャッシュフロー法) です。\n\n・DCF法では価値を「将来のキャッシュフロー」と定義し、それ以外に価値は認められていません。\n\n・キャッシュフローには様々なパターンがあり、割増永久年金は3つある典型的なパターンの1つです。\n\n・永久年金を生み出す資産価値として土地や耐用年数の十分長い不動産が挙げられますが、成長が著しい新興企業の企業価値の計算には割増永久年金が用いられます。", "source": "グロービス マネジメントブック 改訂3版\n\n4．DCF法 P.142-143"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 5, "question": "■問5.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n代表的な投資の意思決定方法は（①）（②）（③）がある。\n（①）は、同程度のリスクを持つ投資案件の利回りと当該投資期間の利回りを比較することで評価する。（②）は、初期投資額は特定の期間内に回収するべきという考え方で評価する。（③）は、投資により生み出されるキャッシュフローの現在価値と初期投資額を比較することで評価する。（②）は直感的に理解しやすいが金銭の時間的価値の概念は考慮されていないため、望ましい評価手法とはいえない。（①）と（③）はキャッシュフローや金銭の時間的価値の考え方が反映され、基本的には同じ結果になる。\n\nA. ①NPV法 ②IRR法 ③ペイバック法\n\nB. ①ペイバック法 ②NPV法 ③IRR法\n\nC. ①IRR法 ②ペイバック法 ③NPV法\n\nD. ①NPV法 ②ペイバック法 ③IRR法", "answer": "C", "explanation": "● IRR法の評価ステップ：\n１．ハードルレートを設定\n２．投資で生み出されるキャッシュフローを予測\n３．IRRを計算\n４．IRRがハードルレートより大きければ投資、小さければ投資しない\n\n●NPV法の評価ステップ\n１．投資で生み出されるCFを予測\n２．キャッシュフローの現在価値を計算\n３．NPVを計算\n４．NPV＞0なら投資、NPV＜0なら投資しない\n\n●ペイバック法の評価例\n1000億円投資すると毎年100億円生み出す場合の回収期間は10年", "source": "グロービス マネジメントブック 改訂3版\n\n投資評価のさまざまな方法 P144-145"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 6, "question": "■問6.ある事業で1年後と2年後に200万円ずつ受け取るとします。割引率が3％の場合、２年間で受け取る金額の現在価値はいくらでしょう。（小数点以下は四捨五入）\nA. 328万円\n\nB. 383万円\n\nC. 418万円\n\nD. 431万円", "answer": "B . 383万円", "explanation": "現在価値を求める公式は、\n\nPV＝C1/(1+r)＋C2/(1+r)^2+C3/(1+r)^3+・・・+Cn/(1+r)^n=Σ[n,i=1]Ci/(1+r)^i\n\nPV=現在価値\n\nCn＝n年後に受け取るキャッシュ\n\nr=割引率\n\nn＝期間\n\n今回は、「毎年200万を2年間で受け取る、割引率は3%」なので、\n\nPV＝200/(1+0.03)+200/(1+0.03)^2= 383万円 となります。", "source": "グロービス マネジメントブック 改訂3版\n\nDCF法 p.142-143"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 7, "question": "■問7.下記文章中の（①）から（⑤）に入る語句の組み合わせとして適切なものを選択肢AからDの中から選んでください。\n・ファイナンスにおいて、将来の利回りの不確実性を（①）と呼び、統計学における（②）を用いて数値化する。（②）は、統計で分布のばらつきを表す指標として用いられる概念。利回りにばらつきがある資産のことを（①）資産と言う。\n\n・保有資産すべてを１つの資産に集中させず、多数の資産を組み合わせて保有し分散投資することを（③）を組むと言う。（③）全体の期待利回りは、個別資産の期待利回りを保有比率で（④）した値となる。\n\n・たとえば、２つの資産から構成されている（③）で、２つの資産の（⑤）が小さくなるほど、（③）のリスク低減効果は大きくなる。\n\n＜選択肢＞\n\nA. ①リスク ②標準偏差 ③ポートフォリオ ④加重平均 ⑤相関係数\n\nB. ①リスク ②相関係数 ③ポートフォリオ ④単純平均 ⑤標準偏差\n\nC. ①リターン ②標準偏差 ③インベストメント ④加重平均 ⑤分散\n\nD. ①リターン ②期待値 ③ポートフォリオ ④加重平均 ⑤相関係数", "answer": "A", "explanation": "・投資のリスクとは、不確実性のこと。ファイナンスでは予測される利回りの分布の標準偏差（または標準偏差の２乗である分散）を投資リスクと定義する。\n\n・ポートフォリオ全体の「期待利回り」は、個別資産の期待利回りをそれぞれの資産が投資全体に占める割合で重み付けした「加重平均」により求められます。\n\n・一方で、ポートフォリオ全体の「リスク」は、標準偏差を単純に構成比で加重平均したものにはなりません。ここに相関係数が関わってきます。相関係数とは、たとえば、２つの資産から構成されているポートフォリオで、2つの資産の利回りが互いにどのくらい関係して変動するかを測る尺度で、「＋1から－1」の値をとります。相関係数が「＋1」の場合、２つの資産の利回りは完全なる「正の相関関係」を持つと言い（同じ方向に動く）、「－1」の場合は、完全なる「負の相関関係」を持つと言います（逆方向に動く）。「0」の場合は、「無関係」となります。\n\n・リスク低減の条件として、相関係数が ＋1（完全に同じ動き）でない限り、資産を組み合わせることで、単独で持つよりもリスクを抑えることができます。つまり、相関係数が小さくなるほど、逆の動きをする資産同士がリスクを打ち消し合うため、ポートフォリオのリスク低減効果は大きくなります。", "source": "グロービス マネジメントブック 改訂3版\n\n6.分散投資の効果(1)：ポートフォリオ理論 P.146-147\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_FIN"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 8, "question": "■問8.下記文章中の（①）～（④）に入る語句の組み合わせとして適切なものを選択肢A\\~Dのうちから選んでください。\n・ポートフォリオを構成するリスク資産には、資産の数を増やすことで低減されるリスク（①）と資産の数を増やしても除去できないリスク（②）がある。前者は、個別資産に固有の原因により、後者は、景気など、すべての資産に影響を与える原因により発生する。\n\n・この世に存在するすべてのリスク資産を組み合わせたポートフォリオの期待利回りとリスクをプロットしたとき、その上縁部分を（③）という。すべての投資家は自分が許容できるリスクに応じて、最大の期待利回りが上げられる（③）にあるポートフォリオのどれかを保有することになる。\n\n・現実には、国債のように、満期まで保有すれば一定の利回りがあらかじめ保証されている資産、すなわちリスクのない資産（無リスク資産）が存在する。無リスク資産とリスク資産を組み合わせる場合、すべての投資家は、（③）上の唯一のリスク資産ポートフォリオであるマーケット・ポートフォリオと無リスク資産を組み合わせるべきである。\n\n・無リスク資産とマーケット・ポートフォリオの組み合わせをプロットすると「（④）」と呼ばれる直線（無リスク資産から効率的フロンティアに引いた接線）になる。\n\nA. ①アンシステマティック・リスク ②システマティック・リスク ③効率的フロンティア ④資本市場線\n\nB. ①アンシステマティック・リスク ②システマティック・リスク ③効率的ポートフォリオ ④証券市場線\n\nC. ①システマティック・リスク ②アンシステマティック・リスク ③効率的フロンティア ④資本市場線\n\nD. ①システマティック・リスク ②アンシステマティック・リスク ③効率的ポートフォリオ ④証券市場線", "answer": "A", "explanation": "・資産の数を増やすことで低減されるリスクは、「アンシステマティック・リスク」（ユニークリスクや分散可能なリスクとも言う）と言う。\n・資産の数を増やしても除去できないリスクはを「システマティック・リスク」（マーケット・リスクや分散不能なリスクとも言う）と言う。\n・この世に存在するすべてのリスク資産を組み合わせたポートフォリオの期待利回りとリスクをプロットしたとき、その上縁部分を「効率的フロンティア」と言う。\n\n・効率的フロンティア上の一群のポートフォリオを「効率的ポートフォリオ」と言う。\n\n・無リスク資産とマーケット・ポートフォリオの組み合わせをプロットすると「資本市場線」と呼ばれる直線（無リスク資産から効率的フロンティアへ引いた接線）になる。\n\n・個別資産リスク（β）と期待利回りの関係は、無リスク資産を通る右上上がりの直線になる。この直線のことを「証券市場線」と言う。（P.151に記載あり）", "source": "グロービス マネジメントブック 改訂3版\n\n7.分散投資の効果(2)：効率的フロンティアと資本市場線 P.148-149"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 9, "question": "■ 問9.CAPM(資本資産価格モデル)に関する以下の記述のうち、最も適切なものを1つ選択してください。\nA. 個別資産の期待利回りは、無リスク資産の利回りとマーケット・リスク・プレミアムの和によって決まり、βの大きさには影響されない\n\nB. 個別資産のアンシステマティック・リスクは、ポートフォリオを組んでもなくすことができないため、期待利回りに影響を与える\n\nC. βは個別資産の市場全体に対する感応度を表し、市場全体の利回りが1％変動したとき、βに応じて個別資産の利回りも変動する\n\nD. 証券市場線は右下がりの直線であり、βが大きいほど期待利回りは低くなる", "answer": "C", "explanation": "βは個別資産の市場全体（マーケット・ポートフォリオ）に対する感応度を表す。\n\n市場全体の利回りが1％変動したとき、βに応じて個別資産の利回りも変動する。\n\nたとえば、市場全体の利回りが1％変動（上昇または下落）したとき、β＝1.5の資産の利回りは1.5％変動（上昇または下落）することが期待される。\n\nAは、期待利回りの式にβが含まれるため誤り。\n\nBは、アンシステマティック・リスクはポートフォリオを組むことでなくせるため誤り。\n\nDは、証券市場線は無リスク資産を通る右上がりの直線であるため誤り。", "source": "グロービス マネジメントブック 改訂3版\n\n8.分散投資の効果(3)：CAPM(資本資産価格モデル) P.150-151\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_FIN"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 10, "question": "■問10.国債の利回りが2.5%、マーケット・リスク・プレミアムが5%であるとすると、β=0.8の資産（株式）の期待利回りRは何%になるでしょうか。\nA. 6.0%\n\nB. 6.5%\n\nC. 7.0%\n\nD. 7.5%", "answer": "B. 6.5%", "explanation": "個別資産のβと期待利回りの関係は、以下のようなCAPMの計算式で求められます。\n\n個別資産の期待利回り = 無リスク資産の利回り +\n\nβ × (マーケット・ポートフォリオの期待利回り - 無リスク資産の利回り)\n\nなお、マーケット・ポートフォリオの期待利回りと無リスク資産の利回りとの差を、マーケット・リスク・プレミアムと言います。\n\nそのため当該資産（株式）の期待利回りRは、2.5% (国債利回り) + 0.8 (β) × 5% (マーケット・リスク・プレミアム)から6.5%と算出できます。", "source": "グロービス マネジメントブック 改訂3版\n\n8．分散投資の効果(3)：CAPM(資本資産価格モデル) P.150-151"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 11, "question": "■問11.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n一般的に企業の資金調達は大きく二つに分類される。それは負債と株主資本である。\n\n（①）は企業が存在する限り原則的に返済されることはない。また企業が倒産した際には（②）の支払いが優先される。\n\nまた（②）においては金融機関からの借入や社債以外にも、現金決済を一定期間猶予してもらうという形で資金を調達している（③）も含む。\n\nA. ①株主資本 ②負債 ③買掛金や手形\n\nB. ①負債 ②株主資本 ③売掛金や受け取り手形\n\nC. ①株主資本 ②負債 ③ワラント債\n\nD. ①株主資本 ②負債 ③配当\n\n（正解は下にあります）", "answer": "A", "explanation": "企業は株主資本（株式）や負債（債券、銀行借入）といった手法で資金を集めます。負債は返済期限や決済期限を持っており、その期限までに債権者に対して返済をしなければなりません。\n\n買掛金や手形についても一定期間、支払いを猶予してもらう仕組みのため負債の一部として認識されます。", "source": "グロービス マネジメントブック 改訂3版\n\n企業の資金調達手段 P.152-153"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 12, "question": "■問12. 加重平均資本コスト(WACC)について誤っているものをすべて選択してください。\nA. 資金を1円調達するのにいくらのコストがかかっているかを示している。ビジネスではWACC以下の利回りを上げることができれば負債コストと株主資本コストの両方をカバーでき、債権者と株主を共に満足させることができる。\n\nB. WACCの式は「WACC= D/(D+E)×rD×(1－税率)＋E/(D+E)×rE」で表される。\n\nC. WACCの式のDは負債総額、Eは株式の簿価総額である。\n\nD. rDは負債コスト、rEは株主資本コストと呼ばれる。現在ではCAPMなどのモデルを使い、株主資本コストを推定することが実務的におこなわれるようになっている。\n\nE. 支払利息は税額控除となるため、税引後の実質負債コストはrD(1－税率)と低くなる。", "answer": "A,Cが誤り", "explanation": "A：誤り\n\nビジネスではWACC以上の利回りを上げることができれば負債コストと株主資本コストの両方をカバーでき、債権者と株主を共に満足させることができる。\n\nB：正しい\n\nC：誤り\n\nEは株式の簿価ではなく時価総額（株価×発行済株式数）で表す。\n\nD；正しい\n\n社債の購入で企業に資金を貸し付ける場合、投資家は企業が行っているビジネスのリスクを見ることにより、そのリスクに応じた借入に対する利息を要求する。一方、株式に投資する場合は、ビジネス上のリスクの他に、どの程度の負債を抱えているかという財務状況も勘案して利回りを期待する。この利回りのことを株主期待利回り（株主要求利回り）rEと呼ぶ。\n\nE：正しい\n\n【参考】設問のrD(1－税率)は節税効果を表しており、有利子負債を増やすほどWACCが下がり、企業価値を高めることができる。しかし過度の有利子負債は企業価値を損なう可能性がある。", "source": "グロービス マネジメントブック 改訂3版\n\n資本コスト P.154-155"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 13, "question": "■問13.加重平均資本コスト（WACC）を計算し、適切なものを選択肢A～Dのうちから選んでください。\n株式の時価総額：150\n\n負債総額：50\n\n法人税率：40%\n\n利 益 率：10%\n\n株主資本コスト：8%\n\n借入金利：5%\n\n■選択肢：\n\nA：13.00%\n\nB：7.25%\n\nC：6.75%\n\nD：6.50%", "answer": "C：6.75%", "explanation": "計算式\n\n・WACC＝負債D÷（負債D＋株式の時価総額E）×負債コストrD×（1－法人税率）＋株式の時価総額E÷（負債D＋株式の時価総額E）×株主資本コストrE\n\n算出手順\n\n①：負債コストと株主資本コストを、それぞれの構成比率で重み付け（加重平均）して足し合わせすることでWACCを算出します。\n\n負債コストは借入金利5%を使用します。\n\n公式に数字を当てはめると以下のようになります。\n\n負債50÷（負債50＋株式の時価総額150）×負債コスト5%×（1－法人税率40%）＝0.75%\n\n②：公式の後半部分の株主資本調達コストを算出します。\n\n公式に数字を当てはめると以下のようになります。\n\n株式の時価総額150÷（負債50＋株式の時価総額150）×株主資本コスト8%＝6%\n\n③：負債の調達コストと株主資本の調達コストを合計します。\n\n負債の調達コスト0.75%＋株主資本調達コスト6%＝WACC6.75%\n\nなお、WACCの計算で利益率は使用しません。", "source": "グロービス マネジメントブック 改訂3版\n\n13.資本コスト P.154-155"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 14, "question": "■     問14.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n・株主が企業の発行する株式を購入するのは、株式投資からの期待利回りが、他の資産への投資をあきらめても、経済的に合理性を持つ水準にある場合である。それは、株式が価格変動を伴うリスクのある資産である以上、株式投資の期待利回りが、無リスク資産(国債)の利回り(①)を上回っている(②)がある場合に他ならない。\n\n・(①)は、無リスク資産の中でも国債の利回りを使うのが一般的である。マーケット・(②)は、過去の株式投資による利回りを見ながら決定されたと考えられる。これは、投資家は「過去の実績として、株式投資はこれだけ儲かっていたから、今後もこの程度の利回りは期待できるだろう」と考えて投資するからだ。(③)については、個別企業の株価と市場全体の株価の動きの相関を求めることで、推定する。\n\n・その企業の株主資本コストは、下に示した式で算出できる。\n\n・株主資本コスト＝(①)+(③)×マーケット・(②)\n\nA. ①リスク・フリー・レート ②リスク・プレミアム ③個別資産のβ\n\nB. ①リスク・フリー・レート ②リスク・プレミアム ③キャピタル・ゲイン\n\nC. ①リスク・プレミアム ②リスク・フリー・レート ③個別企業のβ\n\nD. ①リスク・フリー・レート ②リスク・プレミアム ③個別企業のβ", "answer": "D", "explanation": "・株主資本コストは、投資家の期待利回りと言い換えることができます。株主資本コストを推定するときは、リスクと期待利回りの関係を示すCAPM(資本資産価格モデル)及び将来にわたる配当の現在価値をもとに算出する配当割引モデルが利用されることが多いです。\n・ＣＡＰＭを利用して株主資本コストを推定するには、3つの要素が必要となります。すなわち、❶リスク・フリー・レート、❷マーケット・リスク・プレミアム、❸個別企業のβです。\n・自社株式の期待利回りは国債利回り+自社のβ×〔株式市場全体の期待利回り-国債利回り〕で算出されます。", "source": "グロービス マネジメントブック 改訂3版\n\n11．株主資本コストの推定 P.156-157\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_FIN"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 16, "question": "■問16.モジリアニ＝ミラーの命題の前提となる完全市場の定義として、誤っているものを一つ選びなさい。\n取引される証券にかかる情報は市場参加者の一部の人にのみ伝わる。\n\n資本市場への参入障壁がなく、またどの市場参加者も価格に影響を与えるほどの力を持っていない。\n\n資本市場への参入に伴うコストはなく、証券の取引は自由に行われる。\n\n税制は存在しない。", "answer": "1", "explanation": "正しくは、「取引される証券にかかる情報は市場参加者のすべてに一様にコストなしに伝わる。」\n\nモジリアニ＝ミラーの命題は、完全市場においては、企業の負債と株主資本の構成比は、企業価値に影響を与えないことを示した。", "source": "グロービス マネジメントブック 改訂3版\n\n16.企業の最適資本構成(1)：理論 P.160-161"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 16, "question": "■問16.モジリアニ＝ミラーの命題の前提となる完全市場の定義として、誤っているものを一つ選びなさい。\n取引される証券にかかる情報は市場参加者の一部の人にのみ伝わる。\n\n資本市場への参入障壁がなく、またどの市場参加者も価格に影響を与えるほどの力を持っていない。\n\n資本市場への参入に伴うコストはなく、証券の取引は自由に行われる。\n\n税制は存在しない。", "answer": "1", "explanation": "正しくは、「取引される証券にかかる情報は市場参加者のすべてに一様にコストなしに伝わる。」\n\nモジリアニ＝ミラーの命題は、完全市場においては、企業の負債と株主資本の構成比は、企業価値に影響を与えないことを示した。", "source": "グロービス マネジメントブック 改訂3版\n\n16.企業の最適資本構成(1)：理論 P.160-161"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 17, "question": "■問17.下記文章のうち、誤っているものを選択肢AからDの中から選んでください。\nA. 企業は、負債を増やせば節税効果により企業価値が高まる。しかし、極端な負債の増大は倒産リスクが高まるため、負債調達コストが上昇し、企業価値を減少させる。これら2つの効果の分岐点となるのが最適資本構成点である。\n\nB. 法人税があれば、負債に対する金利の支払いは費用として収益から控除される。利益が圧縮されることにより、その分税金の支払いが減少してキャッシュフローが増加するため、その現在価値である企業価値も増大する。\n\nC. どの程度の負債比率の上昇に対して、どの程度負債調達コストが上昇するのか（これをリスク・プレミアムと言う）を判断するのは容易ではない。しかしながら近年の社債市場の発達によって、このリスク・プレミアムを判断するための有効な資料が集積されつつある。それは、社債の格付けである。\n\nD. 安定成長期に入って資金に余裕があり、新規投資のための資金もあまり必要でない企業は、借入金を全部返済して無借金経営にすることが、株主の利益の最大化という最大の使命を果たすことになり、大方の株主の意見に合致する。", "answer": "D", "explanation": "・「借入金を全部返済して無借金経営にすることが、株主の利益の最大化という最大の使命を果たすことになる」という記述は誤りです。\n\n・正しくは、「借入金を全部返済するのではなく、少しぐらい負債を残して、その分の資金を配当で株主に還元してほしいというのが、大方の株主の意見であろう」となります。\n\n・必要以上に負債比率を低く抑えている経営者は、株主の目から見れば、株主の利益の最大化という最大の使命を怠っていると映るケースもありうることには注意が必要です。", "source": "グロービス マネジメントブック 改訂3版\n\n14.企業の最適資本構成(2)：実際 P. 162-163\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_FIN"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 18, "question": "■問18.配当政策について、誤っているものを選択してください。\nA.実際の世界では、配当政策は株主にとっての企業価値（株価）に影響を与える。同様のことが、完全市場の仮定の下でもいえる。\n\nB.個人投資家と法人投資家、大株主と小口株主など、だれの利益を最も重視するかによって、配当政策は影響を受ける。\n\nC.投資家は、配当政策を経営者の持っている情報を推測するための「シグナル」として利用するため、配当政策の影響が株価にも影響を与える可能性がある。", "answer": "Aのみ", "explanation": "A.実際の世界では、資本構成と同様に税や情報の問題があったり、企業と投資家にとっての投資機会が均一ではないことなどから、配当政策は株主にとっての企業価値（株価）に影響を与える。完全市場の仮定の下では、株主に対する利回りは、配当で還元しても株の値上がり益で還元しても同じである。\n\nB.個人投資家と法人投資家、大株主と小口株主など、だれの利益を最も重視するかによって、配当政策は影響を受ける。\n\nC.企業の経営状況やその企業が持つ投資機会については、企業経営者の持つ情報のほうが、投資家の持つ情報よりもはるかに多い。そのため投資家は、配当政策を経営者の持っている情報を推測するための「シグナル」として利用するため、配当政策の影響が株価にも影響を与える可能性がある", "source": "グロービス マネジメントブック 改訂3版\n\n配当政策 P.164-165"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 19, "question": "■問19.下記文章中の（①）～（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\n・キャッシュフロー割引モデルでは、企業活動から発生すると予想される毎年の（①）を（②）で割り引いた現在価値をすべて合計することで、企業の総資産価値（TEV）が得られる。\n\n・TEVはキャッシュフローから割り出された企業の価値なので、そこから負債の価値を差し引けば、（③）の価値が得られる。\n\nA. ①営業利益 ②株主資本コスト ③純利益\n\nB. ①配当 ②加重平均資本コスト ③有利子負債\n\nC. ①フリー・キャッシュフロー ②加重平均資本コスト ③株主資本\n\nD. ①フリー・キャッシュフロー ②負債コスト ③現金同等物", "answer": "C", "explanation": "・キャッシュフロー割引モデルでは、企業価値は将来にわたって生み出されるフリー・キャッシュフローを基準に評価する。フリー・キャッシュフローは、企業が事業活動によって実際に生み出す現金であり、株主・債権者の双方に帰属しうるキャッシュである。\n\n・これらのフリー・キャッシュフローを現在価値に割り引く際には、株主と債権者の双方の期待リターンを反映した加重平均資本コスト（WACC）を用いる。これにより、企業の総資産価値（TEV）が算出される。\n\n・TEVは企業全体の価値であるため、そこから負債の価値（厳密には純有利子負債）を差し引くことで、最終的に株主に帰属する価値、すなわち株主資本の価値が求められる。\n\n・したがって、「①フリー・キャッシュフロー」「②加重平均資本コスト」「③株主資本」の組み合わせが正しい。", "source": "グロービス マネジメントブック 改訂3版\n\n18.株式評価モデル P.170-171"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 20, "question": "■問20.下記文章中の（①）から（③）に入る語句の組み合わせとして適切なものを選択肢A～Dのうちから選んでください。\nフリー・キャッシュフロー（FCF）とは、DCF法により企業価値を計算する時に使われるキャッシュフローのことであり、以下のように定義される。\n\nFCF＝（①）×（1ー法人税率）＋（②）ー 投資 ー （③）\n\nA. ①EBITDA ②支払利息 ③ΔWC\n\nB. ①EBIT ②減価償却費 ③ΔWC\n\nC. ①EBIT ②支払利息 ③WC\n\nD. ①EBITDA ②減価償却費 ③ΔWC", "answer": "B", "explanation": "・EBIT（Earning Before Interest and Tax：支払金利前税引前利益）は営業利益に金利以外で恒常的に発生する営業外損益を加えた額です。\n\n・減価償却は実際にはキャッシュの流出を伴わないため減価償却費を足し戻します。\n\n・ΔWCはワーキング・キャピタル（Working Capital：運転資本）の前年度との差額（増加運転資本）です。", "source": "グロービス マネジメントブック 改訂3版\n\n16．フリー・キャッシュフロー P.166-167"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 21, "question": "■問21.下記文章のうち、誤っているものを選択肢A～Dの中から選んでください。\n（回答は一つとは限りません。）\n\nA.企業価値算定を行う場合、大きく分けて今後ともこの企業が事業活動を継続していくことを前提とする価値（継続価値）と、解散するとした場合の価値（清算価値）の2つの考え方がある。\n\nB. 一般的には企業は永続的な存在であると考えられるため、企業価値の算定は①予測財務諸表を作成し、そこから求められるFCFとWACCから価値を算定する期間と②それ以降の期間に分けて行われる。後者の期間の価値を継続価値と呼ぶ。\n\nC.財務諸表上の企業の利益をもとにして企業の価値を推定しようという考え方はその簡便さゆえにかなり多くの投資家に利用されている。その考え方の一つであるPERは単純に現在の営業利益の何倍かがその企業の価値であるという考え方である。ここで、この考え方は企業価値は株式時価総額と一致するとの立場に立っていることに注意する必要がある。\n\nD.清算価値とは企業を今解散するとして、資産を個別に洗いなおして処分価値を合計したものから、負債を差し引いた金額を価値とする考え方だ。資産の評価額は通常Ｂ/Ｓ（貸借対照表）に記載されている簿価額を用い算定を行う。", "answer": "ＣとＤ", "explanation": "Ｃ.PERは営業利益ではなく株主にとっての企業価値という観点から、金利や税金などを差し引いた【税引き後利益】を用い算定します。\n\nＤ.資産の処分価格は通常貸借対照表上の簿価とは異なります(時価をもちいます)。土地などでいわゆる「含み」がある場合は簿価よりも高くなったり低くなったりします。", "source": "グロービス マネジメントブック 改訂3版\n\n17.企業価値の算出 P168-169"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 22, "question": "■問22.下記の財務情報から得られるフリーキャッシュフロー(FCF)を算出し、正しいものを選んでください。ただし、法人税率は40%とします。\n2021年\n\n売上高 ：1,000億円\n\n売上高総利益 ：600億円\n\n減価償却費 ：30億円\n\n支払金利前税引前利益 ：300億円\n\n経常利益 ：200億円\n\n当期純利益 ：100億円\n\n新規設備投資 ：20億円\n\n前年度売掛金 ：7億円\n\n前年度棚卸資産 ：4億円\n\n前年度買掛金 ：8億円\n\n今年度売掛金 ：10億円\n\n今年度棚卸資産 ：7億円\n\n今年度買掛金 ：9億円\n\nA. 65億円\n\nB. 125億円\n\nC. 185億円\n\nD. 195億円", "answer": "C", "explanation": "フリーキャッシュフロー（FCF）とは、DCF法により企業価値を計算するときに使われるキャッシュフローのことであり、以下のように定義される。\n\nFCF＝EBIT×（1－法人税率）＋減価償却費－投資―⊿WC\n\nEBIT (Earning Before Interest and Tax : 支払金利前税引前利益)は営業利益に金利以外で恒常的に発生する営業外損益を加えた額、⊿WCはワーキングキャピタル(Working Capital:運転資本)の前年度との差額（増加運転資本）である。\n\nワーキングキャピタルは以下のように定義される\n\nWC＝(現金等価物を除いた)流動資産－(有利子負債を除いた)流動資産\n\n流動資産の主なものとしては「売掛金」「棚卸資産」、流動負債の主なものとしては「買掛金」がある。\n\n以上の定義から\n\n今年度WC＝今年度売掛金＋今年度棚卸資産－今年度買掛金\n\n＝10＋7－9\n\n＝8億円\n\n前年度WC＝前年度売掛金＋前年度棚卸資産－前年度買掛金\n\n＝7＋4－8\n\n＝3億円\n\n⊿WC＝今年度WC－前年度WC\n\n＝8－3\n\n＝5億円\n\nFCF＝EBIT×（1－法人税率）＋減価償却費－投資―⊿WC\n\n＝300×(1－0.4)＋30－20－5\n\n＝185億円\n\nよって、Cが正解", "source": "グロービス マネジメントブック 改訂3版\n\n16．フリーキャッシュフロー P.166-167"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 23, "question": "■問23.下記文章のうち EVAの説明として正しいものはどれか。\n・A：大きな投資をした年度は必ずEVAがマイナスになる。\n\n・B：EVAは経常的な企業活動による利益から、資金調達にかかるすべての資本コストを差し引いたものを企業の真の利益として認識する。\n\n・C：EVAは税引後営業利益から過去の投下総資本にWACCを掛けたものを差し引いたものである。\n\n・D：EVAは単年度業績評価などに利用するためにアレンジされた利益ベースの指標である。", "answer": "C", "explanation": "A：大きな投資をした年度は必ずEVAがマイナスになる。\n\n⇒誤り：増加した資本分に見合う資本コストの実額さえ稼いでいればEVAがマイナスになることはまずない。\n\nB：EVAは経常的な企業活動による利益から、資金調達にかかるすべての資本コストを差し引いたものを企業の真の利益として認識する。\n\n⇒誤り：営業活動による利益から資本コストを差し引く。経常的な活動だと支払金利が含まれるため。\n\nC：EVAは税引後営業利益から期初の投下総資本にWACCを掛けたものを差し引いたものである。\n\n⇒正しい：EVA = NOPAT - WACC × 期初の投下総資本\n\nD：EVAは単年度業績評価などに利用するためにアレンジされた利益ベースの指標である。\n\n⇒誤り：利益ベースではなく、キャッシュフローベースの指標のため。", "source": "グロービス マネジメントブック 改訂3版\n\n19．EVA P.172-173"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 24, "question": "■問24. オプション理論の説明について、誤っているものを選択してください。\nA.オプションとは、ある資産(株式や債券など)を将来の定められた時点に一定の価格で売買する義務である。\n\nB.オプションの保有者(「買い手」)はオプションが行使できればリスクなしで必ず利益を上げられる。(中略)そのため、契約成立時に、オプションの買い手は「プレミアム」と呼ばれる対価を売り手に支払う。\n\nC.オプションには大きく分けてコール・オプションとプット・オプションの2種類がある。さらに、オプションにはその権利を行使できるタイミングであらかじめ定めた期限1回のみの「ヨーロピアン型」と、期限以前であればいつでも行使できる「アメリカン型」の2タイプがある。\n\nD.一定の前提の下でオプションのプレミアムを数式化したのが、ブラック＝ショールズのオプション価格式だ。この式に、❶現在の対象資産価格、❷行使価格、❸満期までの時間、❹金利、❺対象資産の変動率(ボラティリティ)というデータを入力すれば、表計算ソフトを使ってだれでもオプション価格を求めることができる。", "answer": "A", "explanation": "・A.オプションとは、ある資産(株式や債券など)を将来の定められた時点に一定の価格で売買できる権利(義務ではない)で、保険のようなものです。\n\n・コール・オプションとプット・オプションの種類と取引内容は下記のとおりです。\n\nコール・オプション→買い手:資産を買う権利を持つ、売り手:資産を売る義務を負う。\n\nプット・オプション→買い手:資産を売る権利を持つ、売り手:資産を買う義務を負う。\n\n・一般にコール・オプションの場合、資産価格が行使価格よりも上昇していれば、時価よりも安く買えるので、オプションを行使して利得を確保しますが、行使価格以下であればオプションを行使しません。プット・オプションの場合は、資産価格が行使価格よりも下落していれば、時価よりも高く売れるのでオプションを行使して利得を確保しますが、行使価格以上であれば放棄します。", "source": "グロービス マネジメントブック 改訂3版\n\n20．オプション理論の基礎 P.174-175"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 26, "question": "■問26.次の文章の（）に当てはまる単語の組み合わせとして、正しいものを選びなさい。\n投資ファンドは、広く資金を集めて企業(あるいはプロジェクトなど)へ投資し、企業再生や育成、分割などを行って（A）を向上させたうえで、売却益による利益獲得を狙う。\n\n（A）を向上させる方法論や投資先のタイプ、投資回収の方法などによって、再生ファンド、（B）、ベンチャー・キャピタル、不動産ファンドなどがある。\n\n投資ファンドは、バイアウトファンドあるいは（C）と呼ばれることもある。（C）と呼ばれる場合は、未公開企業を対象に投資を行う場合が多い。\n\n（B）は、主に資産や事業の切り売りをすることで資金回収を図る。\n\nA：企業価値 B：ハゲタカファンド C：プライベート・エクイティ・ファンド\nA：株価 B：政府系ファンド C：再生ファンド\nA：株価 B：ハゲタカファンド C：プライベート・エクイティ・ファンド\nA：企業価値 B：政府系ファンド C：再生ファンド", "answer": "1", "explanation": "投資ファンドは、広く資金を集めて企業へ投資し、企業再生や育成、分割などを行って企業価値を向上させたうえで、売却益による利益獲得を狙う。\n\n企業価値を向上させる方法論や投資先のタイプ、投資回収の方法などによって、再生ファンド、ハゲタカファンド、ベンチャーキャピタル、不動産ファンドなどがある。\n\n投資ファンドは、バイアウトファンドあるいはプライベート・エクイティ・ファンドと呼ばれることもある。プライベート・エクイティ・ファンドと呼ばれる場合は、未公開企業を対象に投資を行う場合が多い。\n\nハゲタカファンドは、主に資産や事業の切り売りをすることで資金回収を図る。\n\n＜選択肢内の単語解説＞\n\n再生ファンドは、経営状況が悪化した企業の株式を買収し、資金や経営陣を投入することで会社の再建を図り、株式公開や事業売却の形で資金回収を図るファンド。\n\n政府系ファンドは、国家が深く関わっている、投資ファンドの一種。通常の投資ファンドよりは長期的、安定的なリターンを求めている。", "source": "グロービス マネジメントブック 改訂3版\n\n22.投資ファンド P.178-179"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 27, "question": "■問27.以下の条件に基づき、税引後の加重平均資本コスト(WACC：Weighted Average Cost of Capital)として最も適切なものを、選択肢AからDの中から選んでください。\n【条件】\n\n・株主資本コスト：12.0%\n\n・負債コスト（税引前）：5.0%\n\n・法人税率：30%\n\n・有利子負債：60,000百万円\n\n・無利子負債：10,000百万円\n\n・株式の時価総額：30,000百万円\n\n【選択肢】\n\nA：6.33％\n\nB：5.70%\n\nC：7.33%\n\nD：6.10%", "answer": "A：6.33%", "explanation": "WACCは、負債D /（負債D + 株式の時価総額E）× 負債コストrD×（1 - 税率）+ 株式の時価総額E / (負債D + 株式の時価総額E) × 株主資本コストrE の式で求められます。\n\nよって、計算は、60,000 / (60,000 + 30,000) × 5.0％ ×（1-30％）+ 30,000 / (60,000 + 30,000) × 12.0％ ＝ 6.33%\n\n解き方のポイントは以下の通りです。\n\nWACCを解く際は、以下の3ステップを意識すると間違いが減ります。\n\n1.資本構成を特定する\n\n分母となるのは「負債D」と「株式の時価総額E」の合計です。なお、負債は有利子負債であり、買掛金などの無利子負債はコスト（利息）が発生しないため通常含まれません。\n\n・分母 = 60,000 + 30,000 = 90,000\n\n2.負債の税引後コストを出す\n\n支払利息が税額控除となるため、税引後の実質負債コストは、負債コスト「rD×（1-税率）」と低くなります。\n\n・税引後負債コスト = 5.0% × (1 - 30%) = 3.5%\n\n3.加重平均する\n\n・負債の寄与：3.5% × (60,000 / 90,000) = 2.33%\n\n・株主資本の寄与：12.0% × (30,000 / 90,000) = 4.0%\n\n・WACC = 2.33% + 4.0%= 6.33%\n\nなお、他の選択肢の解説もご参考まで。\n\nB：5.70%（無利子負債を分母に入れた間違い）分母を「有利子負債＋無利子負債＋株主資本＝100,000」で計算してしまった場合。\n\nC：7.33%（節税効果を忘れた間違い）負債コストを税引前（5.0%）のまま計算してしまった場合。\n\nD：6.10%（無利子負債をコスト0%として算入した間違い）分母を100,000とし、分子に「無利子負債10,000 × 0%」を加えて計算してしまった場合。", "source": "グロービス マネジメントブック 改訂3版\n\n10．資本コスト P.154-155\n\nPreview not available\nHTTPS://GLOBIS.WORKVIVO.US/HASHTAG/GMAP2026S_FIN"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 28, "question": "■問28.国債の利回りが2.5%、マーケットポートフォリオの期待利回りが6%であるとすると、β=1.5の資産（株式）の期待利回りRは何%になるでしょうか？\nA：9.75％\n\nB：7.75％\n\nC：12.75％\n\nD：6.25％", "answer": "B", "explanation": "個別資産のもつシステマティック・リスク（マーケット・リスク）をβで測定すると、個別資産のβと期待利回りの関係は、以下のような単純な計算式（CAPMの計算式）で求められます。\n\n個別資産の期待利回り（R）＝ 無リスク資産の利回り ＋ β × （マーケット・ポートフォリオの期待利回り － 無リスク資産の利回り）\n\n無リスク資産（国債）の利回り2.5%、マーケット・ポートフォリオの期待利回り6%、β ＝ 1.5より\n\nR ＝ 2.5 ＋ 1.5 × （6-2.5）\n\nR ＝ 7.75", "source": "グロービス マネジメントブック 改訂3版\n\n8.分散投資の効果(3)：CAPM(資本資産価格モデル) P.150-151"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 29, "question": "■問29.ΔWCを踏まえたフリー・キャッシュフロー（FCF）で正しいものを選んでください。\nN社のEBITは1,800百万円、法人税率は35％です。減価償却費は300百万円、設備投資は500百万円でした。\nまた、前年度末と今年度末の財務データは以下の通りです。\nWCは、(現金等価物を除いた)流動資産 － (有利子負債を除いた)流動負債で計算してください。\n\n（金額の単位：百万円）\n\n【前年度末】\n現金・預金   500\n売掛金 1,600\n棚卸資産 2,000\n買掛金 1,100\n短期借入金   700\n\n【今年度末】\n現金・預金   700\n売掛金 1,900\n棚卸資産 2,300\n買掛金 1,200\n短期借入金   900\n\nFCF ＝ EBIT ×（1－法人税率）＋減価償却費－投資－ΔWC\n\nA：340百万円\nB：470百万円\nC：640百万円\nD：970百万円", "answer": "B：470百万円", "explanation": "まず前年度末WCを計算する。\n前年度末WC＝（売掛金1,600＋棚卸資産2,000）－買掛金1,100\n＝3,600－1,100＝2,500\n\n次に今年度末WCを計算する。\n今年度末WC＝（売掛金1,900＋棚卸資産2,300）－買掛金1,200\n＝4,200－1,200＝3,000\n\nしたがって、ΔWC＝3,000－2,500＝500\n\n次にFCFを計算する。\nFCF＝1,800×（1－35％）＋300－500－500\n＝1,800×0.65＋300－500－500＝1,170＋300－500－500＝470", "source": "グロービス マネジメントブック 改訂3版\n\n16.フリー・キャッシュフロー P.166-167"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": 30, "question": "■問30.企業買収防衛策について、誤っているものを全て選択してください。\nA. ポイズン・ピル：敵対的買収者が一定の議決権割合を取得した際、既存株主が保有する株式を市場価格よりも高い価格で企業が買い取るようにすることで、買収コストを引き上げる手法。\n\nB. クラウン・ジュウェル：敵対的買収社が最も欲しがっている資産や事業を売却することで、買収意欲をそぐ手法。\n\nC. ゴールデン・パラシュート：敵対的買収が発生した際、被買収企業の全従業員に対して多額の特別手当や退職金を支払う契約をあらかじめ締結しておくことで、買収後の人件費負担を増大させ、買収を断念させる手法。\n\nD. ホワイト・ナイト：被買収企業の経営陣と合意のうえで、友好的に買収または合併を行う会社。被買収企業が友好的な買収者を自ら選択することで、敵対的買収者からの買収を避けることが狙い。\n\nE. マネジメント・バイ・アウト：経営陣が自社の株式を取得して、非公開企業としてしまうこと。", "answer": "A, C", "explanation": "・ポイズン・ピル：「市場価格より安い価格」で株式を引き受けられるようにすることで、敵対的買収者が株式を買い増したとき「買収者の議決権割合を下げる」ことが出来ます。\n\n・ゴールデン・パラシュート：全従業員ではなく、巨額の退職金が「取締役」に支払われるという委任契約をあらかじめ締結しておくことで、敵対的買収を行うと巨額の損失が発生するようにしておくことで、敵対的買収者の買収意欲をそぐことを意図しています。", "source": "グロービス マネジメントブック 改訂3版\n\n21．企業買収防衛策 P.176-177"}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}, {"subject": "GMAP2026S_FIN", "tag": "GMAP2026S_FIN", "qnum": "", "question": "", "answer": "", "explanation": "", "source": ""}];
var STORAGE_KEY = "gmap_dojo_status_mobile_safe_v1";
var ORDER_KEY = "gmap_dojo_order_mobile_safe_v1";
var statuses = {};
var orderIds = null;
var filtered = [];
var currentIndex = 0;
var answerOpen = false;

function byId(id){ return document.getElementById(id); }
function safeText(v){ return v === null || typeof v === "undefined" ? "" : String(v); }
function escapeHTML(s){
  s = safeText(s);
  return s.replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c] || c;
  });
}
function loadJSON(key, fallback){
  try {
    var raw = window.localStorage ? localStorage.getItem(key) : null;
    return raw ? JSON.parse(raw) : fallback;
  } catch(e) { return fallback; }
}
function saveJSON(key, value){
  try { if(window.localStorage){ localStorage.setItem(key, JSON.stringify(value)); } } catch(e) {}
}
function qid(q, i){ return safeText(q.tag) + "-" + safeText(q.qnum) + "-" + i; }
function getStatus(q){
  return statuses[q._id] || "none";
}
function initIds(){
  for(var i=0;i<QUESTIONS.length;i++){ QUESTIONS[i]._id = qid(QUESTIONS[i], i); }
}
function initSubjects(){
  var seen = {};
  var html = '<option value="all">全科目</option>';
  for(var i=0;i<QUESTIONS.length;i++){
    var s = QUESTIONS[i].tag;
    if(!seen[s]){
      seen[s] = true;
      html += '<option value="' + escapeHTML(s) + '">' + escapeHTML(s) + '</option>';
    }
  }
  byId("subjectFilter").innerHTML = html;
}
function orderedQuestions(){
  if(!orderIds){ return QUESTIONS.slice(0); }
  var dict = {};
  for(var i=0;i<QUESTIONS.length;i++){ dict[QUESTIONS[i]._id] = QUESTIONS[i]; }
  var arr = [];
  var used = {};
  for(var j=0;j<orderIds.length;j++){
    if(dict[orderIds[j]]){ arr.push(dict[orderIds[j]]); used[orderIds[j]] = true; }
  }
  for(var k=0;k<QUESTIONS.length;k++){
    if(!used[QUESTIONS[k]._id]){ arr.push(QUESTIONS[k]); }
  }
  return arr;
}
function applyFilters(){
  var subj = byId("subjectFilter").value;
  var stat = byId("statusFilter").value;
  var kw = byId("searchBox").value.toLowerCase();
  var arr = orderedQuestions();
  filtered = [];
  for(var i=0;i<arr.length;i++){
    var q = arr[i];
    var st = getStatus(q);
    if(subj !== "all" && q.tag !== subj){ continue; }
    if(stat !== "all" && st !== stat){ continue; }
    if(kw){
      var hay = (safeText(q.question)+"\n"+safeText(q.answer)+"\n"+safeText(q.explanation)+"\n"+safeText(q.source)).toLowerCase();
      if(hay.indexOf(kw) < 0){ continue; }
    }
    filtered.push(q);
  }
  if(currentIndex >= filtered.length){ currentIndex = Math.max(0, filtered.length - 1); }
  render();
}
function render(){
  updateStats();
  var main = byId("main");
  if(filtered.length === 0){
    main.innerHTML = '<div class="card empty">条件に合う問題がありません。</div>';
    return;
  }
  var q = filtered[currentIndex];
  var st = getStatus(q);
  var stClass = st === "ok" ? "ok" : (st === "review" ? "review" : "none");
  var stText = st === "ok" ? "OK完璧！" : (st === "review" ? "要見直し" : "未記録");
  var html = '';
  html += '<div class="card">';
  html += '<div class="meta"><div><span class="subject">' + escapeHTML(q.tag) + '</span> / 問' + escapeHTML(q.qnum) + '</div><div class="status '+stClass+'">' + stText + '</div></div>';
  html += '<div class="question">' + escapeHTML(q.question) + '</div>';
  html += '<div class="answerBox ' + (answerOpen ? "open" : "") + '">';
  html += '<div class="label">Answer</div><div class="box answer">' + escapeHTML(q.answer || "（空欄）") + '</div>';
  if(q.explanation){ html += '<div class="label">Explanation</div><div class="box">' + escapeHTML(q.explanation) + '</div>'; }
  if(q.source){ html += '<div class="label">Source</div><div class="box">' + escapeHTML(q.source) + '</div>'; }
  html += '</div><p class="small">この端末のブラウザに記録されます。</p></div>';
  main.innerHTML = html;
  byId("toggleBtn").innerHTML = answerOpen ? "答えを隠す" : "答えを見る";
}
function updateStats(){
  var ok=0, review=0, none=0;
  for(var i=0;i<QUESTIONS.length;i++){
    var st = getStatus(QUESTIONS[i]);
    if(st === "ok"){ ok++; }
    else if(st === "review"){ review++; }
    else { none++; }
  }
  byId("stats").innerHTML = (filtered.length ? (currentIndex+1) : 0) + " / " + filtered.length + "｜OK " + ok + "｜要見直し " + review + "｜未記録 " + none;
}
function prev(){ if(filtered.length){ currentIndex = Math.max(0,currentIndex-1); answerOpen=false; render(); } }
function next(){ if(filtered.length){ currentIndex = Math.min(filtered.length-1,currentIndex+1); answerOpen=false; render(); } }
function setStatus(st){
  if(!filtered.length){ return; }
  statuses[filtered[currentIndex]._id] = st;
  saveJSON(STORAGE_KEY, statuses);
  answerOpen = false;
  if(currentIndex < filtered.length-1){ currentIndex++; }
  applyFilters();
}
function shuffle(){
  var ids = [];
  for(var i=0;i<QUESTIONS.length;i++){ ids.push(QUESTIONS[i]._id); }
  for(var j=ids.length-1;j>0;j--){
    var k = Math.floor(Math.random()*(j+1));
    var tmp=ids[j]; ids[j]=ids[k]; ids[k]=tmp;
  }
  orderIds = ids;
  saveJSON(ORDER_KEY, orderIds);
  currentIndex=0; answerOpen=false; applyFilters();
}
function resetOrder(){
  orderIds = null;
  try{ localStorage.removeItem(ORDER_KEY); }catch(e){}
  currentIndex=0; answerOpen=false; applyFilters();
}
function start(){
  try{
    initIds();
    statuses = loadJSON(STORAGE_KEY, {});
    orderIds = loadJSON(ORDER_KEY, null);
    initSubjects();
    byId("subjectFilter").onchange = function(){currentIndex=0; answerOpen=false; applyFilters();};
    byId("statusFilter").onchange = function(){currentIndex=0; answerOpen=false; applyFilters();};
    byId("searchBox").oninput = function(){currentIndex=0; answerOpen=false; applyFilters();};
    byId("prevBtn").onclick = prev;
    byId("nextBtn").onclick = next;
    byId("toggleBtn").onclick = function(){ answerOpen=!answerOpen; render(); };
    byId("reviewBtn").onclick = function(){ setStatus("review"); };
    byId("okBtn").onclick = function(){ setStatus("ok"); };
    byId("shuffleBtn").onclick = shuffle;
    byId("resetBtn").onclick = resetOrder;
    applyFilters();
  } catch(e) {
    byId("main").innerHTML = '<div class="error">エラーが発生しました。\n' + escapeHTML(e.message || e) + '</div>';
  }
}
if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", start);
} else {
  start();
}
</script>
</body>
</html>
